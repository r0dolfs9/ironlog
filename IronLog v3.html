let pickerTargetSplit=null,pickerSelected=new Set();
function openExercisePicker(spId){pickerTargetSplit=spId;pickerSelected=new Set();renderPickerList('');document.getElementById('pickerSearch').value='';document.getElementById('pickerOv').classList.add('open')}
function closePicker(){document.getElementById('pickerOv').classList.remove('open');pickerTargetSplit=null;pickerSelected=new Set()}
function filterPicker(){renderPickerList(document.getElementById('pickerSearch').value.trim().toLowerCase())}
function renderPickerList(query){
  let html='';
  MUSCLES.forEach(group=>{
    const exs=(DB.exercises[group]||[]).filter(e=>!query||e.name.toLowerCase().includes(query));
    if(!exs.length)return;const c=cc(group);
    html+=`<div class="picker-group"><div class="picker-group-lbl" style="color:${c}">${CAT_LBL[group]}</div>`;
    exs.forEach(ex=>{
      const checked=pickerSelected.has(ex.id);
      html+=`<label class="picker-row${checked?' checked':''}">
        <input type="checkbox" style="display:none" ${checked?'checked':''} onchange="togglePick('${ex.id}','${group}',this)">
        <div class="picker-check${checked?' on':''}">${checked?'✓':''}</div>
        <div class="picker-nm">${ex.name}</div>
        <div class="picker-cat" style="color:${c}">${CAT_LBL[group]}</div>
      </label>`;
    });
    html+=`</div>`;
  });
  if(!html)html=`<div class="no-data">No exercises found</div>`;
  document.getElementById('pickerList').innerHTML=html;
}
function togglePick(exId,group,checkbox){
  if(checkbox.checked)pickerSelected.add(exId+'|'+group);else pickerSelected.delete(exId+'|'+group);
  const list=document.getElementById('pickerList');
  list.querySelectorAll('.picker-row').forEach(row=>{
    const cb=row.querySelector('input[type=checkbox]');const check=row.querySelector('.picker-check');
    if(!cb)return;const isChecked=cb.checked;
    row.classList.toggle('checked',isChecked);check.classList.toggle('on',isChecked);check.textContent=isChecked?'✓':'';
  });
}
function confirmPicker(){
  if(!pickerSelected.size){toast('Select at least one exercise');return}
  const sp=DB.splits.find(s=>s.id===pickerTargetSplit);if(!sp)return;
  const byGroup={};
  pickerSelected.forEach(key=>{
    const[exId,group]=key.split('|');if(!byGroup[group])byGroup[group]=[];
    const ex=(DB.exercises[group]||[]).find(e=>e.id===exId);if(ex)byGroup[group].push(ex.name);
  });
  Object.entries(byGroup).forEach(([group,names])=>{
    if(sp.sections.find(s=>s.type==='muscle'&&s.group===group)){toast(`${CAT_LBL[group]} already added as full section`);return}
    const existing=sp.sections.find(s=>s.type==='exercises'&&s.group===group);
    if(existing){names.forEach(n=>{if(!existing.list.includes(n))existing.list.push(n)})}
    else{sp.sections.push({type:'exercises',group,list:names})}
  });
  saveDB();closePicker();renderSplit(pickerTargetSplit,cv(sp.color));
  toast(`${pickerSelected.size} exercise${pickerSelected.size!==1?'s':''} added`);
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory(){
  const c=document.getElementById('histList');
  if(!DB.workouts.length){
    c.innerHTML=`<div class="empty-state">
  <div class="empty-state-art">📋</div>
  <div class="empty-state-msg">No sessions yet</div>
  <div class="empty-state-sub">Log your first workout and your training history will appear here.</div>
  <button class="empty-state-btn" onclick="switchTab('train')">Go to Train</button>
</div>`;return;
  }

  // ── 12-week heatmap ────────────────────────────────────────────────────────
  const todayD=new Date();todayD.setHours(0,0,0,0);
  // Start from the most recent Sunday (or today if Sunday), go back 12 weeks
  const dow=todayD.getDay(); // 0=Sun
  const heatEnd=new Date(todayD);
  const heatStart=new Date(heatEnd);heatStart.setDate(heatEnd.getDate()-83); // 12*7=84 days
  // Build date→count map
  const dateCounts={};
  DB.workouts.forEach(w=>{ dateCounts[w.date]=(dateCounts[w.date]||0)+1; });
  const maxCount=Math.max(...Object.values(dateCounts),1);
  // Build 84 cells (Sun→Sat columns), newest on right
  const cells=[];
  for(let i=0;i<84;i++){
    const d=new Date(heatStart);d.setDate(heatStart.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const cnt=dateCounts[ds]||0;
    const isToday=ds===todayD.toISOString().slice(0,10);
    const intensity=cnt===0?0:Math.max(0.18,cnt/maxCount);
    const title=`${ds}${cnt?' · '+cnt+' session'+(cnt>1?'s':''):''}`;
    cells.push(`<div class="hm-cell${isToday?' hm-today':''}" style="${cnt?`background:rgba(255,107,53,${intensity.toFixed(2)});`:''}opacity:${isToday&&!cnt?'0.5':'1'}" title="${title}"></div>`);
  }
  // Week-day labels (S M T W T F S)
  const dowLabels=['S','M','T','W','T','F','S'];
  const labelCol=dowLabels.map(l=>`<div class="hm-lbl">${l}</div>`).join('');
  const heatmapHTML=`<div class="hm-wrap">
    <div class="hm-hdr">
      <span class="hm-title">12-week activity</span>
      <span class="hm-sub">${Object.values(dateCounts).reduce((a,b)=>a+b,0)} total sessions</span>
    </div>
    <div class="hm-grid">
      <div class="hm-labels">${labelCol}</div>
      <div class="hm-cells">${cells.join('')}</div>
    </div>
    <div class="hm-legend">
      <span style="color:var(--t3);font-size:10px">Less</span>
      <div class="hm-cell" style="background:rgba(255,107,53,0.18)"></div>
      <div class="hm-cell" style="background:rgba(255,107,53,0.4)"></div>
      <div class="hm-cell" style="background:rgba(255,107,53,0.65)"></div>
      <div class="hm-cell" style="background:rgba(255,107,53,0.9)"></div>
      <span style="color:var(--t3);font-size:10px">More</span>
    </div>
  </div>`;

  // ── 7-day strip (kept below heatmap) ──────────────────────────────────────
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(todayD);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const dayWs=DB.workouts.filter(w=>w.date===ds);
    let primarySplit=null;
    if(dayWs.length){
      const counts={};dayWs.forEach(w=>{const k=w.splitId||'_solo_'+w.cat;counts[k]=(counts[k]||0)+1});
      primarySplit=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
    }
    let col='var(--t3)';
    if(primarySplit&&primarySplit.startsWith('_solo_')){col=cc(primarySplit.replace('_solo_',''))}
    else if(primarySplit){const sp=DB.splits.find(s=>s.id===primarySplit);if(sp)col=`var(${sp.color})`}
    const lbl=d.toLocaleDateString('en',{weekday:'short'})[0];
    const dn=d.getDate();
    const isToday=i===0;
    days.push(`<div class="hstrip-day${dayWs.length?' on':''}${isToday?' today':''}" title="${fd(ds)}${dayWs.length?' · '+dayWs.length+' logged':''}">
      <div class="hstrip-lbl">${lbl}</div>
      <div class="hstrip-dot" style="${dayWs.length?`background:${col};box-shadow:0 0 8px ${col}`:''}"></div>
      <div class="hstrip-num">${dn}</div>
    </div>`);
  }
  const stripHTML=`<div class="hstrip" style="margin:0 14px 14px"><div class="hstrip-hdr">LAST 7 DAYS</div><div class="hstrip-row">${days.join('')}</div></div>`;
  const sessMap=new Map();
  [...DB.workouts].sort((a,b)=>b.date.localeCompare(a.date)).forEach(w=>{
    const key=w.splitId?`${w.date}|${w.splitId}`:`${w.date}|solo|${w.cat}|${w.exId}`;
    if(!sessMap.has(key))sessMap.set(key,{date:w.date,splitId:w.splitId,entries:[]});
    sessMap.get(key).entries.push(w);
  });
  c.innerHTML=heatmapHTML+stripHTML+[...sessMap.values()].map((sess,i)=>{
    let sessName;
    if(sess.splitId)sessName=DB.splits.find(s=>s.id===sess.splitId)?.name||'Workout';
    else{const cats=[...new Set(sess.entries.map(e=>e.cat))];sessName=cats.map(ct=>CAT_LBL[ct]||ct).join(' & ')}
    const firstCat=sess.entries.find(e=>e.cat!=='cardio')?.cat||'cardio';const count=sess.entries.length;
    return`<div class="hsess" data-sess-key="${sess.splitId?`${sess.date}|${sess.splitId}`:`${sess.date}|solo`}">
      <div class="hsess-wipe">DELETE →</div>
      <button class="hsess-hd" onclick="tSess('hb${i}','ha${i}')">
        <div class="hsess-dot" style="background:${cc(firstCat)}"></div>
        <div class="hsess-info">
          <div class="hsess-name">${sessName}</div>
          <div class="hsess-meta">${fd(sess.date)} · ${count} exercise${count!==1?'s':''}</div>
        </div>
        <span class="hsess-arr" id="ha${i}">&#8250;</span>
      </button>
      <div class="hsess-body" id="hb${i}">${sess.entries.map(w=>histEntry(w)).join('')}</div>
    </div>`;
  }).join('');
}
function histEntry(w){
  const c=cc(w.cat);
  if(w.cat==='cardio')return`<div class="hentry"><div class="hel"><div class="henm">🏃 Cardio</div><div class="hechips"><div class="chip">${w.duration||'?'} min</div><div class="chip">${w.calories||'?'} kcal</div></div></div><button class="hedel" onclick="delW('${w.id}')">&#10005;</button></div>`;
  return`<div class="hentry"><div class="hel"><div class="henm">${w.name}</div><div class="hecat" style="color:${c}">${CAT_LBL[w.cat]||w.cat}</div><div class="hechips">${w.sets.map((s,i)=>`<div class="chip">S${i+1} ${s.reps||'?'}×${s.weight||'0'}kg</div>`).join('')}</div>${w.notes?`<div class="henotes">${w.notes}</div>`:''}</div><button class="hedel" onclick="delW('${w.id}')">&#10005;</button></div>`;

function renderProgressStatsHeader(period){
  const hdr=document.getElementById('pst3Header');if(!hdr)return;
  const now=new Date();const td=today();
  let curStart,prevStart,prevEnd;
  if(period==='week'){
    curStart=new Date(now);curStart.setDate(now.getDate()-6);
    prevStart=new Date(curStart);prevStart.setDate(prevStart.getDate()-7);
    prevEnd=new Date(curStart);prevEnd.setDate(prevEnd.getDate()-1);
  } else {
    curStart=new Date(now.getFullYear(),now.getMonth(),1);
    prevStart=new Date(now.getFullYear(),now.getMonth()-1,1);
    prevEnd=new Date(curStart);prevEnd.setDate(prevEnd.getDate()-1);
  }
  const cs=curStart.toISOString().slice(0,10);
  const ps=prevStart.toISOString().slice(0,10);
  const pe=prevEnd.toISOString().slice(0,10);
  const curStats=IronLogFitness.trainingStats(DB.workouts,cs,td);
  const prevStats=IronLogFitness.trainingStats(DB.workouts,ps,pe);
  const curSess=curStats.sessions;
  const prevSess=prevStats.sessions;
  const curVol=Math.round(curStats.volume);
  const prevVol=Math.round(prevStats.volume);
  const curSets=curStats.sets;
  const prevSets=prevStats.sets;
  function fmt(cur,prv){
    const d=cur-prv;if(!prv&&!cur)return'';
    const sign=d>0?'+':'';const col=d>0?'var(--success)':d<0?'var(--red)':'var(--t3)';
    return`<div class="pst3-col-delta" style="color:${col}">${sign}${d}</div>`;
  }
  function fmtVol(kg){return kg>=1000?(kg/1000).toFixed(1)+'t':kg+'kg'}
  hdr.innerHTML=`<div class="pst3-hdr">
    <div class="pst3-hdr-top">
      <div class="pst3-hdr-title">${period==='week'?'This Week':'This Month'}</div>
      <div class="pst3-toggle">
        <button class="pst3-tbtn${period==='week'?' active':''}" onclick="renderProgressStats('week')">Week</button>
        <button class="pst3-tbtn${period==='month'?' active':''}" onclick="renderProgressStats('month')">Month</button>
      </div>
    </div>
    <div class="pst3-cols">
      <div class="pst3-col">
        <div class="pst3-col-num">${curSess}</div>
        <div class="pst3-col-lbl">Sessions</div>
        ${fmt(curSess,prevSess)}
      </div>
      <div class="pst3-col">
        <div class="pst3-col-num">${fmtVol(curVol)}</div>
        <div class="pst3-col-lbl">Volume</div>
        ${fmt(curVol,prevVol)}
      </div>
      <div class="pst3-col">
        <div class="pst3-col-num">${curSets}</div>
        <div class="pst3-col-lbl">Sets</div>
        ${fmt(curSets,prevSets)}
      </div>
    </div>
  </div>`;
}
let _radarChart=null;
function lineChartSVG(labels,data,color,unit){
  const W=640,H=220,pad={l:44,r:18,t:18,b:36};
  const nums=(data||[]).map(v=>Number(v)||0);
  if(nums.length<2)return '<div class="no-data">Not enough chart data yet</div>';
  const min=Math.min(...nums),max=Math.max(...nums),range=(max-min)||1;
  const x=i=>pad.l+(i/(nums.length-1))*(W-pad.l-pad.r);
  const y=v=>pad.t+(1-(v-min)/range)*(H-pad.t-pad.b);
  const pts=nums.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area=`${pts} ${x(nums.length-1).toFixed(1)},${H-pad.b} ${pad.l},${H-pad.b}`;
  const last=nums[nums.length-1];
  const first=nums[0];
  const delta=last-first;
  const labelEvery=Math.max(1,Math.ceil(labels.length/4));
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Trend chart">
    <defs><linearGradient id="lineGrad${Math.round(Math.random()*1e6)}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".22"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <g stroke="rgba(245,241,232,.06)" stroke-width="1">${[0,1,2,3].map(i=>`<line x1="${pad.l}" x2="${W-pad.r}" y1="${pad.t+i*(H-pad.t-pad.b)/3}" y2="${pad.t+i*(H-pad.t-pad.b)/3}"/>`).join('')}</g>
    <polygon points="${area}" fill="rgba(255,107,53,.12)"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    ${nums.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="${i===nums.length-1?4:2.5}" fill="${color}"><title>${labels[i]||''}: ${v}${unit||''}</title></circle>`).join('')}
    <text x="${pad.l}" y="14" fill="var(--t2)" font-size="10">${min.toFixed(0)}-${max.toFixed(0)}${unit||''}</text>
    <text x="${W-pad.r}" y="14" text-anchor="end" fill="${delta>=0?'var(--success)':'var(--red)'}" font-size="10">${delta>=0?'+':''}${delta.toFixed(0)}${unit||''}</text>
    ${labels.map((l,i)=>i%labelEvery===0||i===labels.length-1?`<text x="${x(i).toFixed(1)}" y="${H-10}" text-anchor="middle" fill="var(--t3)" font-size="9">${esc(l)}</text>`:'').join('')}
  </svg>`;
}
function radarChartSVG(labels,data,colors){
  const W=320,H=220,cx=160,cy=112,r=76;
  const nums=(data||[]).map(v=>Number(v)||0);
  const max=Math.max(1,...nums);
  const n=labels.length;
  if(n<3)return '';
  const point=(i,scale=1)=>{
    const a=-Math.PI/2+(i/n)*Math.PI*2;
    return [cx+Math.cos(a)*r*scale,cy+Math.sin(a)*r*scale];
  };
  const poly=nums.map((v,i)=>point(i,v/max).map(x=>x.toFixed(1)).join(',')).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Muscle coverage radar">
    <g fill="none" stroke="rgba(245,241,232,.07)" stroke-width="1">${[.33,.66,1].map(s=>`<polygon points="${labels.map((_,i)=>point(i,s).map(x=>x.toFixed(1)).join(',')).join(' ')}"/>`).join('')}</g>
    <g stroke="rgba(245,241,232,.07)" stroke-width="1">${labels.map((_,i)=>{const p=point(i);return `<line x1="${cx}" y1="${cy}" x2="${p[0].toFixed(1)}" y2="${p[1].toFixed(1)}"/>`}).join('')}</g>
    <polygon points="${poly}" fill="rgba(255,107,53,.16)" stroke="rgba(255,107,53,.85)" stroke-width="2.5"/>
    ${nums.map((v,i)=>{const p=point(i,v/max);return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" fill="${colors[i]||'#ff6b35'}"><title>${esc(labels[i])}: ${v}</title></circle>`}).join('')}
    ${labels.map((l,i)=>{const p=point(i,1.23);return `<text x="${p[0].toFixed(1)}" y="${p[1].toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="var(--t2)" font-size="9">${esc(l)}</text>`}).join('')}
  </svg>`;
}

function renderBW(){
  document.getElementById('bwDate').value=today();
  const chartSlot=document.getElementById('bwChartSlot');

    if(entries.length){
      const latest=entries[0];
      const curW=parseNum(latest.weight);

      const m30=new Date();m30.setDate(m30.getDate()-30);
      const m30str=m30.toISOString().slice(0,10);
      const oldEntry=entries.find(e=>e.date<=m30str);

        const d=(curW-parseNum(oldEntry.weight)).toFixed(1);

        const coords=vals.map((v,i)=>`${((i/(vals.length-1))*W).toFixed(1)},${(H-(v-mn)/rng*(H-10)-5).toFixed(1)}`).join(' ');

        </svg>`;
      }
      // Goal bar
      let goalBarHTML='';
      if(DB.bwGoal){
        const g=DB.bwGoal,target=parseNum(g.target);
        const startW=sortedAsc.length?parseNum(sortedAsc[0].weight):curW;
        const total=Math.abs(target-startW)||1;
        const done=Math.abs(curW-startW);
        const pct=Math.min(100,Math.round(done/total*100));
        const rem=Math.abs(curW-target).toFixed(1);
        goalBarHTML=`<div class="bw3-goal-bar"><div class="bw3-goal-fill" style="width:${pct}%"></div></div>
          <div class="bw3-goal-txt"><span>Goal · ${target}kg</span><span>${rem}kg to go</span></div>`;

  <div class="empty-state-msg">No weight logged yet</div>
  <div class="empty-state-sub">Enter your weight above to start tracking your progress over time.</div>
</div>`;return;
  }
  const diffMap={};
  for(let i=1;i<sortedAsc.length;i++){diffMap[sortedAsc[i].id]=(parseNum(sortedAsc[i].weight)-parseNum(sortedAsc[i-1].weight)).toFixed(1)}
  listEl.innerHTML=`<div class="bw-list-hdr">HISTORY</div>${entries.map(e=>{
    const d=diffMap[e.id];const sign=d>0?'+':'';

    const wantsLose=goalDir==='lose'||goalDir==='down';
    let col;
    if(d===undefined||d==0)col='var(--t2)';
    else if(wantsGain)col=d>0?'#22c55e':'#ef4444';
    else if(wantsLose)col=d>0?'#ef4444':'#22c55e';

    const badge=d!==undefined?`<div class="bw-diff" style="color:${col}">${sign}${d}</div>`:'';
    return`<div class="bw-entry"><div class="bw-date">${fd(e.date)}</div><div class="bw-kg">${e.weight} kg</div>${badge}<button class="bw-del" onclick="delBW('${e.id}')">&#10005;</button></div>`;

function renderBWGoalCard(){
  const g=DB.bwGoal;
  const entries=[...(DB.bodyWeights||[])].sort((a,b)=>a.date.localeCompare(b.date));
  const current=entries.length?parseNum(entries[entries.length-1].weight):null;
  let goalHTML='';
  if(g){
    const target=parseNum(g.target);const dir=g.direction==='gain'?'Gain to':'Lose to';let progBar='';
    if(current!==null&&entries.length>1){
      const start=parseNum(entries[0].weight);const total=Math.abs(target-start);const done=Math.abs(current-start);
      const pct=total>0?Math.min(100,Math.round(done/total*100)):100;const onTrack=g.direction==='lose'?current<=start:current>=start;
      const barCol=onTrack?'#22c55e':'#ef4444';

function openSummary(spId){
  const sp=DB.splits.find(s=>s.id===spId);const td=today();
  const todayAll=DB.workouts.filter(w=>w.date===td&&(w.splitId===spId||w.splitId===null));
  if(!todayAll.length){
    document.getElementById('sumBox').innerHTML=`<div class="sum-hd"><div class="sum-title">Summary</div><button class="sum-close" onclick="closeSummary()">&#10005;</button></div><div style="text-align:center;padding:50px 0;color:var(--t3)">No exercises logged today yet.</div>`;
    document.getElementById('sumOv').classList.add('open');return;
  }
  const summary=IronLogFitness.sessionSummary(DB.workouts,spId,td);
  const {totalSets,muscles,prs}=summary;
  let html=`<div class="sum-hd"><div class="sum-title">${sp?.name||'Summary'}</div><button class="sum-close" onclick="closeSummary()">&#10005;</button></div>
  <div class="sum-date">${fd(td)}</div>
  <div class="sum-stats">
    <div class="sum-stat"><div class="sum-stat-val">${summary.durationMinutes?summary.durationMinutes+'m':'—'}</div><div class="sum-stat-lbl">Duration</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${prs.length}</div><div class="sum-stat-lbl">PRs</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${summary.exercises.length}</div><div class="sum-stat-lbl">Exercises</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${totalSets}</div><div class="sum-stat-lbl">Sets</div></div>
  </div>`;
  if(muscles.length){
    html+=`<div class="sum-mg"><div class="sum-mg-lbl">Muscles Worked</div><div class="sum-mg-chips">${muscles.map(m=>`<div class="sum-mg-chip" style="color:${cc(m)};border-color:${cc(m)}44">${CAT_LBL[m]||m}</div>`).join('')}</div></div>`;
  }
  html+=`<div class="sum-sec"><div class="sum-sec-lbl" style="color:var(--t3)">Exercises</div>`;
  summary.exercises.forEach(w=>{
    const isPR=prs.find(p=>p.exId===w.exId);
    const todayV=w.todayVolume||0;const lastV=w.lastVolume||0;
    let prog='';
    if(lastV>0){
      const diff=todayV-lastV;const pct=Math.round(Math.abs(diff)/lastV*100);
      const cls=diff>0?'up':diff<0?'dn':'eq';const sign=diff>0?'+':'';
      prog=`<div class="sum-prog"><div class="sum-prog-pill ${cls}">${sign}${pct}%</div><div class="sum-prog-vs">vs last time</div></div>`;
    }
    html+=`<div class="sum-ex">
      <div class="sum-ex-nm">${w.name}${isPR?'<span class="sum-pr-badge">PR</span>':''}</div>
      <div class="sum-chips">${w.sets.map((s,i)=>`<div class="sum-chip">S${i+1} ${s.reps||'?'}×${s.weight||'0'}kg</div>`).join('')}</div>
      ${prog}${w.notes?`<div style="font-size:10px;color:var(--t3);margin-top:5px;font-style:italic">${w.notes}</div>`:''}
    </div>`;
  });
  const sessKeyN=`${td}|${spId||'solo'}`;
  if(!DB.sessionNotes)DB.sessionNotes={};
  const sessNote=DB.sessionNotes[sessKeyN]||'';
  html+=`<div class="sum-sec" style="margin-top:8px"><div class="sum-sec-lbl" style="color:var(--t3)">Session Note</div><textarea class="sum-note" placeholder="How did this session feel?" oninput="saveSessionNote('${sessKeyN}',this.value)">${sessNote.replace(/"/g,'&quot;')}</textarea></div>`;
  html+=`</div><button class="ss-btn" onclick="closeSummary()">&#10003; Done</button>`;
  document.getElementById('sumBox').innerHTML=html;
  document.getElementById('sumOv').classList.add('open');
}

// ── Recap v3 ───────────────────────────────────────────────────────────────────
function renderRecap(){
  // v3: recapContent already exists inside progress-sub-recap
  const el=document.getElementById('recapContent');
  if(!el)return;
  renderRecapContent('week');
}
function renderRecapContent(period){
  const el=document.getElementById('recapContent');
  if(!el)return;
  const now=new Date();const td=today();
  let startDate;
  if(period==='week'){startDate=new Date(now);startDate.setDate(now.getDate()-6)}
  else{startDate=new Date(now);startDate.setDate(1)}
  const startStr=startDate.toISOString().slice(0,10);
  const prev=period==='week'?new Date(startDate):new Date(startDate);
  if(period==='week')prev.setDate(prev.getDate()-7);
  else prev.setMonth(prev.getMonth()-1);
  const prevEnd=new Date(startDate);prevEnd.setDate(prevEnd.getDate()-1);
  const prevStartStr=prev.toISOString().slice(0,10);
  const prevEndStr=prevEnd.toISOString().slice(0,10);
  const curStats=IronLogFitness.trainingStats(DB.workouts,startStr,td);
  const prevStats=IronLogFitness.trainingStats(DB.workouts,prevStartStr,prevEndStr);
  const curW=curStats.workouts;
  const curSessions=curStats.sessions;
  const prevSessions=prevStats.sessions;
  const curVol=Math.round(curStats.volume);
  const prevVol=Math.round(prevStats.volume);
  const curSets=curStats.sets;
  const prevSets=prevStats.sets;
  const curPRs=IronLogFitness.personalRecordCount(DB.workouts,startStr,td);
  function fmtVol(kg){return kg>=1000?(kg/1000).toFixed(1)+'t':kg+'kg'}
  function delta(cur,prv,fmt){
    if(!prv&&prv!==0)return'';const d=cur-prv;const sign=d>0?'+':'';
    const col=d>0?'var(--success)':d<0?'var(--red)':'var(--t3)';
    const val=fmt?fmt(Math.abs(d)):(sign+d);
    return`<div class="rc3-stat-delta" style="color:${col}">${d>0?'+':''}${fmt?fmt(d):d} vs prev</div>`;
  }
  const periodLabel=period==='week'?'Last 7 days':`${startDate.toLocaleString('default',{month:'long'})} ${startDate.getFullYear()}`;
  // Body weight card
  const bwEntries=[...(DB.bodyWeights||[])].filter(e=>e.date>=startStr).sort((a,b)=>a.date.localeCompare(b.date));
  let bwHTML='';
  if(bwEntries.length>=2){
    const first=parseNum(bwEntries[0].weight);const last=parseNum(bwEntries[bwEntries.length-1].weight);
    const diff=(last-first).toFixed(1);const isPos=parseFloat(diff)>0;
    const sign=isPos?'+':'';
    bwHTML=`<div class="rc3-bw">
      <div class="rc3-bw-lbl">Body Weight</div>
      <div class="rc3-bw-row">
        <span class="rc3-bw-from">${first}</span>
        <span class="rc3-bw-arrow">→</span>
        <span class="rc3-bw-to">${last}<small style="font-size:18px;color:var(--t3)">kg</small></span>
        <span class="rc3-bw-delta" style="color:${isPos?'var(--red)':'var(--success)'}">${sign}${diff}kg</span>
      </div>
    </div>`;
  }
  // Highlights
  const muscleFreq=IronLogFitness.muscleFrequency(DB.workouts,startStr,td);
  const topMuscle=Object.entries(muscleFreq).sort((a,b)=>b[1]-a[1])[0];
  let hlItems='';
  if(curPRs>0)hlItems+=`<div class="rc3-hl-item green"><div class="rc3-hl-icon">🏆</div><div><div class="rc3-hl-title">${curPRs} Personal Record${curPRs!==1?'s':''}</div><div class="rc3-hl-sub">New bests set this ${period}</div></div></div>`;
  if(topMuscle)hlItems+=`<div class="rc3-hl-item orange"><div class="rc3-hl-icon">💪</div><div><div class="rc3-hl-title">Most trained: ${CAT_LBL[topMuscle[0]]||topMuscle[0]}</div><div class="rc3-hl-sub">${topMuscle[1]} set${topMuscle[1]!==1?'s':''} logged</div></div></div>`;
  // Auto insight line
  let insightText='';
  if(!curSessions){insightText='No workouts logged yet. Start training to see your recap.';}
  else if(curSessions>prevSessions&&prevSessions>0){insightText=`More active than last ${period} — ${curSessions} vs ${prevSessions} session${prevSessions!==1?'s':''}. Keep it up! 🔥`;}
  else if(curVol>prevVol&&prevVol>0){const pct=Math.round((curVol-prevVol)/prevVol*100);insightText=`Volume is up ${pct}% vs last ${period}. Strong progress. 📈`;}
  else if(curPRs>0){insightText=`Hit ${curPRs} personal record${curPRs!==1?'s':''} this ${period}. New territory. 🏆`;}
  else if(curSessions>0){insightText=`${curSessions} session${curSessions!==1?'s':''} logged this ${period}. Consistency is the foundation.`;}
  el.innerHTML=`<div class="rc3-wrap">
    <div class="rc3-pills">
      <button class="rc3-pill${period==='week'?' active':''}" onclick="renderRecapContent('week')">Week</button>
      <button class="rc3-pill${period==='month'?' active':''}" onclick="renderRecapContent('month')">Month</button>
    </div>
    <div class="rc3-period">${periodLabel}</div>
    ${insightText?`<div class="rc3-insight"><div class="rc3-insight-icon">✦</div><div class="rc3-insight-text">${insightText}</div></div>`:''}
    <div class="rc3-grid">
      <div class="rc3-stat">
        <div class="rc3-stat-num">${curSessions}</div>
        <div class="rc3-stat-lbl">Workouts</div>
        ${delta(curSessions,prevSessions)}
      </div>
      <div class="rc3-stat">
        <div class="rc3-stat-num">${fmtVol(curVol)}</div>
        <div class="rc3-stat-lbl">Volume</div>
        ${delta(curVol,prevVol,(v)=>(v>0?'+':'')+fmtVol(Math.abs(v)))}
      </div>
      <div class="rc3-stat">
        <div class="rc3-stat-num">${curSets}</div>
        <div class="rc3-stat-lbl">Sets</div>
        ${delta(curSets,prevSets)}
      </div>
      <div class="rc3-stat">
        <div class="rc3-stat-num">${curPRs}</div>
        <div class="rc3-stat-lbl">PRs</div>
      </div>
    </div>
    ${hlItems?`<div class="rc3-hl-lbl">Highlights</div><div class="rc3-hl">${hlItems}</div>`:''}
    ${bwHTML}
  </div>`;
}

function importData(e){

  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=IronLogStorage.parseBackup(ev.target.result);
      IronLogStorage.writeStoredDB(localStorage,dbKey(),d);DB=loadDB();
      renderSidebar();updateStreak();

function renderSubnav(view){
  const sn = document.getElementById('subnav');
  if (!sn) return;
  const subs = (typeof IronLogNav!=='undefined') ? (IronLogNav.SUBS[view]||[]) : [];
  const coming = (typeof IronLogNav!=='undefined') && IronLogNav.isComingSoon(view, DB && DB.settings);
  if (!subs.length || coming){ sn.classList.add('hidden'); sn.innerHTML=''; return; }
  const active = navState.sub[view];
  sn.classList.remove('hidden');
  sn.innerHTML = subs.map(s=>`<button class="subnav-tab${s===active?' on':''}" onclick="setSub('${view}','${s}')">${s}</button>`).join('');

function screenTarget(view, sub){
  if (view==='home') return {page:'page-today', render:renderToday};
  if (view==='fitness') return ({
    Home:{page:'page-home', render:renderHome},
    Train:{page:'page-train', render:renderTrainTab},
    Progress:{page:'page-progress-hub', render:()=>switchProgressTab(_activeProgressSub,false)},
    History:{page:'page-history', render:renderHistory}
  })[sub] || {page:'page-home', render:renderHome};
  if (view==='nutrition') return ({
    Today:{page:'page-nutrition', render:renderNutrition},
    Foods:{page:'page-nutrition', render:renderNutritionFoods},
    Trends:{page:'page-nutrition', render:renderNutritionTrends}
  })[sub] || {page:'page-nutrition', render:renderNutrition};
  if (view==='sleep') return {page:'page-sleep', render:renderSleep};
  if (view==='finance') return {page:'page-finance', render:renderFinance};
  return {page:'page-today', render:renderToday};
}
function navigate(view, sub){
  const prevView = navState.view;
  if (typeof IronLogNav!=='undefined'){
    navState = IronLogNav.setView(navState, view);
    if (sub && IronLogNav.SUBS[view] && IronLogNav.SUBS[view].indexOf(sub)!==-1) navState = IronLogNav.setSubFor(navState, view, sub);
    view = navState.view;
  } else { navState.view = view; if (sub) navState.sub[view]=sub; }
  const useSub = (IronLogNav && IronLogNav.SUBS[view] && IronLogNav.SUBS[view].length) ? navState.sub[view] : '';
  _activeTab = (view==='home') ? 'fitness' : view;

  applyDomainAccent(view);
  triggerDomainMotion(view);
  updateWordmark(view);
  updateBottomBarActive(view);
  renderSubnav(view);
  haptic(8);

  const target = screenTarget(view, useSub);
  const goingRight = _NAV_ORDER.indexOf(view) >= _NAV_ORDER.indexOf(prevView);
  const animClasses = ['tab-enter-right','tab-enter-left','tab-exit-right','tab-exit-left'];
  const prevPage = document.querySelector('.page.active');
  const newPage = document.getElementById(target.page);
  if (prevPage && prevPage !== newPage){
    animClasses.forEach(c=>prevPage.classList.remove(c));
    prevPage.classList.add(goingRight?'tab-exit-right':'tab-exit-left');
    setTimeout(()=>{prevPage.classList.remove('active','tab-exit-right','tab-exit-left');},220);
  } else if (prevPage && prevPage!==newPage){ prevPage.classList.remove('active'); }
  if (newPage){
    animClasses.forEach(c=>newPage.classList.remove(c));
    if (prevPage!==newPage) newPage.classList.add('active', goingRight?'tab-enter-right':'tab-enter-left');
    setTimeout(()=>newPage.classList.remove('tab-enter-right','tab-enter-left'),300);
  }
  if (typeof target.render==='function') target.render();

  // persist nav position (optional fields; no data rewrite)
  if (DB && DB.app){
    DB.app.activeDomain = _activeTab;
    if (typeof IronLogNav!=='undefined'){ const p=IronLogNav.toPersisted(navState); DB.app.lastView=p.lastView; DB.app.lastSub=p.lastSub; }
    saveDB();
  }
}

// ── Best streak ───────────────────────────────────────────────────────────────
function calcBestStreak() {
  const dates = [...new Set(DB.workouts.map(w => w.date))].sort();
  if (!dates.length) return 0;
  let best = 1, cur = 1;
  for (let i = 1; i < dates.length; i++) {
    const gap = Math.round((new Date(dates[i]) - new Date(dates[i-1])) / 86400000);
    if (gap === 1) { cur++; best = Math.max(best, cur); }
    else cur = 1;
  }
  return best;
}

  const lostTop = IronLogFitness.longLostExercises(DB.exercises, DB.workouts, todayStr, 7, 3);

  const suggCard = suggestion ? (() => {
    const col = suggestion.sp.color ? cv(suggestion.sp.color) : 'var(--acc)';
    const rows = suggestion.exList.map(e => {
      const lastStr = e.last ? `last ${maxWt(e.last.sets)}kg · ${e.last.sets.length}×${Math.round(e.last.sets.reduce((a,s)=>a+parseNum(s.reps),0)/e.last.sets.length)}` : 'no data yet';
      return `<div class="hc-today-row"><span class="hc-today-nm">${e.name}</span><span class="hc-today-last">${lastStr}</span></div>`;
    }).join('');
    const sub = suggestion.daysSince === null ? 'Never trained' : suggestion.daysSince === 0 ? 'Last trained today' : `Last trained ${suggestion.daysSince}d ago`;
    const spId = suggestion.sp.id;
    return `<div class="hc-card hc-today" onclick="switchTab('train');setTimeout(()=>goToSplit('${spId}'),80)">
      <div class="hc-today-meta"><span class="hc-today-dot"></span>Suggested · ${sub}</div>
      <div class="hc-today-name">${suggestion.sp.name.split(' ').length > 1
        ? suggestion.sp.name.replace(/(\S+)\s+(.+)/,'$1 <em>$2</em>')
        : suggestion.sp.name}</div>
      ${rows ? `<div class="hc-today-list">${rows}</div>` : ''}
      <button class="hc-today-cta" onclick="event.stopPropagation();switchTab('train');setTimeout(()=>goToSplit('${spId}'),80)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start workout

    </div>`;
  })() : `<div class="hc-card hc-empty-cta">
    <div class="hc-lbl">Get started</div>
    <div class="hc-today-name">Create your <em>first</em> day</div>
    <button class="hc-today-cta" onclick="switchTab('train');setTimeout(addSplit,200)">+ Create workout day</button>
  </div>`;

  const barsHtml = dayVols.map((v,i) => {
    const h = Math.max(4, Math.round((v/maxDV)*36));
    const isToday = days7[i] === todayStr;
    return `<div class="hc-bar${isToday?' hc-bar-today':''}" style="height:${h}px"></div>`;
  }).join('');

  const dotsHtml = weekDayLabels.map((lbl,i) => {
    const lit = trained.has(weekDates[i]);
    const isToday = i === todayDow;
    return `<div class="hc-streak-dot${lit?' hc-streak-lit':''}${isToday?' hc-streak-today':''}">${lbl}</div>`;
  }).join('');

  const bwCard = latBW && latBW.weight ? `<div class="hc-card hc-bw" onclick="switchTab('progress');setTimeout(()=>switchProgressTab('bodyweight'),50)">
    <div class="hc-lbl">Body Weight</div>
    <div class="hc-bw-row">
      <div>
        <div class="hc-bw-num">${parseNum(latBW.weight).toFixed(1)}<span class="hc-bw-unit">kg</span></div>
        ${bwDelta !== null ? `<div class="hc-delta ${bwDelta<=0?'hc-delta-up':'hc-delta-dn'}">${bwDelta<=0?'↓':'↑'} ${Math.abs(bwDelta).toFixed(1)}kg this month</div>` : ''}
      </div>
      ${bwSvg}
    </div>
    ${DB.bwGoal ? (() => {
      const g=DB.bwGoal, cur=parseNum(latBW.weight), goal=parseNum(g.kg);
      const start=g.start?parseNum(g.start):cur, total=Math.abs(goal-start)||1;
      const done=Math.abs(cur-start), pct=Math.min(100,Math.round(done/total*100));
      const rem=Math.abs(cur-goal).toFixed(1);
      return `<div class="hc-goal-bar"><div class="hc-goal-fill" style="width:${pct}%"></div></div>
        <div class="hc-goal-txt"><span>Goal · ${goal}kg</span><span>${rem}kg to go</span></div>`;
    })() : ''}
  </div>` : '';

  const lostCard = lostTop.length ? `<div class="hc-card hc-lost">
    <div class="hc-lbl">Haven't trained in a while</div>
    ${lostTop.map(e => `<div class="hc-lost-row">
      <div><div class="hc-lost-nm">${e.name}</div><div class="hc-lost-sub">last · ${fd(e.date)}</div></div>
      <div class="hc-lost-pill">${e.ds}d ago</div>
    </div>`).join('')}
  </div>` : '';

  pg.innerHTML = `<div class="hc-scroll">
    ${suggCard}
    <div class="hc-grid2">
      <div class="hc-card hc-stat" onclick="switchTab('progress')">
        <div class="hc-lbl">This week</div>
        <div class="hc-big">${weekVolDisp}<span class="hc-unit">kg</span></div>
        <div class="hc-delta ${volDeltaClass}">${volDeltaStr} vs last</div>
        <div class="hc-spark">${barsHtml}</div>
      </div>
      <div class="hc-card hc-stat">
        <div class="hc-lbl">Streak</div>
        <div class="hc-big">${streak}<span class="hc-unit">days</span></div>
        <div class="hc-delta flat">best · ${best}</div>
        <div class="hc-dots">${dotsHtml}</div>
      </div>
    </div>
    ${bwCard}
    ${lostCard}
  </div>`;
  applyMotionStagger(pg,'.hc-card');
}

function _domIcon(d,size){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="${size||20}" height="${size||20}">${DOMAIN_ICON[d]||''}</svg>`}

// Polished Coming-Soon screen (Sleep/Finance) — gated, never deletes data.
const COMING_SOON = {

}

function renderToday(){
  const pg=document.getElementById('todayContent'); if(!pg) return;
  const todayStr=today();
  const yd=new Date(); yd.setDate(yd.getDate()-1); const yStr=yd.toISOString().slice(0,10);
  const now=new Date();
  const hr=now.getHours();
  const greet=hr<12?'morning':hr<17?'afternoon':'evening';
  const dayLbl=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // ── source data (defensive: never let one empty domain blank the hub) ──
  let splitSugg=null, streak=0, sleepSum={loggedDays:0,avgDurationMinutes:0,consistencyMinutes:0,logs:[]}, finSum={total:0,budget:0,remaining:0}, ntot={calories:0,protein:0,carbs:0,fat:0}, ntar={calories:0,protein:0};
  try{ splitSugg=IronLogFitness.leastRecentSplitSuggestion(DB.splits,DB.exercises,DB.workouts,todayStr); }catch(_){}
  try{ streak=calcStreak(); }catch(_){}
  try{ sleepSum=sleepWeeklySummary(todayStr); }catch(_){}
  try{ finSum=financeMonthSummary(); }catch(_){}
  try{ const nday=nutritionDay(todayStr); ntot=nutritionTotals(nday); ntar=nutritionTarget(nday); }catch(_){}
  const lastSleep=(DB.sleep&&DB.sleep.logs&&DB.sleep.logs[0])||null;
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

  // ── suggestions (pure engine) ──
  let suggestions=[];
  try{
    const ctx={
      fitness: splitSugg?{split:{id:splitSugg.sp.id,name:splitSugg.sp.name},daysSince:splitSugg.daysSince,streak}:{streak},
      sleep: {loggedDays:sleepSum.loggedDays,consistencyMinutes:sleepSum.consistencyMinutes,lastLog:lastSleep,targetMinutes:420},
      nutrition: {calories:ntot.calories,calorieTarget:ntar.calories,protein:ntot.protein,proteinTarget:ntar.protein},
      finance: {budget:finSum.budget,spent:finSum.total,dayOfMonth:now.getDate(),daysInMonth:dim}
    };
    suggestions=IronLogInsights.homeSuggestions(ctx,4);
  }catch(_){}

  // ── recap helpers ──
  const ySets=DB.workouts.filter(w=>w.date===yStr).reduce((a,w)=>a+((w.sets&&w.sets.length)||0),0);
  const sessions7=new Set(DB.workouts.filter(w=>{const d=new Date(w.date);return (now-d)/86400000<=7;}).map(w=>w.date)).size;
  const ySleep=(DB.sleep&&DB.sleep.logs||[]).find(l=>l.date===yStr);
  const ySpend=(DB.finance&&DB.finance.expenses||[]).filter(x=>x.date===yStr).reduce((a,x)=>a+(Number(x.amount)||0),0);
  const yNut=(DB.nutrition&&DB.nutrition.diary&&DB.nutrition.diary[yStr])?nutritionTotals(DB.nutrition.diary[yStr]):null;
  const rc=(d,name,val,sub,subColor)=>`<div class="td-rc" onclick="enterDomain('${d}')"><div class="td-rc-edge" style="background:var(--${d})"></div>
    <div class="td-rc-top"><span class="td-rc-dot" style="background:var(--${d})"></span><span class="td-rc-name">${name}</span></div>
    <div class="td-rc-val">${val}</div><div class="td-rc-sub"${subColor?` style="color:${subColor}"`:''}>${sub}</div></div>`;

  const recapDay=`<div class="td-recap${_todayRev==='day'?' show':''}" data-rev="day" style="display:${_todayRev==='day'?'grid':'none'}">
    ${rc('fitness','Fitness', ySets?`${ySets}<small>sets</small>`:'Rest<small>day</small>', ySets?'Trained yesterday':'No session logged')}
    ${rc('nutrition','Nutrition', yNut?`${yNut.calories}<small>kcal</small>`:'—', yNut?'Logged yesterday':'No food logged')}
    ${rc('sleep','Sleep', ySleep?`${Math.floor(ySleep.durationMinutes/60)}h ${ySleep.durationMinutes%60}<small>m</small>`:'—', ySleep?`bed ${esc(ySleep.bedtime)}`:'No sleep logged')}
    ${rc('finance','Finance', ySpend?`€${nRound(ySpend)}<small>spent</small>`:'€0', 'Yesterday')}
  </div>`;
  const avgH=Math.floor(sleepSum.avgDurationMinutes/60), avgM=sleepSum.avgDurationMinutes%60;
  const recapWeek=`<div class="td-recap${_todayRev==='week'?' show':''}" data-rev="week" style="display:${_todayRev==='week'?'grid':'none'}">
    ${rc('fitness','Fitness', `${sessions7}<small>sessions</small>`, 'Last 7 days')}
    ${rc('nutrition','Nutrition', `${ntot.calories}<small>kcal</small>`, 'Today so far')}
    ${rc('sleep','Sleep', sleepSum.loggedDays?`${avgH}h ${avgM}<small>avg</small>`:'—', `${sleepSum.loggedDays}/7 nights`)}
    ${rc('finance','Finance', finSum.budget?`€${nRound(finSum.total)}<small>of ${nRound(finSum.budget)}</small>`:`€${nRound(finSum.total)}<small>spent</small>`, 'This month')}
  </div>`;

  // ── suggestion cards ──
  const suggHtml = suggestions.length ? suggestions.map((s,i)=>{
    const cta = s.cta ? `<button class="td-sg-cta" onclick="enterDomain('${s.cta.view}');setSub('${s.cta.view}','${s.cta.sub}');${s.cta.splitId?`setTimeout(()=>goToSplit('${jsa(s.cta.splitId)}'),90)`:''}">${_domIcon('fitness',13)}${esc(s.cta.label)}</button>` : '';
    return `<div class="td-sg" id="td-sg-${i}">
      <div class="td-sg-ic" style="background:${DOMAIN_RGBA[s.domain]};color:var(--${s.domain})">${_domIcon(s.domain,20)}</div>
      <div class="td-sg-body"><div class="td-sg-dom" style="color:var(--${s.domain})">${s.domain}</div><div class="td-sg-txt">${s.text}</div>${cta}</div>
      <button class="td-sg-x" onclick="document.getElementById('td-sg-${i}').remove()">✕</button>
    </div>`;
  }).join('') : `<div class="td-sg"><div class="td-sg-body"><div class="td-sg-txt" style="color:var(--t2)">Nothing urgent — log a workout, meal or sleep and your daily focus shows up here.</div></div></div>`;

  // ── jump-in tiles ──
  const tileVal={
    fitness: splitSugg?`${esc(splitSugg.sp.name)} suggested · ${DB.workouts.length} logs`:`${DB.workouts.length} logs`,
    nutrition: `${ntot.calories} / ${ntar.calories||0} today`,
    sleep: _enabled('sleep')?`${sleepSum.loggedDays}/7 logged`:'Coming soon',
    finance: _enabled('finance')?`€${nRound(finSum.total)} spent`:'Coming soon'
  };
  const tile=(d,nm)=>`<div class="td-tile" onclick="enterDomain('${d}')"><div class="td-t-glow" style="background:var(--${d})"></div>
    <div class="td-t-top"><span class="td-t-ic" style="background:${DOMAIN_RGBA[d]};color:var(--${d})">${_domIcon(d,15)}</span><span class="td-t-nm">${nm}</span></div>
    <div class="td-t-val">${tileVal[d]}</div></div>`;

  pg.innerHTML=`<div class="td-scroll">
    <div class="td-greet"><div class="td-day">${dayLbl}</div><div class="td-hi">Good <em>${greet}</em></div></div>
    <div class="td-seg" id="tdSeg">
      <button class="${_todayRev==='day'?'on':''}" onclick="setTodayRecap('day')">Yesterday</button>
      <button class="${_todayRev==='week'?'on':''}" onclick="setTodayRecap('week')">Last 7 days</button>
    </div>
    ${recapDay}${recapWeek}
    <div class="td-seclbl"><span class="td-pip"></span>Today's focus</div>
    <div class="td-sugg">${suggHtml}</div>
    <div class="td-seclbl"><span class="td-pip"></span>Jump in</div>
    <div class="td-tiles">${tile('fitness','Fitness')}${tile('nutrition','Nutrition')}${tile('sleep','Sleep')}${tile('finance','Finance')}</div>
  </div>`;
  applyMotionStagger(pg,'.td-rc,.td-sg,.td-tile');
}
function setTodayRecap(r){
  _todayRev=r;
  document.querySelectorAll('#tdSeg button').forEach(b=>b.classList.toggle('on', b.textContent.toLowerCase().includes(r==='day'?'yesterday':'7')));
  document.querySelectorAll('[data-rev]').forEach(el=>{const on=el.dataset.rev===r; el.style.display=on?'grid':'none'; el.classList.toggle('show',on);});
}

// ── N7: Markdown export for AI analysis (Step 25) ─────────────────────────────
function exportMarkdown() {
  ensureDB();
  const td = today();
  const lines = [];
  lines.push(`# IronLog Training Data`);
  lines.push(`Exported: ${td}\n`);

  // --- Summary stats ---
  const exportData = IronLogFitness.markdownExportData(DB.workouts, td);
  const totalSessions = exportData.summary.totalSessions;
  const totalVol = Math.round(exportData.summary.totalVolume);
  const totalSets = exportData.summary.totalSets;
  lines.push(`## Summary`);
  lines.push(`- Total sessions: ${totalSessions}`);
  lines.push(`- Total volume: ${totalVol} kg`);
  lines.push(`- Total sets logged: ${totalSets}\n`);

  // --- Personal records ---
  const prs = exportData.personalRecords;
  lines.push(`## Personal Records`);
  prs.forEach(p => {
    const top = p.sets.find(s=>parseNum(s.weight)===p.weight);
    const reps = top ? top.reps : '?';
    lines.push(`- **${p.name}** (${CAT_LBL[p.cat]||p.cat}): ${p.weight}kg × ${reps} reps — ${p.date}`);
  });
  lines.push('');

  // --- Last 8 weeks volume by muscle group ---
  lines.push(`## Volume Last 8 Weeks (by muscle group)`);
  Object.entries(exportData.volumeByCategory).sort((a,b)=>b[1]-a[1]).forEach(([cat,v])=>{
    lines.push(`- ${CAT_LBL[cat]||cat}: ${Math.round(v)} kg`);
  });
  lines.push('');

  // --- Recent sessions (last 20) ---
  lines.push(`## Recent Sessions (last ${exportData.recentSessions.length})`);
  exportData.recentSessions.forEach(sess=>{
    const dayW = sess.workouts;
    const cats = sess.categories.map(cat=>CAT_LBL[cat]||cat).join(', ');
    const dayVol = Math.round(sess.volume);
    lines.push(`\n### ${sess.date} — ${cats}`);
    if (dayVol) lines.push(`Volume: ${dayVol} kg`);
    dayW.filter(w=>w.cat!=='cardio'&&w.exId).forEach(w=>{
      const setStr = w.sets.map(s=>`${parseNum(s.weight)}kg×${s.reps}`).join(', ');
      lines.push(`- ${w.name}: ${setStr}`);
    });
    dayW.filter(w=>w.cat==='cardio').forEach(w=>{
      lines.push(`- Cardio: ${w.duration||'?'}min${w.calories?' · '+w.calories+'kcal':''}`);
    });
  });
  lines.push('');

  // --- Body weight ---
  if ((DB.bodyWeights||[]).length) {
    const bwSorted = [...DB.bodyWeights].sort((a,b)=>a.date.localeCompare(b.date));
    lines.push(`## Body Weight Log (last 30 entries)`);
    bwSorted.slice(-30).forEach(e=>lines.push(`- ${e.date}: ${e.weight} kg`));
    lines.push('');
    if (DB.bwGoal) lines.push(`**Goal:** ${DB.bwGoal.kg} kg\n`);
  }

  lines.push(...nutritionMarkdownLines());

  const md = lines.join('\n');
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ironlog-ai-${td}.md`;
  a.click();
  toast('Markdown exported ✦');
}

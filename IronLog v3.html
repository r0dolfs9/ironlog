.pr-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r-md);padding:16px;transition:border-color .15s
}
.pr-card:hover{border-color:var(--border-hi)}
.pr-val{font-family:'Instrument Serif',serif;font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.pr-unit{font-size:13px;color:var(--t2);font-weight:400}
.pr-lbl{font-size:9px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.chart-box{margin:0 14px 14px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:16px}
.cbt{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
.cw{position:relative;height:150px}
.pr-ex-list{padding:0 14px 14px;display:flex;flex-direction:column;gap:7px}
.pr-ex-row{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);
  padding:13px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s
}
.pr-ex-row:hover{border-color:var(--border-hi)}
.pre-nm{flex:1;font-size:13px;font-weight:600}
.pre-val{font-family:'Geist Mono',monospace;font-size:11px;color:var(--t2);text-align:right}
.no-data{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px}

/* ── Body Weight */
.bw-card{margin:14px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
.bw-card-title{font-family:'Instrument Serif',serif;font-size:16px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.nut-wrap{padding:0 14px 20px;display:flex;flex-direction:column;gap:14px}
.nut-card{background:var(--glass);backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
.nut-kicker{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.nut-cal-row{display:flex;align-items:center;justify-content:space-between;gap:14px}
.nut-cal{font-family:'Instrument Serif',serif;font-size:54px;line-height:.9;color:var(--text)}
.nut-cal span{font-family:'Geist',sans-serif;font-size:12px;color:var(--t3);margin-left:4px}
.nut-pill{font-size:11px;font-weight:700;color:var(--acc);background:var(--acc-dim);border:1px solid rgba(255,107,53,.22);border-radius:999px;padding:7px 10px}
.nut-bars{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.nut-bar-top{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:5px}
.nut-bar-track{height:7px;background:var(--s3);border-radius:99px;overflow:hidden}
.nut-bar-fill{height:100%;background:var(--acc);border-radius:99px}
.nut-meal{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.nut-meal:last-child{border-bottom:0}
.nut-meal-name{font-size:14px;font-weight:700}
.nut-meal-sub{font-size:11px;color:var(--t3);margin-top:2px}
.nut-add{width:100%;border:0;border-radius:var(--r-md);padding:14px;background:var(--acc);color:#130b06;font-weight:800}
.nut-secondary{width:100%;border:1.5px solid var(--border);border-radius:var(--r-md);padding:13px;background:var(--glass);color:var(--text);font-weight:800}
.nut-recipe-row{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 12px;display:flex;justify-content:space-between;gap:10px;align-items:center}
.nut-recipe-row strong{font-size:13px}
.nut-recipe-row span{font-size:11px;color:var(--t3)}
.bw-row{display:flex;gap:8px;align-items:flex-end}
.bw-field{flex:1}
.bw-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.bw-inp{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  color:var(--text);font-family:'Geist Mono',monospace;font-size:16px;
  padding:11px;outline:none;text-align:center;-webkit-appearance:none;transition:border-color .15s
}
.bw-inp:focus{border-color:var(--acc)}
.bw-add{
  padding:11px 18px;border-radius:var(--r-md);
  background:var(--acc);border:none;color:#000;
  font-family:'Instrument Serif',serif;font-size:14px;font-weight:800;
  cursor:pointer;white-space:nowrap;align-self:flex-end;
  transition:opacity .15s,box-shadow .2s
}
.bw-add:hover{box-shadow:0 4px 18px var(--acc-glow)}
.bw-add:active{opacity:.8}
.bw-list{padding:0 14px 14px}
.bw-list-hdr{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);padding:4px 0 12px}
.bw-entry{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.bw-date{font-size:12px;color:var(--t2);flex:1}
.bw-kg{font-family:'Geist Mono',monospace;font-size:16px;color:var(--acc);margin-right:12px;letter-spacing:-.3px}
.bw-diff{font-size:11px;font-weight:700;margin-right:10px}
.bw-del{background:none;border:none;color:var(--t3);font-size:15px;cursor:pointer;padding:2px 6px;transition:color .15s}
.bw-del:hover{color:var(--red)}

/* ── Summary overlay */
.sum-ov{
  position:fixed;inset:0;z-index:400;
  background:rgba(8,8,11,.97);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:none;flex-direction:column;
  padding:calc(var(--safe-top) + 16px) 0 calc(var(--safe-bot) + 16px);
  overflow-y:auto;-webkit-overflow-scrolling:touch
}
.sum-ov.open{display:flex;animation:fadeIn .22s ease}
.sum-box{width:100%;max-width:480px;margin:0 auto;padding:0 18px}
.sum-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sum-title{font-family:'Instrument Serif',serif;font-size:24px;font-weight:800;letter-spacing:-.5px}
.sum-close{
  width:36px;height:36px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .15s
}
.sum-close:hover{background:var(--s3);color:var(--text)}
.sum-date{font-size:11px;color:var(--t3);margin-bottom:16px}
.sum-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
.sum-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;text-align:center}
.sum-stat-val{font-family:'Instrument Serif',serif;font-size:24px;font-weight:800;color:var(--acc);line-height:1}
.sum-stat-lbl{font-size:9px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:1.5px}
.sum-mg{margin-bottom:18px}
.sum-mg-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:9px}
.sum-mg-chips{display:flex;flex-wrap:wrap;gap:7px}
.sum-mg-chip{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:600;border:1.5px solid}
.sum-sec{margin-bottom:18px}
.sum-sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:9px}
.sum-ex{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-bottom:7px}
.sum-ex-nm{font-size:13px;font-weight:600;margin-bottom:7px}
.sum-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.sum-chip{font-family:'Geist Mono',monospace;font-size:10px;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.sum-prog{display:flex;align-items:center;gap:8px;margin-top:7px}
.sum-prog-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.sum-prog-pill.up{color:#22c55e;background:rgba(34,197,94,.12)}
.sum-prog-pill.dn{color:#ef4444;background:rgba(239,68,68,.12)}
.sum-prog-pill.eq{color:var(--t2);background:var(--s3)}
.sum-prog-vs{font-size:10px;color:var(--t3)}
.sum-pr-badge{
  display:inline-block;margin-left:7px;
  background:var(--acc);color:#000;
  font-family:'Instrument Serif',serif;font-size:9px;font-weight:800;
  padding:2px 8px;border-radius:100px;letter-spacing:.5px;vertical-align:middle
}
.ss-btn{
  width:100%;padding:15px;border-radius:var(--r-md);margin-top:9px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);font-family:'Instrument Serif',serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:background .15s
}
.ss-btn:hover{background:var(--s3)}

/* ── Sheet */
.ov-dark{
  position:fixed;inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:200;display:none
}
.ov-dark.open{display:block;animation:fadeIn .2s ease}
.sheet{
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:var(--s1);border-radius:var(--r-xl) var(--r-xl) 0 0;
  border-top:1px solid var(--border);
  padding:16px 18px calc(var(--safe-bot) + 20px);
  z-index:201;transform:translateY(100%);
  transition:transform .3s var(--ease)
}
.sheet.open{transform:translateY(0)}
.sh-handle{width:36px;height:4px;border-radius:2px;background:var(--s4);margin:0 auto 18px}
.sh-title{font-family:'Instrument Serif',serif;font-size:18px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.sh-inp{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  color:var(--text);font-family:'Geist',system-ui,sans-serif;font-size:15px;
  padding:13px 14px;outline:none;margin-bottom:14px;transition:border-color .15s
}
.sh-inp:focus{border-color:var(--acc)}
.sh-acts{display:flex;gap:9px}
.sh-cancel{
  flex:1;padding:14px;border-radius:var(--r-md);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:14px;font-weight:600;cursor:pointer;
  transition:background .15s
}
.sh-cancel:hover{background:var(--s3);color:var(--text)}
.sh-ok{
  flex:2;padding:14px;border-radius:var(--r-md);
  background:var(--acc);border:none;color:#000;
  font-family:'Instrument Serif',serif;font-size:14px;font-weight:800;cursor:pointer;
  transition:opacity .15s,box-shadow .2s
}
.sh-ok:hover{box-shadow:0 4px 18px var(--acc-glow)}
.sh-ok:active{opacity:.8}
.sheet.settings-sheet{
  box-sizing:border-box;
  max-height:calc(100dvh - 16px);
  display:flex;flex-direction:column;
  padding-bottom:calc(var(--safe-bot) + 14px)
}
.settings-body{
  min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  margin:0 -18px;padding:0 18px 16px;
  display:flex;flex-direction:column;gap:16px
}
.settings-footer{
  flex-shrink:0;margin:0 -18px calc(var(--safe-bot) * -1);
  padding:12px 18px calc(var(--safe-bot) + 12px);
  border-top:1px solid var(--border);
  background:linear-gradient(180deg,rgba(0,0,0,0),var(--s1) 18%);
  display:flex;gap:8px
}
.settings-data-btn,.settings-back-btn{
  width:100%;border-radius:var(--r-lg);padding:14px 16px;
  font-family:'Geist',system-ui,sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:opacity .15s,transform .1s;text-align:center
}
.settings-data-btn{background:var(--acc);border:none;color:#100904}
.settings-back-btn{background:var(--s2);border:1px solid var(--border);color:var(--text)}
.settings-data-btn:active,.settings-back-btn:active{opacity:.82;transform:scale(.99)}

/* ── Confirm */
.conf-ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:300;display:none;align-items:center;justify-content:center;padding:20px
}
.conf-ov.open{display:flex;animation:fadeIn .15s ease}
.conf-box{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:26px 22px;width:100%;max-width:300px;text-align:center
}
.conf-msg{font-size:14px;line-height:1.65;margin-bottom:20px}
.conf-btns{display:flex;gap:9px}
.c-no{
  flex:1;padding:13px;border-radius:var(--r-md);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer
}
.c-yes{
  flex:1;padding:13px;border-radius:var(--r-md);
  background:rgba(255,85,85,.1);border:1px solid rgba(255,85,85,.28);
  color:#ff6b6b;font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;
  transition:background .15s
}
.c-yes:active{background:rgba(255,85,85,.2)}

/* ── Toast */
.toast{
  position:fixed;bottom:calc(80px + var(--safe-bot) + 12px);left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--glass);border:1px solid var(--border-hi);
  border-left:3px solid var(--acc);
  backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
  padding:10px 18px;border-radius:var(--r-lg);
  font-size:13px;font-weight:500;font-family:'Geist',sans-serif;
  opacity:0;transition:all .24s var(--ease);
  pointer-events:none;white-space:nowrap;z-index:500;
  box-shadow:0 8px 32px rgba(0,0,0,.45);
  display:flex;align-items:center;gap:10px
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-check{
  width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  border:1.5px solid var(--success);background:rgba(127,176,105,.14);color:var(--success);
  transform:scale(.4);opacity:0
}
.toast-check svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:34;stroke-dashoffset:34}
.toast.motion-save .toast-check{animation:savePop .48s var(--spring) .04s forwards}
.toast.motion-save .toast-check svg{animation:saveDraw .34s var(--ease) .27s forwards}
.toast.motion-pr{border-left-color:var(--acc);box-shadow:0 8px 32px rgba(0,0,0,.45),0 0 28px -14px var(--acc)}
.toast.motion-pr .toast-check{border-color:var(--acc);background:var(--acc-dim);color:var(--acc);animation:savePop .5s var(--spring) forwards}
.toast.motion-pr .toast-check svg{animation:saveDraw .34s var(--ease) .25s forwards}
@keyframes savePop{to{transform:scale(1);opacity:1}}
@keyframes saveDraw{to{stroke-dashoffset:0}}

/* ── Rest Timer — SVG Ring */
.rest-ov{
  position:fixed;inset:0;
  background:rgba(10,9,8,.55);
  backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);
  z-index:700;display:none;align-items:flex-end;justify-content:center
}
.rest-ov.show{display:flex;animation:fadeIn .18s ease}
.rest-ov-box{
  text-align:center;
  width:100%;max-width:480px;
  display:flex;flex-direction:column;align-items:center;
  background:var(--glass);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  border-top:1px solid var(--border-hi);
  box-shadow:0 -24px 64px -16px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);
  padding:8px 28px calc(28px + var(--safe-bot));
  animation:slideUp .3s var(--ease);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.rest-sheet-handle{width:36px;height:4px;background:var(--s4);border-radius:2px;margin:12px auto 20px}
.rest-ov-label{
  font-size:10px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--t3);margin-bottom:20px
}
.rest-ring-wrap{position:relative;width:190px;height:190px;margin-bottom:22px}
.rest-ring{width:190px;height:190px;transform:rotate(-90deg)}
.rest-ring-bg{fill:none;stroke:var(--s3);stroke-width:6}
.rest-ring-fg{
  fill:none;stroke:var(--acc);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:565.5;stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 12px rgba(255,107,53,.5))
}
.rest-ring-inner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center
}
.rest-ov-num{
  font-family:'Instrument Serif',serif;font-size:82px;font-weight:400;
  color:var(--text);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-3px
}
.rest-ov-hint{
  font-size:11px;color:var(--t2);font-family:'Geist Mono',monospace;
  margin-top:5px;min-height:16px;letter-spacing:.2px;
  max-width:160px;text-align:center;line-height:1.4
}
.rest-ov-adj{display:flex;gap:12px;justify-content:center;align-items:center}
.rest-ov-presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.sum-note{
  width:100%;min-height:64px;resize:vertical;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 12px;color:var(--t1);font-family:inherit;font-size:13px;line-height:1.4;
  outline:none;transition:border-color .15s
}
.sum-note:focus{border-color:var(--acc)}
.rest-preset{
  padding:7px 14px;border-radius:999px;
  background:var(--s2);border:1px solid var(--border);color:var(--t2);
  font-family:'Geist Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:all .15s
}
.rest-preset:hover{border-color:var(--acc);color:var(--acc)}
.rest-preset:active{transform:scale(.94)}
.rest-adj-btn{
  padding:11px 18px;border-radius:var(--r-md);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s
}
.rest-adj-btn:hover{border-color:var(--border-hi);color:var(--text)}
.rest-skip-btn{
  padding:14px 32px;border-radius:100px;
  background:var(--acc);border:none;color:#000;
  font-family:'Instrument Serif',serif;font-size:15px;font-weight:800;
  cursor:pointer;letter-spacing:.2px;
  transition:opacity .15s,box-shadow .2s;
  box-shadow:0 4px 22px var(--acc-glow)
}
.rest-skip-btn:hover{box-shadow:0 6px 30px rgba(201,255,71,.38)}
.rest-skip-btn:active{opacity:.8}
.rest-ov-off{
  display:block;margin:24px auto 0;background:none;border:none;
  color:var(--t3);font-family:'Geist',system-ui,sans-serif;font-size:11px;cursor:pointer;
  text-decoration:underline;text-underline-offset:3px;transition:color .15s
}
.rest-ov-off:hover{color:var(--red)}
.sb-rest-toggle{font-size:10px}

/* ── Mobile overlay */
.sb-ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:49;display:none
}
.sb-ov.open{display:block;animation:fadeIn .2s ease}

/* ── Responsive */
@media (max-width:600px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:50}
  .sidebar.open{transform:translateX(0)}
  .hmbgr{display:flex}
  .sc-b{width:40px;height:40px;font-size:20px}
  .dk{width:40px;height:40px}
  .ex-del{width:38px;height:38px}
  .hmbgr{width:40px;height:40px}
  .sb-btn{padding:11px 18px}
  .ex-list{gap:12px;padding:14px 12px 0}
  .sp-ex-list{gap:8px}
  .ex-head{padding:16px 14px}
  .sf{padding:12px 6px;font-size:16px}
  .sh-cancel,.sh-ok{padding:16px;font-size:15px}
  .sav-btn{padding:16px;font-size:16px}
}
@media (orientation:landscape) and (max-height:500px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:50}
  .sidebar.open{transform:translateX(0)}
  .hmbgr{display:flex}
  .topbar{padding:6px 16px}
  .pg-hdr{padding:10px 16px 8px}
  .pg-title{font-size:20px}
  .sp-hdr{padding:10px 16px 8px}
  .sp-title{font-size:18px}
  .page{padding-bottom:40px}
  .sb-logo{padding:12px 16px 10px}
  .sb-logo h1{font-size:18px}
}

::-webkit-scrollbar{width:0}

/* ── Edit mode */
.edit-banner{
  background:rgba(201,255,71,.07);border-bottom:1px solid var(--acc);
  color:var(--acc);font-size:10px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;text-align:center;padding:9px 16px
}
.sp-hdr-edit{gap:10px}
.sp-edit-colors-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 18px 8px}
.sp-cat-edit-wrap{display:flex;align-items:flex-start;gap:0}
.sp-cat-edit-inner{flex:1;min-width:0;position:relative}
.sec-reorder{display:flex;flex-direction:column;gap:4px;padding:14px 6px 0 12px;flex-shrink:0}
.sec-move-btn{
  width:30px;height:30px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s
}
.sec-move-btn:hover{background:var(--s3);border-color:var(--border-hi);color:var(--text)}
.sec-move-btn:active{border-color:var(--acc);color:var(--acc)}
.sec-move-btn.disabled{opacity:.25;cursor:default}
.sec-remove{
  position:absolute;top:10px;right:14px;z-index:2;
  background:var(--s2);border:1px solid var(--border);
  color:var(--t3);font-size:13px;cursor:pointer;border-radius:var(--r-sm);
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:all .12s
}
.sec-remove:hover{color:var(--red);border-color:rgba(255,85,85,.4)}
.sp-edit-tools{padding:16px 16px 22px;display:flex;flex-direction:column;gap:9px}
.sp-add-sec-btn{
  width:100%;padding:12px;border-radius:var(--r-md);
  background:none;border:1.5px dashed var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s
}
.sp-add-sec-btn:hover{border-color:var(--acc);color:var(--acc)}
.sp-del-split-btn{
  width:100%;padding:12px;border-radius:var(--r-md);
  background:rgba(255,85,85,.07);border:1px solid rgba(255,85,85,.18);
  color:#ff6b6b;font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s
}
.sp-del-split-btn:hover{background:rgba(255,85,85,.13)}
.addsec-list{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:4px}
.addsec-item{
  display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:var(--r-md);
  background:none;border:1.5px solid;font-family:'Geist',system-ui,sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s
}
.addsec-item.used{opacity:.4;cursor:default}
.addsec-item:not(.used):active{opacity:.6}
.addsec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sp-edit-btn{
  padding:8px 13px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .12s
}
.sp-edit-btn:hover{border-color:var(--border-hi);color:var(--text)}
.sp-done-btn{
  padding:9px 16px;border-radius:var(--r-sm);
  background:var(--acc);border:none;color:#000;
  font-family:'Instrument Serif',serif;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0
}
.sp-done-btn:active{opacity:.75}
.sp-name-inp{
  flex:1;background:var(--s2);border:1.5px solid var(--acc);border-radius:var(--r-sm);
  color:var(--text);font-family:'Instrument Serif',serif;font-size:18px;font-weight:800;
  padding:9px 13px;outline:none;min-width:0
}
.sp-color-dot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;flex-shrink:0;transition:all .15s
}
.sp-color-dot.sel{border-color:var(--text);box-shadow:0 0 0 2px var(--bg)}

/* ── Exercise Picker */
.picker-ov{
  position:fixed;inset:0;background:var(--bg);z-index:350;
  display:none;flex-direction:column;padding-top:var(--safe-top)
}
.picker-ov.open{display:flex;animation:fadeIn .2s ease}
.picker-wrap{display:flex;flex-direction:column;height:100%}
.picker-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0
}
.picker-title{font-family:'Instrument Serif',serif;font-size:18px;font-weight:800}
.picker-list{flex:1;overflow-y:auto;padding:0 16px 10px}
.picker-group{margin-bottom:14px}
.picker-group-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:12px 0 7px}
.picker-row{
  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--r-md);
  cursor:pointer;border:1px solid var(--border);margin-bottom:6px;background:var(--s1);transition:all .15s
}
.picker-row:hover{background:var(--s2);border-color:var(--border-hi)}
.picker-row.checked{background:var(--s2);border-color:var(--acc)}
.picker-check{
  width:22px;height:22px;border-radius:var(--r-sm);
  flex-shrink:0;background:var(--s2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s
}
.picker-check.on{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
.picker-nm{flex:1;font-size:13px;font-weight:500}
.picker-cat{font-size:10px;font-weight:700;flex-shrink:0}
.picker-foot{
  padding:13px 16px calc(var(--safe-bot) + 13px);border-top:1px solid var(--border);
  display:flex;gap:9px;flex-shrink:0;background:var(--bg)
}

/* ── Body Weight Goal */
.bw-goal-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px}
.bw-goal-collapsed{text-align:center;padding:10px}
.bw-goal-open-btn{background:none;border:none;color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:4px;transition:color .15s}
.bw-goal-open-btn:hover{color:var(--acc)}
.bw-goal-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bw-goal-lbl{flex:1;font-size:13px;font-weight:600}
.bw-goal-edit{background:none;border:none;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:color .15s}
.bw-goal-edit:hover{color:var(--acc)}
.bw-goal-clear{background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;padding:2px 4px;transition:color .15s}
.bw-goal-clear:hover{color:var(--red)}
.bw-goal-prog{margin-top:7px}
.bw-goal-prog-bar{height:6px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:5px}
.bw-goal-prog-lbl{font-size:10px;color:var(--t2);font-family:'Geist Mono',monospace}
.bw-goal-form{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-bottom:10px}
.bw-goal-form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.bw-goal-dir-wrap{flex-shrink:0}
.bw-goal-dir{display:flex;gap:0;margin-top:5px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border)}
.bw-dir-btn{
  flex:1;padding:10px 14px;background:var(--s2);border:none;
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s
}
.bw-dir-btn.sel{background:var(--acc);color:#000}

/* ── Recap */
/* ── Recap v3 ──────────────────────────────────── */
.rc3-wrap{padding:16px 14px 24px;display:flex;flex-direction:column;gap:14px}
.rc3-pills{display:flex;gap:6px;padding:0 0 2px}
.rc3-pill{padding:7px 20px;border-radius:var(--r-pill);border:1.5px solid var(--border);
  background:transparent;color:var(--t2);font-size:12px;font-weight:600;
  letter-spacing:.4px;cursor:pointer;transition:all .15s}
.rc3-pill.active{background:var(--acc);border-color:var(--acc);color:#fff}
.rc3-period{font-size:10px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 2px}
.rc3-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rc3-stat{background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);
  border-radius:var(--r-xl);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04);
  padding:16px 18px;display:flex;flex-direction:column;gap:4px}
.rc3-stat-num{font-family:'Instrument Serif',serif;font-size:42px;line-height:1;color:var(--text)}
.rc3-stat-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.rc3-stat-delta{font-size:11px;font-weight:600;margin-top:2px}
.rc3-insight{background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(255,179,138,.08));
  border:1.5px solid rgba(255,107,53,.25);border-radius:var(--r-xl);padding:16px 18px;
  display:flex;align-items:center;gap:12px}
.rc3-insight-icon{font-size:22px;flex-shrink:0}
.rc3-insight-text{font-size:13px;color:var(--text);line-height:1.5;font-weight:500}
.rc3-hl-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);padding:0 2px}
.rc3-hl{display:flex;flex-direction:column;gap:8px}
.rc3-hl-item{background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);
  border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.rc3-hl-item.green{border-left:3px solid var(--success)}
.rc3-hl-item.orange{border-left:3px solid var(--acc)}
.rc3-hl-icon{font-size:22px;flex-shrink:0}
.rc3-hl-title{font-size:13px;font-weight:700;margin-bottom:2px}
.rc3-hl-sub{font-size:11px;color:var(--t2);line-height:1.4}
.rc3-bw{background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);
  border-radius:var(--r-xl);padding:16px 18px;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04)}
.rc3-bw-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.rc3-bw-row{display:flex;align-items:baseline;gap:10px}
.rc3-bw-from{font-family:'Instrument Serif',serif;font-size:28px;color:var(--t2)}
.rc3-bw-arrow{font-size:16px;color:var(--t3)}
.rc3-bw-to{font-family:'Instrument Serif',serif;font-size:34px;color:var(--text)}
.rc3-bw-delta{font-size:12px;font-weight:700;margin-left:4px}
/* keep old classes for backward compat */
.recap-tabs,.recap-tab,.recap-period,.recap-stats,.recap-stat,.recap-stat-val,
.recap-stat-lbl,.recap-stat-delta,.recap-section-lbl,.recap-item,.recap-item.green,
.recap-item.orange,.recap-item-icon,.recap-item-title,.recap-item-sub,.recap-bw,
.recap-bw-lbl,.recap-bw-vals,.recap-bw-goal{display:none}

/* ── Empty states */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 24px 80px;text-align:center;gap:14px}
.empty-state-art{width:80px;height:80px;border-radius:50%;
  background:rgba(255,107,53,.08);border:1.5px solid rgba(255,107,53,.15);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  margin-bottom:4px}
.empty-state-icon{font-size:40px;opacity:.22}
.empty-state-msg{font-family:'Instrument Serif',serif;font-size:22px;
  font-weight:400;color:var(--text);letter-spacing:-.2px;line-height:1.25}
.empty-state-sub{font-size:13px;color:var(--t3);line-height:1.7;max-width:260px}
.empty-state-btn{margin-top:4px;padding:12px 24px;border-radius:var(--r-pill);
  border:none;background:var(--acc);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;box-shadow:0 8px 24px -8px var(--acc-glow);transition:opacity .15s}
.empty-state-btn:active{opacity:.8}
.sb-add-split{float:right;background:none;border:none;color:var(--t2);font-size:15px;font-weight:800;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s}
.sb-add-split:hover{color:var(--acc)}

/* ── Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageFade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes tabSlideInRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes tabSlideInLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:translateX(0)}}
@keyframes tabSlideOutRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-20px)}}
@keyframes tabSlideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

/* ══════════════════════════════════════════════════════
   HOME DASHBOARD CARDS — v3
   ══════════════════════════════════════════════════════ */
.hc-scroll{padding:6px 16px calc(16px + var(--safe-bot));display:flex;flex-direction:column;gap:12px}
.hc-card{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04);
  padding:20px;position:relative;overflow:hidden;
}
.hc-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}

/* Today hero card */
.hc-today{
  background:linear-gradient(155deg,#ff6b35 0%,#c44820 40%,#5a1e10 100%);
  padding:22px;cursor:pointer;
  box-shadow:0 30px 60px -20px rgba(255,107,53,0.45),inset 0 1px 0 rgba(255,255,255,0.12);
}
.hc-today::after{
  content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(255,255,255,0.16) 0%,transparent 70%);
  pointer-events:none;
}
.hc-today-meta{
  font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:6px;margin-bottom:8px;
  position:relative;z-index:1;
}
.hc-today-dot{width:6px;height:6px;border-radius:50%;background:#ffe3a3;box-shadow:0 0 8px #ffe3a3;flex-shrink:0}
.hc-today-name{
  font-family:'Instrument Serif',serif;
  font-size:46px;font-weight:400;letter-spacing:-1.2px;line-height:0.95;
  margin-bottom:14px;color:#fff;position:relative;z-index:1;
}
.hc-today-name em{font-style:italic;color:#ffe3a3}
.hc-today-list{display:flex;flex-direction:column;gap:0;margin-bottom:16px;position:relative;z-index:1}
.hc-today-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.10);font-size:13px;
}
.hc-today-row:last-child{border-bottom:none}
.hc-today-nm{font-weight:500;color:#fff}
.hc-today-last{font-family:'Geist Mono',monospace;font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:-.2px}
.hc-today-cta{
  background:rgba(255,255,255,0.95);color:#1a0e07;
  border:none;border-radius:var(--r-lg);padding:14px;width:100%;
  font-family:'Geist',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.1px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 8px 24px -8px rgba(0,0,0,0.35);cursor:pointer;
  position:relative;z-index:1;transition:opacity .15s;
}
.hc-today-cta:hover{opacity:.92}
.hc-empty-cta{background:linear-gradient(155deg,var(--s2) 0%,var(--s3) 100%);cursor:pointer}

/* Stats grid */
.hc-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hc-stat{padding:18px}
.hc-big{
  font-family:'Instrument Serif',serif;
  font-size:38px;font-weight:400;letter-spacing:-1.2px;line-height:1;margin:4px 0;
}
.hc-unit{font-size:13px;color:var(--t2);font-family:'Geist Mono',monospace;margin-left:3px}
.hc-delta{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:600;font-family:'Geist Mono',monospace;
  padding:3px 8px;border-radius:6px;margin-top:4px;
}
.hc-delta.up{color:var(--success);background:rgba(127,176,105,0.14)}
.hc-delta.dn{color:var(--red);background:rgba(212,51,47,0.12)}
.hc-delta.flat{color:var(--t2);background:rgba(168,161,149,0.10)}
.hc-delta.hc-delta-up{color:var(--success);background:rgba(127,176,105,0.14)}
.hc-delta.hc-delta-dn{color:var(--red);background:rgba(212,51,47,0.12)}
.hc-spark{display:flex;align-items:flex-end;gap:3px;height:40px;margin-top:10px}
.hc-bar{flex:1;background:var(--acc-soft);border-radius:3px 3px 0 0;opacity:0.8;min-height:4px;transition:height .3s}
.hc-bar-today{opacity:1;box-shadow:0 0 8px rgba(255,107,53,0.5)}
.hc-dots{display:flex;gap:4px;margin-top:10px}
.hc-streak-dot{
  flex:1;aspect-ratio:1;border-radius:50%;
  background:var(--s3);display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--t3);font-family:'Geist Mono',monospace;
}
.hc-streak-lit{background:var(--acc);color:#1a0e07;box-shadow:0 0 10px rgba(255,107,53,0.45)}
.hc-streak-today{box-shadow:0 0 0 2px var(--acc-soft),0 0 10px rgba(255,107,53,0.45)}

/* BW card */
.hc-bw{padding:20px;cursor:pointer}
.hc-bw-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.hc-bw-num{
  font-family:'Instrument Serif',serif;
  font-size:54px;font-weight:400;letter-spacing:-2px;line-height:0.9;color:var(--text);
}
.hc-bw-unit{font-size:16px;color:var(--t2);font-family:'Geist Mono',monospace;margin-left:3px}
.hc-goal-bar{height:5px;border-radius:3px;background:var(--s3);overflow:hidden;margin-top:12px}
.hc-goal-fill{height:100%;background:linear-gradient(90deg,var(--acc-soft),var(--acc));border-radius:3px;transition:width .5s}
.hc-goal-txt{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-top:5px;font-family:'Geist Mono',monospace}

/* Long lost card */
.hc-lost{padding:20px}
.hc-lost-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.hc-lost-row:last-child{border-bottom:none;padding-bottom:0}
.hc-lost-row:first-child{padding-top:4px}
.hc-lost-nm{font-size:14px;font-weight:500}
.hc-lost-sub{font-size:11px;color:var(--t3);margin-top:2px;font-family:'Geist Mono',monospace}
.hc-lost-pill{
  font-size:11px;font-family:'Geist Mono',monospace;font-weight:600;
  padding:4px 9px;border-radius:var(--r-pill);
  background:rgba(212,51,47,0.12);color:var(--red);
}

/* Progress sub-tabs content area */
.progress-sub{display:block}
#progressSubContent{
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  height:calc(100% - 52px);scrollbar-width:none;
}
#progressSubContent::-webkit-scrollbar{display:none}


/* ── History Heatmap ─────────────────────────────────── */
.hm-wrap{
  margin:14px 14px 4px;
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid var(--border);border-radius:var(--r-xl);
  padding:18px 16px 14px;
  box-shadow:var(--shadow);
}
.hm-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.hm-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.hm-sub{font-size:11px;color:var(--t2);font-family:'Geist Mono',monospace}
.hm-grid{display:flex;gap:4px;align-items:flex-start}
.hm-labels{display:flex;flex-direction:column;gap:2px;padding-top:1px;flex-shrink:0}
.hm-lbl{font-size:8px;color:var(--t3);font-family:'Geist Mono',monospace;height:10px;line-height:10px;width:10px;text-align:center}
.hm-cells{
  display:grid;
  grid-template-rows:repeat(7,10px);
  grid-auto-flow:column;
  gap:2px;
  flex:1;overflow:hidden;
}
.hm-cell{
  width:10px;height:10px;border-radius:2px;
  background:var(--s3);
  transition:opacity .15s;
}
.hm-cell:hover{opacity:.75;cursor:default}
.hm-today{box-shadow:0 0 0 1.5px var(--acc-soft)}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:10px;justify-content:flex-end}
.hm-legend .hm-cell{width:10px;height:10px;flex-shrink:0}


/* ── BW Hero (v3) ────────────────────────────────────── */
.bw3-hero{
  margin:0 14px 6px;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
  border:1px solid var(--border);border-radius:var(--r-xl);
  padding:22px 20px 16px;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04);
  overflow:hidden;
}
.bw3-top{display:flex;justify-content:space-between;align-items:flex-start}
.bw3-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.bw3-num{
  font-family:'Instrument Serif',serif;
  font-size:72px;font-weight:400;letter-spacing:-3px;line-height:0.9;color:var(--text);
}
.bw3-unit{font-size:20px;color:var(--t2);font-family:'Geist Mono',monospace;margin-left:4px;font-weight:400;letter-spacing:0}
.bw3-delta{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;font-family:'Geist Mono',monospace;
  padding:3px 9px;border-radius:6px;margin-top:10px;
  background:rgba(127,176,105,0.12);
}
.bw3-goal-bar{height:5px;border-radius:3px;background:var(--s3);overflow:hidden;margin-top:14px}
.bw3-goal-fill{height:100%;background:linear-gradient(90deg,var(--acc-soft),var(--acc));border-radius:3px;transition:width .5s}
.bw3-goal-txt{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-top:5px;font-family:'Geist Mono',monospace}

/* ══ V4 two-tier nav + Today hub ══════════════════════════════════════════ */
/* top-bar wordmark (replaces greeting title; taps back to Today) */
.tb-wordmark{display:flex;align-items:center;gap:9px;position:relative;flex:1;min-width:0;cursor:pointer;background:none;border:0;padding:0;text-align:left}
.tb-wordmark .tb-mk{width:24px;height:24px;display:block;flex-shrink:0}
.tb-wordmark .tb-nm{font-family:'Instrument Serif',serif;font-size:22px;letter-spacing:.2px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-wordmark .tb-home-dot{position:absolute;left:33px;bottom:-4px;width:16px;height:3px;border-radius:2px;background:var(--acc);box-shadow:0 0 8px var(--acc-glow);opacity:0;transition:opacity .2s}
.tb-wordmark.is-home .tb-home-dot{opacity:1}

/* TIER-2 segmented sub-nav */
.subnav{display:flex;gap:4px;padding:0 16px 10px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.subnav::-webkit-scrollbar{display:none}
.subnav.hidden{display:none}
.subnav-tab{flex:0 0 auto;font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--t2);background:transparent;border:0;padding:8px 14px;border-radius:var(--r-pill);cursor:pointer;transition:.15s var(--ease);white-space:nowrap}
.subnav-tab.on{background:color-mix(in srgb,var(--acc) 14%,transparent);color:var(--acc)}

/* Today insights hub */
.td-scroll{padding:0 2px 24px}
.td-greet{padding:4px 4px 16px}
.td-greet .td-day{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.td-greet .td-hi{font-family:'Instrument Serif',serif;font-size:30px;line-height:1.05;margin-top:5px}
.td-greet .td-hi em{font-style:italic;color:var(--acc-soft)}
.td-seg{display:inline-flex;gap:3px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-pill);padding:3px;margin-bottom:14px}
.td-seg button{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);background:transparent;border:0;padding:7px 14px;border-radius:var(--r-pill);cursor:pointer;transition:.15s var(--ease)}
.td-seg button.on{background:var(--acc-dim);color:var(--acc)}
.td-recap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.td-rc{background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden;cursor:pointer;transition:.15s var(--ease)}
.td-rc:active{transform:scale(.985)}
.td-rc .td-rc-edge{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.td-rc .td-rc-top{display:flex;align-items:center;gap:7px}
.td-rc .td-rc-dot{width:7px;height:7px;border-radius:50%}
.td-rc .td-rc-name{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}
.td-rc .td-rc-val{font-family:'Instrument Serif',serif;font-size:26px;line-height:1;letter-spacing:-.5px}
.td-rc .td-rc-val small{font-size:13px;color:var(--t2);font-family:'Geist',sans-serif}
.td-rc .td-rc-sub{font-size:11px;color:var(--t2)}
.td-seclbl{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin:2px 4px 12px}
.td-seclbl .td-pip{width:6px;height:6px;border-radius:50%;background:var(--acc)}
.td-sugg{display:flex;flex-direction:column;gap:10px;margin-bottom:26px}
.td-sg{display:flex;gap:13px;align-items:flex-start;background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px;position:relative;overflow:hidden}
.td-sg-ic{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.td-sg-ic svg{width:20px;height:20px}
.td-sg-body{flex:1;min-width:0}
.td-sg-dom{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.td-sg-txt{font-size:14px;line-height:1.4;color:var(--text)}
.td-sg-txt b{color:var(--text)}
.td-sg-cta{margin-top:11px;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:8px 13px;border-radius:var(--r-pill);border:1px solid var(--border-hi);background:rgba(245,241,232,.04);color:var(--text);cursor:pointer}
.td-sg-cta svg{width:13px;height:13px}
.td-sg-x{position:absolute;top:11px;right:12px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:13px;cursor:pointer;opacity:.6;border:0;background:none}
.td-sg-x:hover{opacity:1}
.td-tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.td-tile{background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 14px;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden;cursor:pointer;transition:.15s var(--ease)}
.td-tile:active{transform:scale(.985)}
.td-tile .td-t-glow{position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;opacity:.16;filter:blur(8px)}
.td-tile .td-t-top{display:flex;align-items:center;gap:8px}
.td-tile .td-t-ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.td-tile .td-t-ic svg{width:15px;height:15px}
.td-tile .td-t-nm{font-size:14px;font-weight:700}
.td-tile .td-t-val{font-family:'Geist Mono',monospace;font-size:12px;color:var(--t2);margin-top:2px}

/* Coming-Soon (Sleep/Finance) */
.cs-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 28px;gap:6px;min-height:60vh}
.cs-mk{margin-bottom:8px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.4))}
.cs-kick{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase}
.cs-h{font-family:'Instrument Serif',serif;font-size:34px;line-height:1.1;margin-top:8px;white-space:nowrap}
.cs-p{color:var(--t2);font-size:13.5px;line-height:1.55;margin-top:14px;max-width:280px}
.cs-list{margin-top:22px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:9px}
.cs-item{display:flex;align-items:center;gap:11px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;text-align:left;font-size:13px;color:var(--t2)}
.cs-item .cs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cs-foot{margin-top:20px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}
</style>
</head>
<body>
<div class="app">

<!-- TONING v3 SHELL — bottom tab nav, no sidebar -->

<!-- Hidden sidebar stub (JS references these IDs) -->
<nav class="sidebar" id="sidebar" style="display:none">
  <div id="sbSplits"></div>
  <div class="sb-footer">
    <input type="file" id="impF" accept=".json" style="display:none" onchange="importData(event)">
    <button class="sb-ftn sb-rest-toggle" id="restToggleBtn" onclick="toggleRestTimer()"></button>
    <div class="sb-streak" id="streakBadge"></div>
  </div>
</nav>
<div class="sb-ov" id="sbOv"></div>

<div class="main">
  <!-- Top context bar -->
  <div class="topbar" id="topbar">
    <button class="tb-wordmark is-home" id="tbWordmark" onclick="goToday()" title="Home">
      <span class="tb-mk" id="tbMark"></span>
      <span class="tb-nm" id="tbName">IronLog</span>
      <span class="tb-home-dot"></span>
      <span id="tbTitle" style="display:none"></span>
    </button>
    <button class="tb-gear" id="settingsBtn" onclick="showSettingsSheet()" title="Settings">&#9881;</button>
  </div>

  <!-- TIER-2 sub-nav (per-domain; hidden on Home & Coming-Soon) -->
  <div class="subnav hidden" id="subnav"></div>

  <!-- Page container -->
  <div class="pages" id="pages">

    <!-- TODAY (app home / insights hub) -->
    <div class="page active" id="page-today"><div id="todayContent"></div></div>

    <!-- FITNESS · Home sub-tab (dashboard) -->
    <div class="page" id="page-home"><div id="homeContent"></div></div>

    <!-- TRAIN — splits injected here dynamically -->
    <div class="page" id="page-train"><div id="trainContent"></div></div>

    <!-- NUTRITION -->
    <div class="page" id="page-nutrition"><div id="nutritionContent"></div></div>

    <!-- SLEEP -->
    <div class="page" id="page-sleep"><div id="sleepContent"></div></div>

    <!-- FINANCE -->
    <div class="page" id="page-finance"><div id="financeContent"></div></div>

    <!-- PROGRESS hub with sub-tabs -->
    <div class="page" id="page-progress-hub">
      <div class="subtabs" id="progressSubtabs">
        <button class="subtab active" onclick="switchProgressTab('progress')">Stats</button>
        <button class="subtab" onclick="switchProgressTab('prs')">Records</button>
        <button class="subtab" onclick="switchProgressTab('bodyweight')">Body Weight</button>
        <button class="subtab" onclick="switchProgressTab('recap')">Recap</button>
      </div>
      <div id="progressSubContent" style="overflow-y:auto;height:calc(100% - 52px)">
        <div id="progress-sub-progress" class="progress-sub active" style="overflow-y:auto">
          <div class="pst3-wrap">
            <div id="pst3Header"></div>
            <div id="pst3Radar"></div>
            <div class="pst3-section-lbl">Exercise Breakdown</div>
          </div>
          <div class="psel-wrap">
            <select class="psel" id="pSel" onchange="renderProgress()">
              <option value="">&#8212; Pick a muscle group &#8212;</option>
            </select>
          </div>
          <div id="progContent"><div class="no-data" style="padding:40px 20px;text-align:center;color:var(--t3)">Select a muscle group above</div></div>
        </div>
        <div id="progress-sub-prs" class="progress-sub" style="display:none"><div id="prsList"></div></div>
        <div id="progress-sub-bodyweight" class="progress-sub" style="display:none">
          <div id="bwChartSlot"></div>
          <div class="bw-card" style="margin:0 14px 14px">
            <div class="bw-card-title">Log Body Weight</div>
            <div class="bw-row">
              <div class="bw-field"><div class="bw-lbl">Date</div><input type="date" class="bw-inp" id="bwDate" style="font-size:13px;padding:10px 6px;"></div>
              <div class="bw-field"><div class="bw-lbl">Weight (kg)</div><input type="text" inputmode="decimal" class="bw-inp" id="bwKg" placeholder="75.0"></div>
              <button class="bw-add" onclick="saveBW()">Add</button>
            </div>
          </div>
          <div class="bw-list" id="bwList"></div>
        </div>
        <div id="progress-sub-recap" class="progress-sub" style="display:none"><div id="recapContent"></div></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="page" id="page-history"><div id="histList"></div></div>

  </div><!-- /pages -->

  <!-- Bottom tab bar -->
  <nav class="v3-tabs" id="v3TabBar">
    <button class="v3-tab active" id="tab-fitness" onclick="switchTab('fitness')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      Fitness
    </button>
    <button class="v3-tab" id="tab-nutrition" onclick="switchTab('nutrition')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19h16"/><path d="M7 19V9"/><path d="M12 19V5"/><path d="M17 19v-7"/></svg>
      Nutrition
    </button>
    <button class="v3-tab" id="tab-sleep" onclick="switchTab('sleep')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5A8.5 8.5 0 1 1 11.5 3a6.5 6.5 0 0 0 9.5 9.5Z"/></svg>
      Sleep
    </button>
    <button class="v3-tab" id="tab-finance" onclick="switchTab('finance')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16v10H4z"/><path d="M8 11h.01"/><path d="M16 13h.01"/><path d="M12 7v10"/></svg>
      Finance
    </button>
  </nav>

</div><!-- /main -->
</div><!-- /app -->


<!-- Rest Timer Overlay — SVG Ring -->
<div class="rest-ov" id="restOv" onclick="if(event.target===this)cancelRest()">
  <div class="rest-ov-box">
    <div class="rest-sheet-handle"></div>
    <div class="rest-ov-label">Rest</div>
    <div class="rest-ring-wrap">
      <svg class="rest-ring" viewBox="0 0 200 200">
        <circle class="rest-ring-bg" cx="100" cy="100" r="90"/>
        <circle class="rest-ring-fg" id="restRing" cx="100" cy="100" r="90"/>
      </svg>
      <div class="rest-ring-inner">
        <div class="rest-ov-num" id="restNum">90</div>
        <div class="rest-ov-hint" id="restHint"></div>
      </div>
    </div>
    <div class="rest-ov-presets">
      <button class="rest-preset" onclick="setRestPreset(60)">60s</button>
      <button class="rest-preset" onclick="setRestPreset(90)">90s</button>
      <button class="rest-preset" onclick="setRestPreset(120)">2m</button>
      <button class="rest-preset" onclick="setRestPreset(180)">3m</button>
    </div>
    <div class="rest-ov-adj">
      <button class="rest-adj-btn" onclick="adjustRestTime(-15)">&#8722;15s</button>
      <button class="rest-skip-btn" onclick="cancelRest()">Skip Rest</button>
      <button class="rest-adj-btn" onclick="adjustRestTime(15)">+15s</button>
    </div>
    <button class="rest-ov-off" onclick="disableRest()">Turn off rest timer</button>
  </div>
</div>

<!-- Exercise Picker -->
<div class="picker-ov" id="pickerOv">
  <div class="picker-wrap">
    <div class="picker-hdr">
      <div class="picker-title">Pick Exercises</div>
      <button class="sum-close" onclick="closePicker()">&#10005;</button>
    </div>
    <input class="sh-inp" id="pickerSearch" placeholder="Search..." oninput="filterPicker()" style="margin:0 16px 10px;width:calc(100% - 32px)">
    <div class="picker-list" id="pickerList"></div>
    <div class="picker-foot">
      <button class="sh-cancel" onclick="closePicker()">Cancel</button>
      <button class="sh-ok" onclick="confirmPicker()">Add Selected</button>
    </div>
  </div>
</div>

<!-- Sheet -->
<div class="ov-dark" id="shBg" onclick="closeSheet()"></div>
<div class="sheet" id="addSheet">
  <div class="sh-handle"></div>
  <div class="sh-title" id="shTitle">Add Exercise</div>
  <input class="sh-inp" id="shInp" placeholder="e.g. Incline DB Press" onkeydown="if(event.key==='Enter')doAdd()">
  <div class="sh-acts">
    <button class="sh-cancel" onclick="closeSheet()">Cancel</button>
    <button class="sh-ok" onclick="doAdd()">Add</button>
  </div>
</div>

<!-- Confirm -->
<div class="conf-ov" id="confOv">
  <div class="conf-box">
    <div class="conf-msg" id="confMsg"></div>
    <div class="conf-btns">
      <button class="c-no" onclick="resolveConf(false)">Cancel</button>
      <button class="c-yes" id="cYes" onclick="resolveConf(true)">Delete</button>
    </div>
  </div>
</div>

<!-- Summary -->
<div class="sum-ov" id="sumOv">
  <div class="sum-box" id="sumBox"></div>
</div>

<!-- Fullscreen Chart Overlay -->
<div class="fc-ov" id="fcOv" onclick="if(event.target===this)closeFullChart()">
  <div class="fc-box">
    <div class="fc-hd">
      <div>
        <div class="fc-ttl" id="fcTtl">Exercise</div>
        <div class="fc-sub" id="fcSub"></div>
      </div>
      <button class="fc-close" onclick="closeFullChart()">&#10005;</button>
    </div>
    <div class="fc-canvas-wrap"><div class="chart-skel full" id="fcChart-skel"></div><div id="fcChart" class="svg-chart full" style="display:none"></div></div>
    <div class="fc-foot">Top weight per session · all-time</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="welcomeOv" style="position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;box-sizing:border-box">
  <div style="font-size:36px;font-weight:800;color:var(--text);margin-bottom:6px;font-family:'Syne',sans-serif;letter-spacing:-1px">IronLog</div>
  <div style="font-size:14px;color:var(--t2);margin-bottom:52px;text-align:center">Your private strength tracker</div>
  <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px">
    <button onclick="document.getElementById('impF').click()" style="width:100%;padding:17px;border-radius:var(--r-lg);background:var(--acc);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Import backup</button>
    <button onclick="startFresh()" style="width:100%;padding:17px;border-radius:var(--r-lg);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--border);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">Start fresh</button>
  </div>
  <div style="margin-top:20px;font-size:11px;color:var(--t3);text-align:center">All data stays on your device</div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CAT_VAR = {
  chest:'--chest', triceps:'--triceps', back:'--back', biceps:'--biceps',
  legs:'--legs', shoulders:'--shoulders', abs:'--abs', forearms:'--forearms', cardio:'--cardio'
};
const CAT_LBL = {
  chest:'Chest', triceps:'Triceps', back:'Back', biceps:'Biceps',
  legs:'Legs', shoulders:'Shoulders', abs:'Abs', forearms:'Forearms', cardio:'Cardio'
};
const DEFAULT_SPLITS = [
  {id:'split-0', name:'Back & Bis',       color:'--back',    sections:[
    {type:'muscle',group:'back'},{type:'muscle',group:'biceps'},{type:'muscle',group:'forearms'},{type:'muscle',group:'abs'},{type:'cardio'}]},
  {id:'split-1', name:'Chest & Tris',     color:'--chest',   sections:[
    {type:'muscle',group:'chest'},{type:'muscle',group:'triceps'},{type:'muscle',group:'abs'},{type:'cardio'}]},
  {id:'split-2', name:'Legs',             color:'--legs',    sections:[
    {type:'muscle',group:'legs'},{type:'muscle',group:'abs'},{type:'cardio'}]},
  {id:'split-3', name:'Arms & Shoulders', color:'--biceps',  sections:[
    {type:'muscle',group:'biceps'},{type:'muscle',group:'triceps'},{type:'muscle',group:'forearms'},{type:'muscle',group:'shoulders'},{type:'muscle',group:'abs'},{type:'cardio'}]},
];
const SPLIT_COLORS = ['--back','--chest','--legs','--biceps','--shoulders','--triceps','--abs','--forearms','--cardio'];
const MUSCLES = ['chest','triceps','back','biceps','legs','shoulders','abs','forearms'];
const DEF = {
  chest:['Barbell Bench Press','Incline Dumbbell Press','Cable Fly'],
  triceps:['Tricep Pushdown','Skull Crusher','Overhead Tricep Extension'],
  back:['Deadlift','Barbell Row','Lat Pulldown'],
  biceps:['Barbell Bicep Curl','Hammer Curl','Preacher Curl'],
  legs:['Barbell Squat','Romanian Deadlift','Leg Press'],
  shoulders:['Overhead Press','Lateral Raise','Arnold Press'],
  abs:['Cable Crunch','Hanging Leg Raise','Ab Wheel Rollout'],
  forearms:['Wrist Curl','Reverse Wrist Curl','Farmer Walk'],
};

// ── Profile stubs (multi-profile removed; single-profile only) ────────────────
function getProfiles(){return[]}
function getActiveProfile(){return null}
function dbKey(){return IronLogStorage.dbKey()}
function hasSavedDB(){return !!IronLogStorage.readStoredDB(localStorage,dbKey()).db}

// ── Database ──────────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function loadDB(){
  let d=IronLogStorage.readStoredDB(localStorage,dbKey()).db;
  if(d){
    if(!d.exercises.forearms)d.exercises.forearms=DEF.forearms.map(n=>({id:uid(),name:n}));
    if(!d.bodyWeights)d.bodyWeights=[];
    if(!d.splits)d.splits=DEFAULT_SPLITS.map(s=>JSON.parse(JSON.stringify(s)));
    if(!d.bwGoal)d.bwGoal=null;

function foodSearchText(f){return `${f.name||''} ${f.category||''} ${f.source||''}`.toLowerCase()}
function searchFoodLibrary(query='',limit=24){
  const q=(query||'').trim().toLowerCase();
  const terms=q.split(/\s+/).filter(Boolean);
  const foods=foodLibrary();
  const scored=foods.map((f,idx)=>{
    const text=foodSearchText(f);
    let score=q?0:1;
    if(q&&text.includes(q))score+=8;
    terms.forEach(t=>{if((f.name||'').toLowerCase().includes(t))score+=4;else if(text.includes(t))score+=2});
    if(f.source==='private')score+=1.5;
    if(f.type==='recipe')score+=1;
    return {...f,matchLabel:`${f.category||f.source||'Food'} · ${f.per100g.calories} kcal · ${f.per100g.protein}P/${f.per100g.carbs}C/${f.per100g.fat}F per 100g`,_score:score,_idx:idx};
  }).filter(f=>!q||f._score>0);
  return scored.sort((a,b)=>b._score-a._score||a._idx-b._idx).slice(0,limit).map(({_score,_idx,...f})=>f);
}

    avgTargetCalories:avgTarget,calorieDelta:avgCalories&&avgTarget?avgCalories-avgTarget:0,
    weightChange:weights.length>=2?nRound(parseNum(weights[weights.length-1].weight)-parseNum(weights[0].weight)):null,
    rows
  };
}
function macroAdjustmentAdvice(trend){
  const confidence=(trend.completeDays>=5&&trend.weighIns>=5)?'high':((trend.loggedDays>=5&&trend.weighIns>=3)?'medium':'low');
  if(confidence==='low')return {confidence,recommendation:'Finish more complete entries before changing macros.', reason:`Need at least 5 logged days and 3 weigh-ins; current data is ${trend.loggedDays}/7 logged, ${trend.completeDays}/7 complete, ${trend.weighIns}/7 weigh-ins.`,calorieChange:0};
  if(trend.weightChange===null)return {confidence:'medium',recommendation:'Keep targets unchanged until weigh-ins show a real trend.',reason:'Nutrition logs exist but scale trend is missing.',calorieChange:0};
  if(trend.weightChange<-1)return {confidence,recommendation:'Add 100-150 kcal or hold cuts for a week if training performance drops.',reason:'Weight is dropping faster than the usual weekly cutting range.',calorieChange:125};
  if(trend.weightChange>=-1&&trend.weightChange<=-0.25)return {confidence,recommendation:'hold targets this week.',reason:'Weight loss is inside a controlled cutting range.',calorieChange:0};
  if(trend.weightChange>-0.25&&trend.calorieDelta>-150)return {confidence,recommendation:'Reduce daily calories by 100-150 kcal if the next complete week looks the same.',reason:'Weight is flat or rising while intake is near target.',calorieChange:-125};
  return {confidence,recommendation:'Keep targets unchanged and collect another complete week.',reason:'The trend is mixed; a change now could be noise.',calorieChange:0};
}
function nutritionCoachSummary(end=today()){
  const trend=nutritionWeeklyTrend(end);
  const advice=macroAdjustmentAdvice(trend);
  const lines=[
    `Nutrition data: ${trend.loggedDays}/7 days logged, ${trend.completeDays}/7 marked complete.`,
    `Weigh-ins: ${trend.weighIns}/7.`,
    `Weekly averages: ${trend.avgCalories||'not enough data'} kcal, ${trend.avgProtein}P / ${trend.avgCarbs}C / ${trend.avgFat}F.`,
    `Average target delta: ${trend.calorieDelta>0?'+':''}${trend.calorieDelta} kcal/day.`
  ];
  if(trend.weightChange!==null)lines.push(`Scale trend: ${trend.weightChange>0?'+':''}${trend.weightChange} kg across logged weigh-ins.`);
  lines.push(`Recommendation: ${advice.recommendation}`);
  lines.push(`Reason: ${advice.reason}`);
  return {confidence:advice.confidence,lines,recommendation:advice.recommendation,trend,advice};
}

// ── Rest Timer ────────────────────────────────────────────────────────────────
// Time-based: remaining is computed from restEndsAt - Date.now() so it
// survives iOS backgrounding the JS thread (counter would freeze).
// A separate setTimeout fires the alarm at the exact end time — more reliable
// than the 250ms tick (browsers throttle setInterval in background).
// A Notification (via SW when hidden) alerts the user even if app is fully
// backgrounded / screen off.
let restInt=null,restTotal=90,restEndsAt=0;
let restEndTimeout=null,restNotif=null,restWakeLock=null,restNotifPromptShown=false;
const REST_CIRC=565.5; // 2*π*90 ≈ 565.5

function _restRemaining(){return Math.max(0,Math.ceil((restEndsAt-Date.now())/1000))}

async function _requestNotifPerm(){
  if(!('Notification' in window))return 'unsupported';
  if(Notification.permission==='granted'||Notification.permission==='denied')return Notification.permission;
  if(restNotifPromptShown)return Notification.permission;
  restNotifPromptShown=true;
  try{return await Notification.requestPermission()}catch(_){return 'default'}
}
async function _acquireWakeLock(){
  try{
    if('wakeLock' in navigator&&!restWakeLock){
      restWakeLock=await navigator.wakeLock.request('screen');
      restWakeLock.addEventListener?.('release',()=>{restWakeLock=null});
    }
  }catch(_){}
}
function _releaseWakeLock(){
  try{restWakeLock?.release?.()}catch(_){}
  restWakeLock=null;
}
function _fireRestAlarm(){
  haptic([200,100,200,100,200]);
  if('Notification' in window&&Notification.permission==='granted'){
    const body='Hit your next set.';
    const opts={body,icon:'icon-192.png',badge:'icon-192.png',tag:'ironlog-rest',renotify:true,vibrate:[200,100,200,100,200]};
    try{
      if(document.hidden&&navigator.serviceWorker?.ready){
        navigator.serviceWorker.ready.then(reg=>{
          reg.showNotification('Rest over — go! 💪',opts).catch(()=>{
            try{restNotif=new Notification('Rest over — go! 💪',opts)}catch(_){}
          });
        }).catch(()=>{
          try{restNotif=new Notification('Rest over — go! 💪',opts)}catch(_){}
        });
      }else{
        restNotif=new Notification('Rest over — go! 💪',opts);
      }
    }catch(_){}
  }
  toast('Rest over — go! 💪');
}

function startRest(hint=''){
  if(!DB.settings.restEnabled)return;
  cancelRest();
  restTotal=DB.settings.restSecs||90;
  restEndsAt=Date.now()+restTotal*1000;
  const ov=document.getElementById('restOv');
  const numEl=document.getElementById('restNum');
  const ringEl=document.getElementById('restRing');
  const hintEl=document.getElementById('restHint');
  if(!ov)return;
  numEl.textContent=restTotal;
  if(ringEl){ringEl.style.strokeDashoffset='0';ringEl.style.transition='none';void ringEl.getBoundingClientRect();ringEl.style.transition='stroke-dashoffset 1s linear'}
  if(hintEl)hintEl.textContent=hint;
  ov.classList.add('show');
  _requestNotifPerm();
  _acquireWakeLock();
  restEndTimeout=setTimeout(()=>{restEndTimeout=null;_fireRestAlarm();cancelRest()},restTotal*1000);
  const tick=()=>{
    const rem=_restRemaining();
    numEl.textContent=rem;
    if(ringEl){const pct=rem/restTotal;ringEl.style.strokeDashoffset=(REST_CIRC*(1-pct)).toString()}
    if(rem<=0&&!restEndTimeout){cancelRest()}
  };
  restInt=setInterval(tick,250);
}
function cancelRest(){
  if(restInt){clearInterval(restInt);restInt=null}
  if(restEndTimeout){clearTimeout(restEndTimeout);restEndTimeout=null}
  if(restNotif){try{restNotif.close()}catch(_){}restNotif=null}
  if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(reg=>{
      reg.getNotifications({tag:'ironlog-rest'}).then(ns=>ns.forEach(n=>n.close())).catch(()=>{});
    }).catch(()=>{});
  }
  _releaseWakeLock();
  restEndsAt=0;
  document.getElementById('restOv')?.classList.remove('show');
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&restEndsAt){
    _acquireWakeLock();
    const numEl=document.getElementById('restNum');
    const ringEl=document.getElementById('restRing');
    const rem=_restRemaining();
    if(numEl)numEl.textContent=rem;
    if(ringEl){const pct=rem/restTotal;ringEl.style.strokeDashoffset=(REST_CIRC*(1-pct)).toString()}
    if(rem<=0){_fireRestAlarm();cancelRest()}
  }
});
function setRestPreset(secs){
  restTotal=secs;
  restEndsAt=Date.now()+secs*1000;
  DB.settings.restSecs=secs;saveDB();
  if(restEndTimeout){clearTimeout(restEndTimeout);restEndTimeout=null}
  if(restEndsAt){restEndTimeout=setTimeout(()=>{restEndTimeout=null;_fireRestAlarm();cancelRest()},secs*1000)}
  const numEl=document.getElementById('restNum');
  const ringEl=document.getElementById('restRing');
  if(numEl)numEl.textContent=secs;
  if(ringEl){ringEl.style.strokeDashoffset='0'}
  haptic(15);
}
function adjustRestTime(delta){
  const rem=Math.max(5,_restRemaining()+delta);
  restTotal=Math.max(5,restTotal+delta);
  restEndsAt=Date.now()+rem*1000;
  DB.settings.restSecs=restTotal;saveDB();
  if(restEndTimeout){clearTimeout(restEndTimeout);restEndTimeout=null}
  restEndTimeout=setTimeout(()=>{restEndTimeout=null;_fireRestAlarm();cancelRest()},rem*1000);
  const numEl=document.getElementById('restNum');
  const ringEl=document.getElementById('restRing');
  if(numEl)numEl.textContent=rem;
  if(ringEl){const pct=rem/restTotal;ringEl.style.strokeDashoffset=(REST_CIRC*(1-pct)).toString()}
}

function calcStreak(){
  const dates=[...new Set(DB.workouts.map(w=>w.date))].sort().reverse();
  if(!dates.length)return 0;
  const todayStr=today();
  let streak=0,prev=null;
  for(const d of dates){
    if(prev===null){const gap=Math.round((new Date(todayStr)-new Date(d))/86400000);if(gap>1)break;streak=1;prev=d}
    else{const gap=Math.round((new Date(prev)-new Date(d))/86400000);if(gap!==1)break;streak++;prev=d}
  }
  return streak;
}
function updateStreak(){
  const s=calcStreak();
  const el=document.getElementById('streakBadge');
  if(el)el.textContent=s>0?`🔥 ${s} day streak`:'No streak yet';
}

// ── Gesture controls ──────────────────────────────────────────────────────────
(function(){
  let _gs=null; // active gesture state
  document.addEventListener('pointerdown',function(e){
    const wheel=e.target.closest('.sc3-wheel');
    const slider=e.target.closest('.sc3-rpe-slider');
    if(!wheel&&!slider)return;
    // Don't start gesture if tapping the edit input itself
    if(e.target.classList.contains('sc3-inp-edit'))return;
    e.preventDefault();
    if(wheel){
      const exId=wheel.dataset.exid;const si=+wheel.dataset.setidx;
      const inp=document.getElementById('w-'+exId+'-'+si);
      const startVal=parseNum(inp?.value)||0;
      _gs={type:'wheel',exId,si,startY:e.clientY,startVal,lastTicks:0,moved:false};
      try{wheel.setPointerCapture(e.pointerId)}catch(_){}
    } else {
      const exId=slider.dataset.exid;const si=+slider.dataset.setidx;
      const track=slider.querySelector('.sc3-rpe-track');
      const rect=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
      const val=Math.round(pct*4+6);
      _gs={type:'rpe',exId,si,lastVal:val};
      sc3RpeSliderUpdate(exId,si,val);
      try{slider.setPointerCapture(e.pointerId)}catch(_){}
    }
  });
  document.addEventListener('pointermove',function(e){
    if(!_gs)return;
    if(_gs.type==='wheel'){
      const dy=_gs.startY-e.clientY; // up = positive = increase
      const ticks=Math.floor(Math.abs(dy)/28)*(dy<0?-1:1);
      if(ticks!==_gs.lastTicks){
        const diff=ticks-_gs.lastTicks;_gs.lastTicks=ticks;
        const inp=document.getElementById('w-'+_gs.exId+'-'+_gs.si);
        const valSpan=document.getElementById('wv-'+_gs.exId+'-'+_gs.si);
        if(!inp)return;
        let cur=parseNum(inp.value);
        if(isNaN(cur)||cur<0)cur=_gs.startVal;
        const next=Math.max(0,Math.min(500,Math.round((cur+diff*2.5)*10)/10));
        inp.value=next;
        if(valSpan)valSpan.textContent=next;
        haptic(6);
      }
      if(Math.abs(_gs.startY-e.clientY)>6)_gs.moved=true;
    } else {
      const slider=document.getElementById('rs-'+_gs.exId+'-'+_gs.si);
      if(!slider)return;
      const track=slider.querySelector('.sc3-rpe-track');
      const rect=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
      const val=Math.round(pct*4+6);
      if(val!==_gs.lastVal){
        _gs.lastVal=val;
        sc3RpeSliderUpdate(_gs.exId,_gs.si,val,true); // skipHaptic=true, fire manually
        haptic(8);
      }
    }
  });
  document.addEventListener('pointerup',function(e){
    if(!_gs)return;
    if(_gs.type==='wheel'){
      if(!_gs.moved){
        // Tap — enter type mode
        sc3WheelEdit(_gs.exId,_gs.si);
      } else {
        cacheDraft(_gs.exId,_gs.si);
      }
    }
    _gs=null;
  });
})();

function exCard(ex,cat,col,inSplit){
  const logs=DB.workouts.filter(w=>w.exId===ex.id).sort((a,b)=>b.date.localeCompare(a.date));
  const last=logs[0];
  let trendHTML='';
  if(logs.length>=2){
    const cur=logs[0],prev=logs[1];
    const curMax=maxWt(cur.sets),prevMax=maxWt(prev.sets);
    const curReps=cur.sets.reduce((a,s)=>a+parseNum(s.reps),0);
    const prevReps=prev.sets.reduce((a,s)=>a+parseNum(s.reps),0);
    let dir='same';
    if(curMax>prevMax||(curMax===prevMax&&curReps>prevReps))dir='up';
    else if(curMax<prevMax||(curMax===prevMax&&curReps<prevReps))dir='down';
    const tcol=dir==='up'?'#22c55e':dir==='down'?'#ef4444':'#facc15';
    const glow=dir==='up'?'0 0 6px rgba(34,197,94,.55)':dir==='down'?'0 0 6px rgba(239,68,68,.45)':'0 0 6px rgba(250,204,21,.45)';
    const title=dir==='up'?`Up vs ${fd(prev.date)}`:dir==='down'?`Down vs ${fd(prev.date)}`:`Same as ${fd(prev.date)}`;
    trendHTML=`<div class="ex-trend" title="${title}" style="background:${tcol};box-shadow:${glow}"></div>`;
  }
  let sub='No sessions yet';
  if(last&&last.sets.length){const ls=last.sets[last.sets.length-1];sub=`Last: ${ls.reps||'?'}×${ls.weight||'0'}kg · ${fd(last.date)}`}
  const isOpen=!!openCards[ex.id];
  const _isDone=_sessionDone.has(ex.id);
  return`<div class="ex-card${_isDone?' ex-done-today':''}" id="xc-${ex.id}" style="--pc:${col};${_isDone?'display:none':''}">
    <div class="ex-head" onclick="toggleCard('${ex.id}','${cat}','${col}',${inSplit})">

      <div class="ex-arr ${isOpen?'open':''}" id="xa-${ex.id}">&#8250;</div>
    </div>
    ${isOpen?logForm(ex.id,cat,col,last):''}
  </div>`;
}

function saveEx(exId,cat){
  const date=document.getElementById('ld-'+exId)?.value;if(!date){toast('Pick a date');return}
  const n=setCounts[exId]||2;const sets=[];
  for(let i=0;i<n;i++){const rpe=document.getElementById(`rpe-${exId}-${i}`)?.value||'';sets.push({reps:document.getElementById(`r-${exId}-${i}`)?.value||'',weight:document.getElementById(`w-${exId}-${i}`)?.value||'',done:true,...(rpe?{rpe}:{})})}
  const notes=document.getElementById('ln-'+exId)?.value||'';
  const ex=Object.values(DB.exercises).flat().find(e=>e.id===exId);
  const prevBest=Math.max(0,...DB.workouts.filter(w=>w.exId===exId).map(w=>maxWt(w.sets)));
  const newBest=maxWt(sets);
  // session duration: track sessionStart per (date,splitId)
  if(!DB.sessionStarts)DB.sessionStarts={};
  const sessKey=`${date}|${curSplit||'solo-'+cat}`;
  if(!DB.sessionStarts[sessKey])DB.sessionStarts[sessKey]=Date.now();
  const nowTs=Date.now();
  // N4: if a workout for this exercise on this date already exists in this split, append sets to it
  const existing=DB.workouts.find(w=>w.exId===exId&&w.date===date&&(w.splitId||null)===(curSplit||null));
  if(existing){
    existing.sets=[...existing.sets,...sets];
    if(notes)existing.notes=existing.notes?existing.notes+'\n'+notes:notes;
    existing.savedAt=nowTs;
  }else{
    DB.workouts.push({id:uid(),exId,cat,name:ex?.name||'?',date,sets,notes,splitId:curSplit||null,sessionStart:DB.sessionStarts[sessKey],savedAt:nowTs});
  }
  saveDB();openCards[exId]=false;delete setCounts[exId];clearDraft(exId);_sessionDone.add(exId);cancelRest();
  if(curSplit)renderSplit(curSplit,cc(cat));else renderMuscle(cat,cc(cat));
  updateStreak();
  if(newBest>prevBest&&newBest>0){
    haptic([40,30,80,30,40]);
    toast(`🏆 New PR! ${newBest}kg`);
  }else{
    haptic(15);
    toastMotion('Set logged','save');
  }
}

// Drag-to-reorder sections (HTML5 drag API)

  if(t.dataset.secSpid!==_dragSec.spId)return;

// Pointer-based drag-to-reorder fallback (iOS / touch)
let _ptrDrag=null;
document.addEventListener('pointerdown',e=>{
  if(e.pointerType==='mouse')return;
  const t=e.target.closest('.sp-cat-edit-wrap[draggable="true"]');if(!t)return;
  // ignore taps on the inner controls (remove btn, up/down arrows, exercise rows)
  if(e.target.closest('.sec-remove,.sec-up,.sec-down,.x-row,button,input,select'))return;
  _ptrDrag={el:t,spId:t.dataset.secSpid,idx:+t.dataset.secIdx,startY:e.clientY,startX:e.clientX,active:false,target:null,above:true};
},{passive:true});
document.addEventListener('pointermove',e=>{
  if(!_ptrDrag||e.pointerType==='mouse')return;
  const dy=e.clientY-_ptrDrag.startY,dx=e.clientX-_ptrDrag.startX;
  if(!_ptrDrag.active){
    if(Math.abs(dy)<8||Math.abs(dx)>Math.abs(dy)*1.5)return;
    _ptrDrag.active=true;_ptrDrag.el.classList.add('dragging');
    document.body.style.userSelect='none';
  }
  e.preventDefault();
  const els=document.querySelectorAll(`.sp-cat-edit-wrap[draggable="true"][data-sec-spid="${_ptrDrag.spId}"]`);
  let hit=null,above=true;
  els.forEach(el=>{
    if(el===_ptrDrag.el)return;
    const r=el.getBoundingClientRect();
    if(e.clientY>=r.top&&e.clientY<=r.bottom){hit=el;above=e.clientY<r.top+r.height/2}
  });
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  if(hit){hit.classList.add(above?'drop-above':'drop-below');_ptrDrag.target=hit;_ptrDrag.above=above}else{_ptrDrag.target=null}
},{passive:false});
document.addEventListener('pointerup',e=>{
  if(!_ptrDrag||e.pointerType==='mouse')return;
  document.body.style.userSelect='';
  _ptrDrag.el.classList.remove('dragging');
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  if(_ptrDrag.active&&_ptrDrag.target){
    const sp=DB.splits.find(s=>s.id===_ptrDrag.spId);
    if(sp){
      const fromIdx=_ptrDrag.idx;let toIdx=+_ptrDrag.target.dataset.secIdx;
      const[s]=sp.sections.splice(fromIdx,1);
      if(fromIdx<toIdx)toIdx--;
      sp.sections.splice(_ptrDrag.above?toIdx:toIdx+1,0,s);
      saveDB();renderSplit(_ptrDrag.spId,cv(sp.color));
    }
  }
  _ptrDrag=null;
},{passive:true});
document.addEventListener('pointercancel',()=>{
  if(!_ptrDrag)return;
  document.body.style.userSelect='';
  _ptrDrag.el.classList.remove('dragging');
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  _ptrDrag=null;
},{passive:true});

// Swipe-to-delete history sessions (touch)
let _swipe=null;
document.addEventListener('touchstart',e=>{
  const hd=e.target.closest('.hsess-hd');if(!hd)return;
  const sess=hd.closest('.hsess');if(!sess||!sess.dataset.sessKey)return;
  _swipe={sess,hd,startX:e.touches[0].clientX,startY:e.touches[0].clientY,dx:0,locked:false};
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!_swipe)return;
  const dx=e.touches[0].clientX-_swipe.startX;
  const dy=e.touches[0].clientY-_swipe.startY;
  if(!_swipe.locked){
    if(Math.abs(dx)>10||Math.abs(dy)>10){_swipe.locked=true;if(Math.abs(dy)>Math.abs(dx)){_swipe=null;return}}
    else return;
  }
  if(dx<0){
    e.preventDefault&&e.preventDefault();
    _swipe.dx=dx;
    _swipe.hd.style.transform=`translateX(${Math.max(dx,-180)}px)`;
    _swipe.sess.classList.toggle('swiping',dx<-30);
  }
},{passive:false});
document.addEventListener('touchend',()=>{
  if(!_swipe)return;
  const{sess,hd,dx}=_swipe;
  if(dx<-110){
    sess.classList.add('deleting');
    const key=sess.dataset.sessKey;
    setTimeout(async()=>{
      const ok=await confirm2('Delete entire session? All exercises in this session will be removed.');
      if(!ok){sess.classList.remove('deleting','swiping');hd.style.transform='';_swipe=null;return}
      // delete all workouts matching the session key
      const[date,...rest]=key.split('|');
      const sid=rest[0];
      DB.workouts=DB.workouts.filter(w=>{
        if(sid==='solo'){return!(w.date===date&&!w.splitId)}
        return!(w.date===date&&w.splitId===sid);
      });
      saveDB();renderHistory();toast('Session deleted');
    },200);
  }else{
    hd.style.transform='';sess.classList.remove('swiping');
  }
  _swipe=null;
},{passive:true});

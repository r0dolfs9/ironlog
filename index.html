<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="IronLog">
<meta name="theme-color" content="#0a0908">
<meta name="color-scheme" content="dark">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="shortcut icon" href="icon-192.png">
<title>IronLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<style>
/* ══════════════════════════════════════════════════════
   TONING v3 — Warm dark · Glassmorphism · Editorial serif
   Design: warm near-black, coral accent, glass layers
   ══════════════════════════════════════════════════════ */

:root {
  /* ── Warm dark surfaces ── */
  --bg:   #0a0908;
  --s1:   #16140f;
  --s2:   #1f1c16;
  --s3:   #28251d;
  --s4:   #312d23;
  --glass: rgba(28,25,20,0.64);
  --border:    rgba(245,241,232,0.08);
  --border-hi: rgba(245,241,232,0.16);
  /* ── Text ── */
  --text: #f5f1e8;
  --t2:   #a8a195;
  --t3:   #6b6359;
  /* ── Accent: coral-orange ── */
  --acc:      #ff6b35;
  --acc-soft: #ffb38a;
  --acc-dim:  rgba(255,107,53,0.12);
  --acc-glow: rgba(255,107,53,0.30);
  /* ── Semantic ── */
  --red:    #d4332f;
  --success:#7fb069;
  /* ── Muscle group palette (warmer) ── */
  --chest:#ff5c38; --triceps:#ff9f38; --back:#c084fc;
  --biceps:#ff8a5c; --legs:#60a5fa; --shoulders:#fbbf24;
  --abs:#34d399; --forearms:#f472b6; --cardio:#fb7185;
  /* ── Layout ── */
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  /* ── Radii ── */
  --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-pill:999px;
  /* ── Shadow ── */
  --shadow: 0 24px 48px -16px rgba(0,0,0,0.6);
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:'Geist',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}

/* ── TYPE HELPERS ── */
.serif{font-family:'Instrument Serif',serif}
.mono{font-family:'Geist Mono',monospace}

/* ── Shell — v3: no sidebar, full-width single column ── */
.app{display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden}

/* ── Warm noise bg overlay ── */
.app::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(80% 50% at 70% 0%, rgba(255,107,53,0.07), transparent 65%),
    radial-gradient(50% 40% at 20% 15%, rgba(255,179,138,0.04), transparent 60%);
}

/* ── Glass card base ── */
.v3-card{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.6);
  -webkit-backdrop-filter:blur(24px) saturate(1.6);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
  position:relative;overflow:hidden;
}
/* card inner highlight arc */
.v3-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  border-radius:inherit;
  box-shadow:inset 0 0 0 1px rgba(245,241,232,0.06);
}

/* ── Top context bar (replaces topbar) ── */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-top) + 13px) 18px 12px;
  background:transparent;
  flex-shrink:0;position:relative;z-index:10;
}
.tb-title{
  font-family:'Instrument Serif',serif;
  font-size:20px;font-weight:400;letter-spacing:-.3px;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tb-title em{font-style:italic;color:var(--acc-soft)}
.tb-gear{
  width:36px;height:36px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,color .15s;flex-shrink:0;
}
.tb-gear:hover{border-color:var(--border-hi);color:var(--text)}
.tb-gear:active{border-color:var(--acc);color:var(--acc)}
.tb-avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#1a0e07;
  flex-shrink:0;cursor:pointer;
  background:linear-gradient(135deg,var(--acc) 0%,var(--acc-soft) 100%);
  box-shadow:0 6px 16px -6px var(--acc-glow);
}

/* ── Bottom tab bar ── */
.v3-tabs{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(20,18,14,0.80);
  backdrop-filter:blur(30px) saturate(1.8);
  -webkit-backdrop-filter:blur(30px) saturate(1.8);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:8px 6px calc(8px + var(--safe-bot));
  z-index:100;
  box-shadow:0 -24px 48px -16px rgba(0,0,0,0.5);
}
.v3-tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;border:none;background:none;color:var(--t3);
  font-family:'Geist',system-ui,sans-serif;font-size:10px;font-weight:500;letter-spacing:.2px;
  cursor:pointer;border-radius:var(--r-md);
  transition:color .2s,background .2s;
}
.v3-tab:hover{color:var(--t2)}
.v3-tab.active{color:var(--acc)}
.v3-tab.active .v3-tab-icon{filter:drop-shadow(0 0 6px rgba(255,107,53,.5))}
.v3-tab svg{width:22px;height:22px;stroke-width:1.6;transition:stroke-width .15s,transform .15s}
.v3-tab.active svg{stroke-width:2;transform:translateY(-1px)}

/* ── SIDEBAR — kept as hidden fallback, won't display ── */
.sidebar{display:none!important}
.sb-ov{display:none!important}
.hmbgr{display:none!important}

/* ── LEGACY sidebar styles (keeping for JS references, visually inert) ── */
.sb-logo,.sb-sec,.sb-sec-lbl,.sb-btn,.sb-dot,.sb-empty,.sb-empty-msg,.sb-empty-btn{display:none}
.hstrip{margin:0 0 18px;padding:14px;background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow)}
.hstrip-hdr{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--t3);margin-bottom:10px}
.hstrip-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.hstrip-day{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border-radius:var(--r-sm);transition:background .15s}
.hstrip-day.today{background:rgba(255,255,255,.03);outline:1px solid var(--border-hi)}
.hstrip-lbl{font-size:9px;font-family:'Geist Mono',monospace;color:var(--t3);letter-spacing:.5px}
.hstrip-dot{width:14px;height:14px;border-radius:50%;background:var(--s3);transition:all .2s}
.hstrip-num{font-size:11px;font-family:'Geist Mono',monospace;color:var(--t2);font-weight:500}
.hstrip-day.today .hstrip-num{color:var(--text);font-weight:700}
/* ── Records podium (Step 18) ───────────────────────────────── */
.podium-wrap{padding:18px 14px 6px;display:flex;align-items:flex-end;justify-content:center;gap:8px}
.podium-item{flex:1;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.podium-item:active .podium-card{transform:scale(.96)}
.podium-card{width:100%;border-radius:var(--r-lg);padding:12px 8px 10px;
  backdrop-filter:blur(20px) saturate(1.5);
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.06);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:transform .15s}
.podium-1 .podium-card{background:rgba(255,215,0,0.12);border:1.5px solid rgba(255,215,0,0.3)}
.podium-2 .podium-card{background:rgba(192,192,192,0.10);border:1.5px solid rgba(192,192,192,0.22)}
.podium-3 .podium-card{background:rgba(205,127,50,0.10);border:1.5px solid rgba(205,127,50,0.22)}
.podium-medal{font-size:20px;line-height:1}
.podium-weight{font-family:'Instrument Serif',serif;font-size:26px;line-height:1;color:var(--text)}
.podium-wunit{font-size:10px;color:var(--t3);font-family:'Geist Mono',monospace}
.podium-name{font-size:10px;font-weight:600;color:var(--t2);text-align:center;line-height:1.3;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;max-height:30px}
.podium-cat{font-size:9px;color:var(--t3);letter-spacing:.4px}
.podium-block{display:flex;align-items:center;justify-content:center;
  width:28px;height:var(--h);border-radius:4px 4px 0 0;font-size:11px;font-weight:700}
.podium-1 .podium-block{background:rgba(255,215,0,.25);color:#ffd700;--h:36px}
.podium-2 .podium-block{background:rgba(192,192,192,.2);color:#c0c0c0;--h:24px}
.podium-3 .podium-block{background:rgba(205,127,50,.2);color:#cd7f32;--h:16px}
.podium-sep{height:1px;background:var(--border);margin:4px 14px 16px}
.pr-page-hdr{padding:6px 4px 18px;border-bottom:1px solid var(--border);margin-bottom:18px}
.pr-page-ttl{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;letter-spacing:-.5px;color:var(--text)}
.pr-page-sub{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:.4px}
.pr-grp{margin-bottom:22px}
.pr-grp-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px}
.pr-grp-dot{width:8px;height:8px;border-radius:50%}
.pr-grp-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.pr-row{display:flex;align-items:center;gap:12px;padding:14px;background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;transition:border-color .15s,transform .1s;cursor:pointer;box-shadow:var(--shadow)}
.pr-row:hover{border-color:var(--border-hi)}
.pr-row:active{transform:scale(.985)}
.pr-row-bar{width:3px;height:34px;border-radius:2px;flex-shrink:0}
.pr-row-info{flex:1;min-width:0}
.pr-row-nm{font-size:14px;font-weight:600;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-row-sub{font-size:10px;color:var(--t3);margin-top:3px;font-family:'Geist Mono',monospace;letter-spacing:.3px}
.pr-row-wt{display:flex;align-items:baseline;gap:3px;flex-shrink:0}
.pr-row-kg{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;color:var(--pc,var(--acc));letter-spacing:-.5px}
.pr-row-unit{font-size:10px;color:var(--t3);font-family:'Geist Mono',monospace}
.pr-ex-row{cursor:pointer;transition:background .15s}
.pr-ex-row:hover{background:var(--s2)}

/* Fullscreen chart overlay */
.fc-ov{
  position:fixed;inset:0;z-index:600;
  background:rgba(8,8,11,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .2s
}
.fc-ov.open{display:flex}
.fc-box{
  width:100%;max-width:760px;max-height:92vh;
  background:var(--glass);backdrop-filter:blur(30px) saturate(1.6);-webkit-backdrop-filter:blur(30px) saturate(1.6);
  border:1px solid var(--border-hi);border-radius:var(--r-xl);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 40px 80px -20px rgba(0,0,0,0.7)
}
.fc-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:20px 20px 14px}
.fc-ttl{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;letter-spacing:-.3px}
.fc-sub{font-size:11px;color:var(--t3);margin-top:4px;font-family:'Geist Mono',monospace;letter-spacing:.3px}
.fc-close{
  width:34px;height:34px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);color:var(--t2);
  font-size:14px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .15s
}
.fc-close:hover{color:var(--text);border-color:var(--border-hi)}
.fc-canvas-wrap{flex:1;min-height:340px;padding:0 20px 20px;position:relative}
.fc-foot{padding:0 20px 18px;font-size:9px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;font-weight:600}

/* Chart skeleton shimmer */
.chart-skel{
  position:relative;height:150px;border-radius:var(--r-sm);overflow:hidden;
  background:linear-gradient(110deg,var(--s2) 30%,var(--s3) 50%,var(--s2) 70%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite
}
.chart-skel.full{height:100%;width:100%}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* Swipe-to-delete */
.hsess{position:relative;overflow:hidden}
.hsess-wipe{
  position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(239,68,68,.18) 60%,rgba(239,68,68,.45) 100%);
  display:flex;align-items:center;justify-content:flex-end;padding-right:20px;
  font-size:11px;font-weight:700;letter-spacing:2px;color:#ef4444;
  pointer-events:none;opacity:0;transition:opacity .15s
}
.hsess.swiping .hsess-wipe{opacity:1}
.hsess-hd{position:relative;z-index:2;background:var(--s1);transition:transform .25s var(--ease)}
.hsess.deleting .hsess-hd{transform:translateX(-100%)!important}

/* Drag handle */
.sec-drag{
  width:30px;height:30px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  cursor:grab;font-size:12px;letter-spacing:1px;flex-shrink:0;user-select:none;touch-action:none
}
.sec-drag:active{cursor:grabbing;background:var(--s3)}
.sp-section.dragging{opacity:.4}
.sp-section.drop-above{box-shadow:0 -3px 0 var(--acc)}
.sp-section.drop-below{box-shadow:0 3px 0 var(--acc)}
.sb-icon{font-size:13px;flex-shrink:0}
.sb-footer{
  margin-top:auto;padding:12px 12px calc(12px + var(--safe-bot));
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:5px
}
.sb-ftn{
  display:flex;align-items:center;gap:8px;
  padding:8px 11px;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:11px;
  cursor:pointer;width:100%;transition:border-color .15s,color .15s
}
.sb-ftn:hover{border-color:var(--border-hi);color:var(--text)}
.sb-ftn:active{border-color:var(--acc);color:var(--acc)}
.sb-streak{
  text-align:center;font-size:11px;font-weight:700;
  color:var(--acc);padding:5px 0;letter-spacing:.3px;opacity:.85
}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;z-index:1}
.tb-bw{display:none} /* moved to settings gear */

/* ── Pages */
.pages{flex:1;overflow:hidden;position:relative}
.page{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  display:none;padding-bottom:calc(76px + var(--safe-bot))
}
.page::-webkit-scrollbar{display:none}
.page.active{display:block}
.page.tab-enter-right{animation:tabSlideInRight .3s cubic-bezier(0.34,1.56,0.64,1) forwards}
.page.tab-enter-left{animation:tabSlideInLeft .3s cubic-bezier(0.34,1.56,0.64,1) forwards}
.page.tab-exit-right{animation:tabSlideOutRight .22s cubic-bezier(0.4,0,1,1) forwards}
.page.tab-exit-left{animation:tabSlideOutLeft .22s cubic-bezier(0.4,0,1,1) forwards}

/* ── Sub-tab pills (for Progress / more) ── */
.subtabs{
  display:flex;gap:6px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.subtabs::-webkit-scrollbar{display:none}
.subtab{
  padding:7px 14px;border-radius:var(--r-pill);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:12px;font-weight:600;
  cursor:pointer;flex-shrink:0;white-space:nowrap;
  transition:all .15s;font-family:'Geist',sans-serif;
}
.subtab.active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}

/* ── Muscle page */
.pg-hdr{
  padding:22px 16px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.pg-title{
  font-family:'Instrument Serif',serif;font-size:34px;font-weight:400;
  letter-spacing:-.5px;line-height:1
}
.add-btn{
  padding:8px 16px;border-radius:100px;
  background:transparent;border:1.5px solid var(--pc,var(--acc));
  color:var(--pc,var(--acc));
  font-family:'Geist',system-ui,sans-serif;font-size:12px;font-weight:600;cursor:pointer;
  transition:opacity .15s,background .15s
}
.add-btn:active{opacity:.7}
.ex-list{padding:14px 14px 0;display:flex;flex-direction:column;gap:10px}

/* ── Exercise card */
/* ── Session Done section ─────────────────────────────────── */
.done-section{margin:14px 14px 0;padding-top:14px;border-top:1px solid var(--border)}
.done-section-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--success);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.done-section-lbl::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--success)}
.done-ex-card{background:rgba(127,176,105,0.06);border:1.5px solid rgba(127,176,105,0.2);
  border-radius:var(--r-lg);padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px}
.done-ex-check{width:22px;height:22px;border-radius:50%;background:var(--success);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#fff}
.done-ex-name{font-size:14px;font-weight:600;color:var(--text)}
.done-ex-sub{font-size:11px;color:var(--t3);margin-top:2px;font-family:'Geist Mono',monospace}
.ex-card{
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid var(--border);
  border-radius:var(--r-xl);overflow:hidden;
  transition:border-color .2s;
  box-shadow:0 8px 24px -12px rgba(0,0,0,0.4)
}
.ex-card:hover{border-color:var(--border-hi)}
.ex-head{
  display:flex;align-items:center;gap:12px;
  padding:15px 14px;cursor:pointer;transition:background .15s
}
.ex-head:hover{background:rgba(255,255,255,.025)}
.ex-bar{width:3px;height:38px;border-radius:2px;flex-shrink:0}
.ex-inf{flex:1;min-width:0}
.ex-nm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.ex-sb{font-size:10px;color:var(--t2);margin-top:3px;font-family:'Geist Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-del{
  width:30px;height:30px;border-radius:var(--r-sm);
  flex-shrink:0;background:none;border:none;
  color:var(--t3);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s,background .15s
}
.ex-del:hover{color:var(--red);background:rgba(255,85,85,.1)}
.ex-arr{color:var(--t3);font-size:18px;flex-shrink:0;transition:transform .22s}
.ex-arr.open{transform:rotate(90deg)}
.ex-trend{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:box-shadow .2s}

/* ── Log form */
.lf{display:none;border-top:1px solid var(--border)}
.lf.open{display:block;animation:slideDown .2s ease}
.last-ref{
  margin:14px 14px 0;
  background:rgba(31,28,22,0.8);border:1px solid var(--border);border-radius:var(--r-md);
  padding:13px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px
}
.lr-left{flex:1;min-width:0}
.lr-ttl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.lr-val{font-family:'Geist Mono',monospace;font-size:16px;color:var(--text);letter-spacing:-.3px}
.lr-sub{font-size:9px;color:var(--t3);margin-top:3px}
.lf-in{padding:14px}
.lf-date{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  color:var(--text);font-family:'Geist',system-ui,sans-serif;font-size:14px;
  padding:11px 14px;outline:none;margin-bottom:12px;transition:border-color .15s
}
.lf-date:focus{border-color:var(--acc)}
.sets-hdr{display:flex;align-items:center;margin-bottom:10px}
.sets-lbl{font-size:10px;color:var(--t2);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.sets-ctl{display:flex;align-items:center;gap:8px;margin-left:auto}
.sc-b{
  width:32px;height:32px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;transition:background .15s,border-color .15s
}
.sc-b:hover{background:var(--s3);border-color:var(--border-hi)}
.sc-b:active{background:var(--s4)}
.sc-n{font-family:'Geist Mono',monospace;font-size:15px;min-width:20px;text-align:center}
/* ── Set Cards v3 (Step 13+14) ─────────────────────────────── */
.sc3-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.sc3-card{background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);
  border-radius:var(--r-lg);border:1.5px solid var(--border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  padding:14px 14px 12px;transition:border-color .15s}
.sc3-card.sc3-done-card{border-color:var(--pc,var(--acc));background:rgba(255,107,53,0.06)}
.sc3-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sc3-num{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--t3);padding:3px 8px;border-radius:var(--r-pill);
  background:var(--s3);display:inline-block}
.sc3-done-btn{width:36px;height:36px;border-radius:var(--r-pill);border:1.5px solid var(--border);
  background:transparent;color:var(--t2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.sc3-done-btn.on{background:var(--acc-dim);border-color:var(--pc,var(--acc));
  color:var(--pc,var(--acc));box-shadow:0 0 10px var(--acc-glow)}
.sc3-done-btn.bounce{animation:dkBounce .42s var(--ease)}
.sc3-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc3-input-grp{display:flex;flex-direction:column;gap:5px}
.sc3-inp-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.sc3-inp{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  padding:12px 10px;font-family:'Geist Mono',monospace;font-size:28px;font-weight:400;
  color:var(--text);text-align:center;box-sizing:border-box;transition:border-color .15s}
.sc3-inp:focus{border-color:var(--pc,var(--acc));outline:none}
.sc3-inp::placeholder{color:var(--t3);font-size:22px}
.sc3-inp-unit{font-size:11px;color:var(--t3);text-align:center;margin-top:-2px}
/* RPE pills */
.sc3-rpe{display:flex;align-items:center;gap:6px}
.sc3-rpe-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--t3);flex-shrink:0;margin-right:2px}
.sc3-rpe-pill{flex:1;padding:6px 0;border-radius:var(--r-pill);border:1.5px solid var(--border);
  background:transparent;color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;text-align:center}
.sc3-rpe-pill.sel{background:var(--acc-dim);border-color:var(--pc,var(--acc));
  color:var(--pc,var(--acc))}
/* ── Gesture controls (weight wheel + RPE slider) ─────────────── */
.sc3-wheel{position:relative;display:flex;flex-direction:column;gap:5px}
.sc3-wheel-display{display:flex;align-items:baseline;justify-content:center;gap:4px;
  background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  padding:12px 10px;cursor:ns-resize;user-select:none;touch-action:none;
  transition:border-color .15s;min-height:60px}
.sc3-wheel-display:active{border-color:var(--pc,var(--acc))}
.sc3-wheel-val{font-family:'Geist Mono',monospace;font-size:28px;color:var(--text)}
.sc3-wheel-unit{font-size:11px;color:var(--t3)}
.sc3-wheel-hint{font-size:13px;color:var(--t3);margin-left:2px;opacity:0.4}
.sc3-inp-edit{position:absolute;inset:0;opacity:0;pointer-events:none;
  background:var(--s2);border:1.5px solid var(--pc,var(--acc));border-radius:var(--r-md);
  font-family:'Geist Mono',monospace;font-size:28px;color:var(--text);
  text-align:center;padding:12px 10px;box-sizing:border-box;z-index:2;outline:none}
.sc3-inp-edit.active{opacity:1;pointer-events:auto}
.sc3-rpe-slider{flex:1;display:flex;flex-direction:column;gap:6px;
  touch-action:none;cursor:pointer;padding:2px 0}
.sc3-rpe-track{position:relative;height:6px;background:var(--s3);border-radius:3px}
.sc3-rpe-fill{position:absolute;left:0;top:0;height:100%;
  background:var(--pc,var(--acc));border-radius:3px;transition:width .08s}
.sc3-rpe-thumb{position:absolute;top:50%;width:20px;height:20px;border-radius:50%;
  background:var(--pc,var(--acc));border:2px solid var(--bg);
  box-shadow:0 2px 8px rgba(0,0,0,0.4);transform:translate(-50%,-50%);
  transition:left .08s;opacity:0}
.sc3-rpe-thumb.has-val{opacity:1}
.sc3-rpe-labels{display:flex;justify-content:space-between;
  font-family:'Geist Mono',monospace;font-size:10px;color:var(--t3);padding:0 2px}
.st{width:100%;border-collapse:collapse;margin-bottom:8px}
.st th{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:4px;text-align:center}
.st th:first-child{text-align:left;width:26px}
.st td{padding:3px}
.sn{font-family:'Geist Mono',monospace;font-size:12px;color:var(--t3);text-align:center}
.sf{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-family:'Geist Mono',monospace;font-size:15px;
  padding:10px 6px;outline:none;text-align:center;-webkit-appearance:none;
  transition:border-color .15s
}
.sf:focus{border-color:var(--pc,var(--acc))}
.sf::placeholder{color:var(--t3)}
.dk{
  width:32px;height:36px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .15s;user-select:none;color:var(--t3)
}
.dk:hover{background:var(--s3)}
.dk.on{background:var(--acc-dim);border-color:var(--acc);color:var(--acc);box-shadow:0 0 8px var(--acc-glow)}
.dk.bounce{animation:dkBounce .42s var(--ease)}
@keyframes dkBounce{
  0%{transform:scale(1)}
  30%{transform:scale(1.32);box-shadow:0 0 0 6px var(--acc-glow),0 0 14px var(--acc-glow)}
  60%{transform:scale(.94)}
  100%{transform:scale(1)}
}
.add-set-row{margin-bottom:12px}
.add-set-btn{
  width:100%;padding:10px;border-radius:var(--r-md);
  background:none;border:1.5px dashed var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:border-color .15s,color .15s
}
.add-set-btn:hover{border-color:var(--border-hi);color:var(--text)}
.add-set-btn:active{border-color:var(--acc);color:var(--acc)}
.lf-nt{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  color:var(--text);font-family:'Geist',system-ui,sans-serif;font-size:13px;
  padding:10px 14px;outline:none;resize:none;margin-bottom:14px;
  transition:border-color .15s
}
.lf-nt::placeholder{color:var(--t3)}
.lf-nt:focus{border-color:var(--border-hi)}
.sav-btn{
  width:100%;padding:14px;border-radius:var(--r-lg);
  border:none;color:#1a0e07;
  font-family:'Geist',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:-.1px;position:relative;overflow:hidden;
  transition:opacity .15s,transform .1s,box-shadow .2s
}
.sav-btn:hover{box-shadow:0 8px 24px -8px var(--acc-glow)}
.sav-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%);
  pointer-events:none
}
.sav-btn:hover{opacity:.9}
.sav-btn:active{opacity:.8;transform:scale(.99)}

/* ── Split page */
.sp-hdr{
  padding:22px 16px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px
}
.sp-title{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;letter-spacing:-.3px}
.fin-btn{
  padding:9px 20px;border-radius:var(--r-pill);
  background:var(--acc);border:none;color:#1a0e07;
  font-family:'Geist',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:-.1px;
  transition:opacity .15s,box-shadow .2s;
  box-shadow:0 0 0 0 var(--acc-glow)
}

.sp-cat{margin-top:4px}

.sp-ex-list{padding:0 14px;display:flex;flex-direction:column;gap:8px}
.add-cat-btn{

}

/* ── Cardio */
.cc-wrap{padding:0 14px}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color .15s}
.cc:hover{border-color:var(--border-hi)}
.cc-hd{display:flex;align-items:center;gap:12px;padding:15px 14px;cursor:pointer;transition:background .15s}
.cc-hd:active{background:rgba(255,255,255,.025)}
.cc-form{display:none;border-top:1px solid var(--border);padding:14px}
.cc-form.open{display:block}
.cc-fields{display:flex;gap:10px;margin-bottom:14px}
.ccfw{flex:1}
.cfl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.cff{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  color:var(--text);font-family:'Geist Mono',monospace;font-size:16px;
  padding:11px 8px;outline:none;text-align:center;-webkit-appearance:none;

/* ── History */
.hsess{border-bottom:1px solid var(--border)}
.hsess-hd{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:transparent;cursor:pointer;border:none;width:100%;
  color:var(--text);font-family:'Geist',system-ui,sans-serif;text-align:left;
  transition:background .15s
}

.hsess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hsess-info{flex:1;min-width:0}
.hsess-name{font-family:'Instrument Serif',serif;font-size:16px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsess-meta{font-size:10px;color:var(--t3);margin-top:2px}

.hsess-body.open{display:block}
.hentry{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.hel{flex:1;min-width:0}

.hecat{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.hechips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{font-family:'Geist Mono',monospace;font-size:10px;background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--t2)}

.hedel{background:none;border:none;color:var(--t3);font-size:15px;cursor:pointer;padding:3px 5px;flex-shrink:0;transition:color .15s}

/* ── Progress */
/* ── Progress Stats v3 ─────────────────────────────────── */
.pst3-wrap{padding:14px 14px 0}
.pst3-hdr{background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);

.pst3-toggle{display:flex;gap:4px}
.pst3-tbtn{padding:5px 12px;border-radius:var(--r-pill);border:1.5px solid var(--border);

/* Radar card */
.pst3-radar-card{background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);

.pst3-section-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;

.pr-val{font-family:'Instrument Serif',serif;font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.pr-unit{font-size:13px;color:var(--t2);font-weight:400}

.cbt{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:14px}

.pr-ex-list{padding:0 14px 14px;display:flex;flex-direction:column;gap:7px}

.sum-ov{

  overflow-y:auto;-webkit-overflow-scrolling:touch

.sum-box{width:100%;max-width:480px;margin:0 auto;padding:0 18px}
.sum-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sum-title{font-family:'Instrument Serif',serif;font-size:24px;font-weight:800;letter-spacing:-.5px}

}

.sum-date{font-size:11px;color:var(--t3);margin-bottom:16px}
.sum-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
.sum-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;text-align:center}
.sum-stat-val{font-family:'Instrument Serif',serif;font-size:24px;font-weight:800;color:var(--acc);line-height:1}
.sum-stat-lbl{font-size:9px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:1.5px}
.sum-mg{margin-bottom:18px}
.sum-mg-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:9px}
.sum-mg-chips{display:flex;flex-wrap:wrap;gap:7px}
.sum-mg-chip{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:600;border:1.5px solid}
.sum-sec{margin-bottom:18px}
.sum-sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:9px}
.sum-ex{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-bottom:7px}
.sum-ex-nm{font-size:13px;font-weight:600;margin-bottom:7px}
.sum-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.sum-chip{font-family:'Geist Mono',monospace;font-size:10px;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.sum-prog{display:flex;align-items:center;gap:8px;margin-top:7px}
.sum-prog-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.sum-prog-pill.up{color:#22c55e;background:rgba(34,197,94,.12)}
.sum-prog-pill.dn{color:#ef4444;background:rgba(239,68,68,.12)}
.sum-prog-pill.eq{color:var(--t2);background:var(--s3)}
.sum-prog-vs{font-size:10px;color:var(--t3)}
.sum-pr-badge{
  display:inline-block;margin-left:7px;
  background:var(--acc);color:#000;
  font-family:'Instrument Serif',serif;font-size:9px;font-weight:800;
  padding:2px 8px;border-radius:100px;letter-spacing:.5px;vertical-align:middle
}
.ss-btn{
  width:100%;padding:15px;border-radius:var(--r-md);margin-top:9px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);font-family:'Instrument Serif',serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:background .15s
}
.ss-btn:hover{background:var(--s3)}

/* ── Sheet */
.ov-dark{
  position:fixed;inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:200;display:none
}
.ov-dark.open{display:block;animation:fadeIn .2s ease}
.sheet{
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:var(--s1);border-radius:var(--r-xl) var(--r-xl) 0 0;
  border-top:1px solid var(--border);
  padding:16px 18px calc(var(--safe-bot) + 20px);
  z-index:201;transform:translateY(100%);
  transition:transform .3s var(--ease)
}
.sheet.open{transform:translateY(0)}
.sh-handle{width:36px;height:4px;border-radius:2px;background:var(--s4);margin:0 auto 18px}
.sh-title{font-family:'Instrument Serif',serif;font-size:18px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.sh-inp{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-md);
  color:var(--text);font-family:'Geist',system-ui,sans-serif;font-size:15px;
  padding:13px 14px;outline:none;margin-bottom:14px;transition:border-color .15s
}
.sh-inp:focus{border-color:var(--acc)}
.sh-acts{display:flex;gap:9px}
.sh-cancel{
  flex:1;padding:14px;border-radius:var(--r-md);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:14px;font-weight:600;cursor:pointer;
  transition:background .15s
}
.sh-cancel:hover{background:var(--s3);color:var(--text)}
.sh-ok{
  flex:2;padding:14px;border-radius:var(--r-md);
  background:var(--acc);border:none;color:#000;
  font-family:'Instrument Serif',serif;font-size:14px;font-weight:800;cursor:pointer;
  transition:opacity .15s,box-shadow .2s
}
.sh-ok:hover{box-shadow:0 4px 18px var(--acc-glow)}
.sh-ok:active{opacity:.8}

/* ── Confirm */
.conf-ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:300;display:none;align-items:center;justify-content:center;padding:20px
}
.conf-ov.open{display:flex;animation:fadeIn .15s ease}
.conf-box{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:26px 22px;width:100%;max-width:300px;text-align:center
}
.conf-msg{font-size:14px;line-height:1.65;margin-bottom:20px}
.conf-btns{display:flex;gap:9px}
.c-no{
  flex:1;padding:13px;border-radius:var(--r-md);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer
}
.c-yes{
  flex:1;padding:13px;border-radius:var(--r-md);
  background:rgba(255,85,85,.1);border:1px solid rgba(255,85,85,.28);
  color:#ff6b6b;font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;
  transition:background .15s
}
.c-yes:active{background:rgba(255,85,85,.2)}

/* ── Toast */
.toast{
  position:fixed;bottom:calc(80px + var(--safe-bot) + 12px);left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--glass);border:1px solid var(--border-hi);
  border-left:3px solid var(--acc);
  backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
  padding:10px 18px;border-radius:var(--r-lg);
  font-size:13px;font-weight:500;font-family:'Geist',sans-serif;
  opacity:0;transition:all .24s var(--ease);
  pointer-events:none;white-space:nowrap;z-index:500;
  box-shadow:0 8px 32px rgba(0,0,0,.45)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Rest Timer — SVG Ring */
.rest-ov{
  position:fixed;inset:0;
  background:rgba(10,9,8,.55);
  backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);
  z-index:700;display:none;align-items:flex-end;justify-content:center
}
.rest-ov.show{display:flex;animation:fadeIn .18s ease}
.rest-ov-box{
  text-align:center;
  width:100%;max-width:480px;
  display:flex;flex-direction:column;align-items:center;
  background:var(--glass);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  border-top:1px solid var(--border-hi);
  box-shadow:0 -24px 64px -16px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);
  padding:8px 28px calc(28px + var(--safe-bot));
  animation:slideUp .3s var(--ease);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.rest-sheet-handle{width:36px;height:4px;background:var(--s4);border-radius:2px;margin:12px auto 20px}
.rest-ov-label{
  font-size:10px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--t3);margin-bottom:20px
}
.rest-ring-wrap{position:relative;width:190px;height:190px;margin-bottom:22px}
.rest-ring{width:190px;height:190px;transform:rotate(-90deg)}
.rest-ring-bg{fill:none;stroke:var(--s3);stroke-width:6}
.rest-ring-fg{
  fill:none;stroke:var(--acc);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:565.5;stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 12px rgba(255,107,53,.5))
}
.rest-ring-inner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center
}
.rest-ov-num{
  font-family:'Instrument Serif',serif;font-size:82px;font-weight:400;
  color:var(--text);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-3px
}
.rest-ov-hint{
  font-size:11px;color:var(--t2);font-family:'Geist Mono',monospace;
  margin-top:5px;min-height:16px;letter-spacing:.2px;
  max-width:160px;text-align:center;line-height:1.4
}
.rest-ov-adj{display:flex;gap:12px;justify-content:center;align-items:center}
.rest-ov-presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.sum-note{
  width:100%;min-height:64px;resize:vertical;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 12px;color:var(--t1);font-family:inherit;font-size:13px;line-height:1.4;
  outline:none;transition:border-color .15s
}
.sum-note:focus{border-color:var(--acc)}
.rest-preset{
  padding:7px 14px;border-radius:999px;
  background:var(--s2);border:1px solid var(--border);color:var(--t2);
  font-family:'Geist Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:all .15s
}
.rest-preset:hover{border-color:var(--acc);color:var(--acc)}
.rest-preset:active{transform:scale(.94)}
.rest-adj-btn{
  padding:11px 18px;border-radius:var(--r-md);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s
}
.rest-adj-btn:hover{border-color:var(--border-hi);color:var(--text)}
.rest-skip-btn{
  padding:14px 32px;border-radius:100px;
  background:var(--acc);border:none;color:#000;
  font-family:'Instrument Serif',serif;font-size:15px;font-weight:800;
  cursor:pointer;letter-spacing:.2px;
  transition:opacity .15s,box-shadow .2s;
  box-shadow:0 4px 22px var(--acc-glow)
}
.rest-skip-btn:hover{box-shadow:0 6px 30px rgba(201,255,71,.38)}
.rest-skip-btn:active{opacity:.8}
.rest-ov-off{
  display:block;margin:24px auto 0;background:none;border:none;
  color:var(--t3);font-family:'Geist',system-ui,sans-serif;font-size:11px;cursor:pointer;
  text-decoration:underline;text-underline-offset:3px;transition:color .15s
}
.rest-ov-off:hover{color:var(--red)}
.sb-rest-toggle{font-size:10px}

/* ── Mobile overlay */
.sb-ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:49;display:none
}
.sb-ov.open{display:block;animation:fadeIn .2s ease}

/* ── Responsive */
@media (max-width:600px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:50}
  .sidebar.open{transform:translateX(0)}
  .hmbgr{display:flex}
  .sc-b{width:40px;height:40px;font-size:20px}
  .dk{width:40px;height:40px}
  .ex-del{width:38px;height:38px}
  .hmbgr{width:40px;height:40px}
  .sb-btn{padding:11px 18px}
  .ex-list{gap:12px;padding:14px 12px 0}
  .sp-ex-list{gap:8px}
  .ex-head{padding:16px 14px}
  .sf{padding:12px 6px;font-size:16px}
  .sh-cancel,.sh-ok{padding:16px;font-size:15px}
  .sav-btn{padding:16px;font-size:16px}
}
@media (orientation:landscape) and (max-height:500px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:50}
  .sidebar.open{transform:translateX(0)}
  .hmbgr{display:flex}
  .topbar{padding:6px 16px}
  .pg-hdr{padding:10px 16px 8px}
  .pg-title{font-size:20px}
  .sp-hdr{padding:10px 16px 8px}
  .sp-title{font-size:18px}
  .page{padding-bottom:40px}
  .sb-logo{padding:12px 16px 10px}
  .sb-logo h1{font-size:18px}
}

::-webkit-scrollbar{width:0}

/* ── Edit mode */
.edit-banner{
  background:rgba(201,255,71,.07);border-bottom:1px solid var(--acc);
  color:var(--acc);font-size:10px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;text-align:center;padding:9px 16px
}
.sp-hdr-edit{gap:10px}
.sp-edit-colors-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 18px 8px}
.sp-cat-edit-wrap{display:flex;align-items:flex-start;gap:0}
.sp-cat-edit-inner{flex:1;min-width:0;position:relative}
.sec-reorder{display:flex;flex-direction:column;gap:4px;padding:14px 6px 0 12px;flex-shrink:0}
.sec-move-btn{
  width:30px;height:30px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s
}
.sec-move-btn:hover{background:var(--s3);border-color:var(--border-hi);color:var(--text)}
.sec-move-btn:active{border-color:var(--acc);color:var(--acc)}
.sec-move-btn.disabled{opacity:.25;cursor:default}
.sec-remove{
  position:absolute;top:10px;right:14px;z-index:2;
  background:var(--s2);border:1px solid var(--border);
  color:var(--t3);font-size:13px;cursor:pointer;border-radius:var(--r-sm);
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:all .12s
}
.sec-remove:hover{color:var(--red);border-color:rgba(255,85,85,.4)}
.sp-edit-tools{padding:16px 16px 22px;display:flex;flex-direction:column;gap:9px}
.sp-add-sec-btn{
  width:100%;padding:12px;border-radius:var(--r-md);
  background:none;border:1.5px dashed var(--border);
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s
}
.sp-add-sec-btn:hover{border-color:var(--acc);color:var(--acc)}
.sp-del-split-btn{
  width:100%;padding:12px;border-radius:var(--r-md);
  background:rgba(255,85,85,.07);border:1px solid rgba(255,85,85,.18);
  color:#ff6b6b;font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s
}
.sp-del-split-btn:hover{background:rgba(255,85,85,.13)}
.addsec-list{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:4px}
.addsec-item{
  display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:var(--r-md);
  background:none;border:1.5px solid;font-family:'Geist',system-ui,sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s
}
.addsec-item.used{opacity:.4;cursor:default}
.addsec-item:not(.used):active{opacity:.6}
.addsec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sp-edit-btn{
  padding:8px 13px;border-radius:var(--r-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .12s
}
.sp-edit-btn:hover{border-color:var(--border-hi);color:var(--text)}
.sp-done-btn{
  padding:9px 16px;border-radius:var(--r-sm);
  background:var(--acc);border:none;color:#000;
  font-family:'Instrument Serif',serif;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0
}
.sp-done-btn:active{opacity:.75}
.sp-name-inp{
  flex:1;background:var(--s2);border:1.5px solid var(--acc);border-radius:var(--r-sm);
  color:var(--text);font-family:'Instrument Serif',serif;font-size:18px;font-weight:800;
  padding:9px 13px;outline:none;min-width:0
}
.sp-color-dot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;flex-shrink:0;transition:all .15s
}
.sp-color-dot.sel{border-color:var(--text);box-shadow:0 0 0 2px var(--bg)}

/* ── Exercise Picker */
.picker-ov{
  position:fixed;inset:0;background:var(--bg);z-index:350;
  display:none;flex-direction:column;padding-top:var(--safe-top)
}
.picker-ov.open{display:flex;animation:fadeIn .2s ease}
.picker-wrap{display:flex;flex-direction:column;height:100%}
.picker-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0
}
.picker-title{font-family:'Instrument Serif',serif;font-size:18px;font-weight:800}
.picker-list{flex:1;overflow-y:auto;padding:0 16px 10px}
.picker-group{margin-bottom:14px}
.picker-group-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:12px 0 7px}
.picker-row{
  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--r-md);
  cursor:pointer;border:1px solid var(--border);margin-bottom:6px;background:var(--s1);transition:all .15s
}
.picker-row:hover{background:var(--s2);border-color:var(--border-hi)}
.picker-row.checked{background:var(--s2);border-color:var(--acc)}
.picker-check{
  width:22px;height:22px;border-radius:var(--r-sm);
  flex-shrink:0;background:var(--s2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s
}
.picker-check.on{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
.picker-nm{flex:1;font-size:13px;font-weight:500}
.picker-cat{font-size:10px;font-weight:700;flex-shrink:0}
.picker-foot{
  padding:13px 16px calc(var(--safe-bot) + 13px);border-top:1px solid var(--border);
  display:flex;gap:9px;flex-shrink:0;background:var(--bg)
}

/* ── Body Weight Goal */
.bw-goal-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px}
.bw-goal-collapsed{text-align:center;padding:10px}
.bw-goal-open-btn{background:none;border:none;color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:4px;transition:color .15s}
.bw-goal-open-btn:hover{color:var(--acc)}
.bw-goal-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bw-goal-lbl{flex:1;font-size:13px;font-weight:600}
.bw-goal-edit{background:none;border:none;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:color .15s}
.bw-goal-edit:hover{color:var(--acc)}
.bw-goal-clear{background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;padding:2px 4px;transition:color .15s}
.bw-goal-clear:hover{color:var(--red)}
.bw-goal-prog{margin-top:7px}
.bw-goal-prog-bar{height:6px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:5px}
.bw-goal-prog-lbl{font-size:10px;color:var(--t2);font-family:'Geist Mono',monospace}
.bw-goal-form{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-bottom:10px}
.bw-goal-form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.bw-goal-dir-wrap{flex-shrink:0}
.bw-goal-dir{display:flex;gap:0;margin-top:5px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border)}
.bw-dir-btn{
  flex:1;padding:10px 14px;background:var(--s2);border:none;
  color:var(--t2);font-family:'Geist',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s
}
.bw-dir-btn.sel{background:var(--acc);color:#000}

/* ── Recap */
/* ── Recap v3 ──────────────────────────────────── */
.rc3-wrap{padding:16px 14px 24px;display:flex;flex-direction:column;gap:14px}
.rc3-pills{display:flex;gap:6px;padding:0 0 2px}
.rc3-pill{padding:7px 20px;border-radius:var(--r-pill);border:1.5px solid var(--border);
  background:transparent;color:var(--t2);font-size:12px;font-weight:600;
  letter-spacing:.4px;cursor:pointer;transition:all .15s}
.rc3-pill.active{background:var(--acc);border-color:var(--acc);color:#fff}
.rc3-period{font-size:10px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 2px}
.rc3-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rc3-stat{background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);
  border-radius:var(--r-xl);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04);
  padding:16px 18px;display:flex;flex-direction:column;gap:4px}
.rc3-stat-num{font-family:'Instrument Serif',serif;font-size:42px;line-height:1;color:var(--text)}
.rc3-stat-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.rc3-stat-delta{font-size:11px;font-weight:600;margin-top:2px}
.rc3-insight{background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(255,179,138,.08));
  border:1.5px solid rgba(255,107,53,.25);border-radius:var(--r-xl);padding:16px 18px;
  display:flex;align-items:center;gap:12px}
.rc3-insight-icon{font-size:22px;flex-shrink:0}
.rc3-insight-text{font-size:13px;color:var(--text);line-height:1.5;font-weight:500}
.rc3-hl-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);padding:0 2px}
.rc3-hl{display:flex;flex-direction:column;gap:8px}
.rc3-hl-item{background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);
  border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.rc3-hl-item.green{border-left:3px solid var(--success)}
.rc3-hl-item.orange{border-left:3px solid var(--acc)}
.rc3-hl-icon{font-size:22px;flex-shrink:0}
.rc3-hl-title{font-size:13px;font-weight:700;margin-bottom:2px}
.rc3-hl-sub{font-size:11px;color:var(--t2);line-height:1.4}
.rc3-bw{background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);
  border-radius:var(--r-xl);padding:16px 18px;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04)}
.rc3-bw-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.rc3-bw-row{display:flex;align-items:baseline;gap:10px}
.rc3-bw-from{font-family:'Instrument Serif',serif;font-size:28px;color:var(--t2)}
.rc3-bw-arrow{font-size:16px;color:var(--t3)}
.rc3-bw-to{font-family:'Instrument Serif',serif;font-size:34px;color:var(--text)}
.rc3-bw-delta{font-size:12px;font-weight:700;margin-left:4px}
/* keep old classes for backward compat */
.recap-tabs,.recap-tab,.recap-period,.recap-stats,.recap-stat,.recap-stat-val,
.recap-stat-lbl,.recap-stat-delta,.recap-section-lbl,.recap-item,.recap-item.green,
.recap-item.orange,.recap-item-icon,.recap-item-title,.recap-item-sub,.recap-bw,
.recap-bw-lbl,.recap-bw-vals,.recap-bw-goal{display:none}

/* ── Empty states */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 24px 80px;text-align:center;gap:14px}
.empty-state-art{width:80px;height:80px;border-radius:50%;
  background:rgba(255,107,53,.08);border:1.5px solid rgba(255,107,53,.15);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  margin-bottom:4px}
.empty-state-icon{font-size:40px;opacity:.22}
.empty-state-msg{font-family:'Instrument Serif',serif;font-size:22px;
  font-weight:400;color:var(--text);letter-spacing:-.2px;line-height:1.25}
.empty-state-sub{font-size:13px;color:var(--t3);line-height:1.7;max-width:260px}
.empty-state-btn{margin-top:4px;padding:12px 24px;border-radius:var(--r-pill);
  border:none;background:var(--acc);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;box-shadow:0 8px 24px -8px var(--acc-glow);transition:opacity .15s}
.empty-state-btn:active{opacity:.8}
.sb-add-split{float:right;background:none;border:none;color:var(--t2);font-size:15px;font-weight:800;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s}
.sb-add-split:hover{color:var(--acc)}

/* ── Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageFade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes tabSlideInRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes tabSlideInLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:translateX(0)}}
@keyframes tabSlideOutRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-20px)}}
@keyframes tabSlideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

/* ══════════════════════════════════════════════════════
   HOME DASHBOARD CARDS — v3
   ══════════════════════════════════════════════════════ */
.hc-scroll{padding:6px 16px calc(16px + var(--safe-bot));display:flex;flex-direction:column;gap:12px}
.hc-card{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04);
  padding:20px;position:relative;overflow:hidden;
}
.hc-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}

/* Today hero card */
.hc-today{
  background:linear-gradient(155deg,#ff6b35 0%,#c44820 40%,#5a1e10 100%);
  padding:22px;cursor:pointer;
  box-shadow:0 30px 60px -20px rgba(255,107,53,0.45),inset 0 1px 0 rgba(255,255,255,0.12);
}
.hc-today::after{
  content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(255,255,255,0.16) 0%,transparent 70%);
  pointer-events:none;
}
.hc-today-meta{
  font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:6px;margin-bottom:8px;
  position:relative;z-index:1;
}
.hc-today-dot{width:6px;height:6px;border-radius:50%;background:#ffe3a3;box-shadow:0 0 8px #ffe3a3;flex-shrink:0}
.hc-today-name{
  font-family:'Instrument Serif',serif;
  font-size:46px;font-weight:400;letter-spacing:-1.2px;line-height:0.95;
  margin-bottom:14px;color:#fff;position:relative;z-index:1;
}
.hc-today-name em{font-style:italic;color:#ffe3a3}
.hc-today-list{display:flex;flex-direction:column;gap:0;margin-bottom:16px;position:relative;z-index:1}
.hc-today-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.10);font-size:13px;
}
.hc-today-row:last-child{border-bottom:none}
.hc-today-nm{font-weight:500;color:#fff}
.hc-today-last{font-family:'Geist Mono',monospace;font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:-.2px}
.hc-today-cta{
  background:rgba(255,255,255,0.95);color:#1a0e07;
  border:none;border-radius:var(--r-lg);padding:14px;width:100%;
  font-family:'Geist',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.1px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 8px 24px -8px rgba(0,0,0,0.35);cursor:pointer;
  position:relative;z-index:1;transition:opacity .15s;
}
.hc-today-cta:hover{opacity:.92}
.hc-empty-cta{background:linear-gradient(155deg,var(--s2) 0%,var(--s3) 100%);cursor:pointer}

/* Stats grid */
.hc-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hc-stat{padding:18px}
.hc-big{
  font-family:'Instrument Serif',serif;
  font-size:38px;font-weight:400;letter-spacing:-1.2px;line-height:1;margin:4px 0;
}
.hc-unit{font-size:13px;color:var(--t2);font-family:'Geist Mono',monospace;margin-left:3px}
.hc-delta{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:600;font-family:'Geist Mono',monospace;
  padding:3px 8px;border-radius:6px;margin-top:4px;
}
.hc-delta.up{color:var(--success);background:rgba(127,176,105,0.14)}
.hc-delta.dn{color:var(--red);background:rgba(212,51,47,0.12)}
.hc-delta.flat{color:var(--t2);background:rgba(168,161,149,0.10)}
.hc-delta.hc-delta-up{color:var(--success);background:rgba(127,176,105,0.14)}
.hc-delta.hc-delta-dn{color:var(--red);background:rgba(212,51,47,0.12)}
.hc-spark{display:flex;align-items:flex-end;gap:3px;height:40px;margin-top:10px}
.hc-bar{flex:1;background:var(--acc-soft);border-radius:3px 3px 0 0;opacity:0.8;min-height:4px;transition:height .3s}
.hc-bar-today{opacity:1;box-shadow:0 0 8px rgba(255,107,53,0.5)}
.hc-dots{display:flex;gap:4px;margin-top:10px}
.hc-streak-dot{
  flex:1;aspect-ratio:1;border-radius:50%;
  background:var(--s3);display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--t3);font-family:'Geist Mono',monospace;
}
.hc-streak-lit{background:var(--acc);color:#1a0e07;box-shadow:0 0 10px rgba(255,107,53,0.45)}
.hc-streak-today{box-shadow:0 0 0 2px var(--acc-soft),0 0 10px rgba(255,107,53,0.45)}

/* BW card */
.hc-bw{padding:20px;cursor:pointer}
.hc-bw-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.hc-bw-num{
  font-family:'Instrument Serif',serif;
  font-size:54px;font-weight:400;letter-spacing:-2px;line-height:0.9;color:var(--text);
}
.hc-bw-unit{font-size:16px;color:var(--t2);font-family:'Geist Mono',monospace;margin-left:3px}
.hc-goal-bar{height:5px;border-radius:3px;background:var(--s3);overflow:hidden;margin-top:12px}
.hc-goal-fill{height:100%;background:linear-gradient(90deg,var(--acc-soft),var(--acc));border-radius:3px;transition:width .5s}
.hc-goal-txt{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-top:5px;font-family:'Geist Mono',monospace}

/* Long lost card */
.hc-lost{padding:20px}
.hc-lost-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.hc-lost-row:last-child{border-bottom:none;padding-bottom:0}
.hc-lost-row:first-child{padding-top:4px}
.hc-lost-nm{font-size:14px;font-weight:500}
.hc-lost-sub{font-size:11px;color:var(--t3);margin-top:2px;font-family:'Geist Mono',monospace}
.hc-lost-pill{
  font-size:11px;font-family:'Geist Mono',monospace;font-weight:600;
  padding:4px 9px;border-radius:var(--r-pill);
  background:rgba(212,51,47,0.12);color:var(--red);
}

/* Progress sub-tabs content area */
.progress-sub{display:block}
#progressSubContent{
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  height:calc(100% - 52px);scrollbar-width:none;
}
#progressSubContent::-webkit-scrollbar{display:none}


/* ── History Heatmap ─────────────────────────────────── */
.hm-wrap{
  margin:14px 14px 4px;
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid var(--border);border-radius:var(--r-xl);
  padding:18px 16px 14px;
  box-shadow:var(--shadow);
}
.hm-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.hm-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.hm-sub{font-size:11px;color:var(--t2);font-family:'Geist Mono',monospace}
.hm-grid{display:flex;gap:4px;align-items:flex-start}
.hm-labels{display:flex;flex-direction:column;gap:2px;padding-top:1px;flex-shrink:0}
.hm-lbl{font-size:8px;color:var(--t3);font-family:'Geist Mono',monospace;height:10px;line-height:10px;width:10px;text-align:center}
.hm-cells{
  display:grid;
  grid-template-rows:repeat(7,10px);
  grid-auto-flow:column;
  gap:2px;
  flex:1;overflow:hidden;
}
.hm-cell{
  width:10px;height:10px;border-radius:2px;
  background:var(--s3);
  transition:opacity .15s;
}
.hm-cell:hover{opacity:.75;cursor:default}
.hm-today{box-shadow:0 0 0 1.5px var(--acc-soft)}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:10px;justify-content:flex-end}
.hm-legend .hm-cell{width:10px;height:10px;flex-shrink:0}


/* ── BW Hero (v3) ────────────────────────────────────── */
.bw3-hero{
  margin:0 14px 6px;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
  border:1px solid var(--border);border-radius:var(--r-xl);
  padding:22px 20px 16px;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.04);
  overflow:hidden;
}
.bw3-top{display:flex;justify-content:space-between;align-items:flex-start}
.bw3-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.bw3-num{
  font-family:'Instrument Serif',serif;
  font-size:72px;font-weight:400;letter-spacing:-3px;line-height:0.9;color:var(--text);
}
.bw3-unit{font-size:20px;color:var(--t2);font-family:'Geist Mono',monospace;margin-left:4px;font-weight:400;letter-spacing:0}
.bw3-delta{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;font-family:'Geist Mono',monospace;
  padding:3px 9px;border-radius:6px;margin-top:10px;
  background:rgba(127,176,105,0.12);
}
.bw3-goal-bar{height:5px;border-radius:3px;background:var(--s3);overflow:hidden;margin-top:14px}
.bw3-goal-fill{height:100%;background:linear-gradient(90deg,var(--acc-soft),var(--acc));border-radius:3px;transition:width .5s}
.bw3-goal-txt{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-top:5px;font-family:'Geist Mono',monospace}

</style>
</head>
<body>
<div class="app">

<!-- TONING v3 SHELL — bottom tab nav, no sidebar -->

<!-- Hidden sidebar stub (JS references these IDs) -->
<nav class="sidebar" id="sidebar" style="display:none">
  <div id="sbSplits"></div>
  <div class="sb-footer">
    <input type="file" id="impF" accept=".json" style="display:none" onchange="importData(event)">
    <button class="sb-ftn sb-rest-toggle" id="restToggleBtn" onclick="toggleRestTimer()"></button>
    <div class="sb-streak" id="streakBadge"></div>
  </div>
</nav>
<div class="sb-ov" id="sbOv"></div>

<div class="main">
  <!-- Top context bar -->
  <div class="topbar" id="topbar">
    <div class="tb-title" id="tbTitle"><em>Good</em> morning</div>
    <div id="tbAvatar" class="tb-avatar" onclick="showSettingsSheet()" title="Settings">👤</div>
    <button class="tb-gear" id="settingsBtn" onclick="showSettingsSheet()" title="Settings">&#9881;</button>
  </div>

  <!-- Page container -->
  <div class="pages" id="pages">

    <!-- HOME -->
    <div class="page active" id="page-home"><div id="homeContent"></div></div>

    <!-- TRAIN — splits injected here dynamically -->
    <div class="page" id="page-train"><div id="trainContent"></div></div>

    <!-- PROGRESS hub with sub-tabs -->
    <div class="page" id="page-progress-hub">
      <div class="subtabs" id="progressSubtabs">
        <button class="subtab active" onclick="switchProgressTab('progress')">Stats</button>
        <button class="subtab" onclick="switchProgressTab('prs')">Records</button>
        <button class="subtab" onclick="switchProgressTab('bodyweight')">Body Weight</button>
        <button class="subtab" onclick="switchProgressTab('recap')">Recap</button>
      </div>
      <div id="progressSubContent" style="overflow-y:auto;height:calc(100% - 52px)">
        <div id="progress-sub-progress" class="progress-sub active" style="overflow-y:auto">
          <div class="pst3-wrap">
            <div id="pst3Header"></div>
            <div id="pst3Radar"></div>
            <div class="pst3-section-lbl">Exercise Breakdown</div>
          </div>
          <div class="psel-wrap">
            <select class="psel" id="pSel" onchange="renderProgress()">
              <option value="">&#8212; Pick a muscle group &#8212;</option>
            </select>
          </div>
          <div id="progContent"><div class="no-data" style="padding:40px 20px;text-align:center;color:var(--t3)">Select a muscle group above</div></div>
        </div>
        <div id="progress-sub-prs" class="progress-sub" style="display:none"><div id="prsList"></div></div>
        <div id="progress-sub-bodyweight" class="progress-sub" style="display:none">
          <div id="bwChartSlot"></div>
          <div class="bw-card" style="margin:0 14px 14px">
            <div class="bw-card-title">Log Body Weight</div>
            <div class="bw-row">
              <div class="bw-field"><div class="bw-lbl">Date</div><input type="date" class="bw-inp" id="bwDate" style="font-size:13px;padding:10px 6px;"></div>
              <div class="bw-field"><div class="bw-lbl">Weight (kg)</div><input type="text" inputmode="decimal" class="bw-inp" id="bwKg" placeholder="75.0"></div>
              <button class="bw-add" onclick="saveBW()">Add</button>
            </div>
          </div>
          <div class="bw-list" id="bwList"></div>
        </div>
        <div id="progress-sub-recap" class="progress-sub" style="display:none"><div id="recapContent"></div></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="page" id="page-history"><div id="histList"></div></div>

  </div><!-- /pages -->

  <!-- Bottom tab bar -->
  <nav class="v3-tabs" id="v3TabBar">
    <button class="v3-tab active" id="tab-home" onclick="switchTab('home')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      Home
    </button>
    <button class="v3-tab" id="tab-train" onclick="switchTab('train')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><circle cx="4" cy="6.5" r="1.5"/><circle cx="4" cy="17.5" r="1.5"/><circle cx="20" cy="6.5" r="1.5"/><circle cx="20" cy="17.5" r="1.5"/></svg>
      Train
    </button>
    <button class="v3-tab" id="tab-progress" onclick="switchTab('progress')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
      Progress
    </button>
    <button class="v3-tab" id="tab-history" onclick="switchTab('history')">
      <svg class="v3-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      History
    </button>
  </nav>

</div><!-- /main -->
</div><!-- /app -->


<!-- Rest Timer Overlay — SVG Ring -->
<div class="rest-ov" id="restOv" onclick="if(event.target===this)cancelRest()">
  <div class="rest-ov-box">
    <div class="rest-sheet-handle"></div>
    <div class="rest-ov-label">Rest</div>
    <div class="rest-ring-wrap">
      <svg class="rest-ring" viewBox="0 0 200 200">
        <circle class="rest-ring-bg" cx="100" cy="100" r="90"/>
        <circle class="rest-ring-fg" id="restRing" cx="100" cy="100" r="90"/>
      </svg>
      <div class="rest-ring-inner">
        <div class="rest-ov-num" id="restNum">90</div>
        <div class="rest-ov-hint" id="restHint"></div>
      </div>
    </div>
    <div class="rest-ov-presets">
      <button class="rest-preset" onclick="setRestPreset(60)">60s</button>
      <button class="rest-preset" onclick="setRestPreset(90)">90s</button>
      <button class="rest-preset" onclick="setRestPreset(120)">2m</button>
      <button class="rest-preset" onclick="setRestPreset(180)">3m</button>
    </div>
    <div class="rest-ov-adj">
      <button class="rest-adj-btn" onclick="adjustRestTime(-15)">&#8722;15s</button>
      <button class="rest-skip-btn" onclick="cancelRest()">Skip Rest</button>
      <button class="rest-adj-btn" onclick="adjustRestTime(15)">+15s</button>
    </div>
    <button class="rest-ov-off" onclick="disableRest()">Turn off rest timer</button>
  </div>
</div>

<!-- Exercise Picker -->
<div class="picker-ov" id="pickerOv">
  <div class="picker-wrap">
    <div class="picker-hdr">
      <div class="picker-title">Pick Exercises</div>
      <button class="sum-close" onclick="closePicker()">&#10005;</button>
    </div>
    <input class="sh-inp" id="pickerSearch" placeholder="Search..." oninput="filterPicker()" style="margin:0 16px 10px;width:calc(100% - 32px)">
    <div class="picker-list" id="pickerList"></div>
    <div class="picker-foot">
      <button class="sh-cancel" onclick="closePicker()">Cancel</button>
      <button class="sh-ok" onclick="confirmPicker()">Add Selected</button>
    </div>
  </div>
</div>

<!-- Sheet -->
<div class="ov-dark" id="shBg" onclick="closeSheet()"></div>
<div class="sheet" id="addSheet">
  <div class="sh-handle"></div>
  <div class="sh-title" id="shTitle">Add Exercise</div>
  <input class="sh-inp" id="shInp" placeholder="e.g. Incline DB Press" onkeydown="if(event.key==='Enter')doAdd()">
  <div class="sh-acts">
    <button class="sh-cancel" onclick="closeSheet()">Cancel</button>
    <button class="sh-ok" onclick="doAdd()">Add</button>
  </div>
</div>

<!-- Confirm -->
<div class="conf-ov" id="confOv">
  <div class="conf-box">
    <div class="conf-msg" id="confMsg"></div>

// ── Config ────────────────────────────────────────────────────────────────────

  {id:'split-1', name:'Chest & Tris',     color:'--chest',   sections:[
    {type:'muscle',group:'chest'},{type:'muscle',group:'triceps'},{type:'muscle',group:'abs'},{type:'cardio'}]},
  {id:'split-2', name:'Legs',             color:'--legs',    sections:[
    {type:'muscle',group:'legs'},{type:'muscle',group:'abs'},{type:'cardio'}]},

];

const MUSCLES = ['chest','triceps','back','biceps','legs','shoulders','abs','forearms'];
const DEF = {
  chest:['Barbell Bench Press','Incline Dumbbell Press','Cable Fly'],
  triceps:['Tricep Pushdown','Skull Crusher','Overhead Tricep Extension'],
  back:['Deadlift','Barbell Row','Lat Pulldown'],
  biceps:['Barbell Bicep Curl','Hammer Curl','Preacher Curl'],
  legs:['Barbell Squat','Romanian Deadlift','Leg Press'],
  shoulders:['Overhead Press','Lateral Raise','Arnold Press'],
  abs:['Cable Crunch','Hanging Leg Raise','Ab Wheel Rollout'],

};

// ── Profile stubs (multi-profile removed; single-profile only) ────────────────
function getProfiles(){return[]}
function getActiveProfile(){return null}
function dbKey(){return 'il4__default'}

// ── Database ──────────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function loadDB(){
  let d=JSON.parse(localStorage.getItem(dbKey())||'null');
  if(!d){const old=localStorage.getItem('il4');if(old){d=JSON.parse(old);localStorage.setItem(dbKey(),old)}}
  if(d){
    if(!d.exercises.forearms)d.exercises.forearms=DEF.forearms.map(n=>({id:uid(),name:n}));
    if(!d.bodyWeights)d.bodyWeights=[];
    if(!d.splits)d.splits=DEFAULT_SPLITS.map(s=>JSON.parse(JSON.stringify(s)));
    if(!d.bwGoal)d.bwGoal=null;
    if(!d.settings)d.settings={restEnabled:true,restSecs:90};
    return d;
  }
  const ex={};MUSCLES.forEach(m=>{ex[m]=DEF[m].map(n=>({id:uid(),name:n}))});
  return{exercises:ex,workouts:[],bodyWeights:[],splits:DEFAULT_SPLITS.map(s=>JSON.parse(JSON.stringify(s))),bwGoal:null,settings:{restEnabled:true,restSecs:90}};
}
function saveDB(){localStorage.setItem(dbKey(),JSON.stringify(DB))}
let DB;
let openCards={},setCounts={},addSheetCat=null,curSplit=null,cardioOpen=false,chartInst={};
let _draftCache={}; // {exId: [{w,r,rpe},...]} persists across re-renders
let _sessionDone=new Set(); // exIds saved this session — shown in Done section

// ── Helpers ───────────────────────────────────────────────────────────────────
function cv(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}
function cc(cat){return cv(CAT_VAR[cat]||'--acc')}
function today(){return new Date().toISOString().slice(0,10)}
function fd(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`}
function parseNum(v){return parseFloat(String(v||'').replace(',','.').trim())||0}
function vol(sets){return sets.reduce((a,s)=>a+parseNum(s.reps)*parseNum(s.weight),0)}
function maxWt(sets){return Math.max(0,...sets.map(s=>parseNum(s.weight)))}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}
let _cr=null;
function confirm2(msg,yl='Delete'){
  return new Promise(r=>{
    _cr=r;
    document.getElementById('confMsg').textContent=msg;
    document.getElementById('cYes').textContent=yl;

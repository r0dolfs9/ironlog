          const all = sec.type === 'muscle' ? (DB.exercises[sec.group] || []) : (DB.exercises[sec.group] || []).filter(e => (sec.list||[]).includes(e.name));
          all.slice(0, 4).forEach(ex => {
            const last = DB.workouts.filter(w => w.exId === ex.id).sort((a,b) => b.date.localeCompare(a.date))[0];
            exList.push({ name: ex.name, last });
          });
        }
      });
      const daysSince = minDate === '1970-01-01' ? null : Math.floor((new Date(todayStr) - new Date(minDate)) / 86400000);
      suggestion = { sp: picked, exList: exList.slice(0, 4), daysSince };
    }
  }

  // ── 2. Weekly volume + sparkline
  const dayMs = 86400000;
  const days7 = Array.from({length:7}, (_,i) => { const d=new Date(now); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10); });
  const days14_7 = Array.from({length:7}, (_,i) => { const d=new Date(now); d.setDate(d.getDate()-(13-i)); return d.toISOString().slice(0,10); });
  const weekVol = days7.reduce((a,d) => a + DB.workouts.filter(w=>w.date===d).reduce((s,w)=>s+vol(w.sets),0), 0);
  const prevVol = days14_7.reduce((a,d) => a + DB.workouts.filter(w=>w.date===d).reduce((s,w)=>s+vol(w.sets),0), 0);
  const dayVols = days7.map(d => DB.workouts.filter(w=>w.date===d).reduce((s,w)=>s+vol(w.sets),0));
  const maxDV = Math.max(...dayVols, 1);
  const volDeltaNum = prevVol > 0 ? ((weekVol - prevVol) / prevVol * 100) : null;
  const volDeltaStr = volDeltaNum !== null ? (volDeltaNum >= 0 ? `↑ ${volDeltaNum.toFixed(1)}%` : `↓ ${Math.abs(volDeltaNum).toFixed(1)}%`) : '—';
  const volDeltaClass = volDeltaNum === null ? 'flat' : volDeltaNum >= 0 ? 'up' : 'dn';
  const weekVolDisp = weekVol >= 1000 ? (weekVol/1000).toFixed(1)+'k' : weekVol.toFixed(0);

  // ── 3. Streak
  const streak = calcStreak();
  const best = calcBestStreak();
  const weekDayLabels = ['M','T','W','T','F','S','S'];
  const weekDates = Array.from({length:7}, (_,i) => { const d=new Date(now); const dow=d.getDay(); const mon=new Date(d); mon.setDate(d.getDate()-((dow+6)%7)+i); return mon.toISOString().slice(0,10); });
  const trained = new Set(DB.workouts.map(w => w.date));
  const todayDow = (now.getDay()+6)%7; // 0=Mon

  // ── 4. Body weight
  const bwSorted = [...DB.bodyWeights].sort((a,b) => b.date.localeCompare(a.date));
  const latBW = bwSorted[0];
  const month30 = new Date(now); month30.setDate(now.getDate()-30);
  const m30str = month30.toISOString().slice(0,10);
  const oldBW = bwSorted.find(b => b.date <= m30str);
  const bwDelta = latBW && oldBW ? (parseNum(latBW.weight) - parseNum(oldBW.weight)) : null;

  // Sparkline path for BW (last 30 entries)
  const bwPoints = bwSorted.slice(0,30).reverse();
  let bwSvg = '';
  if (bwPoints.length >= 2) {
    const vals = bwPoints.map(b => parseNum(b.weight));
    const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
    const W=160, H=48;
    const pts = vals.map((v,i) => `${(i/(vals.length-1)*W).toFixed(1)},${(H-(v-mn)/rng*(H-8)-4).toFixed(1)}`).join(' ');
    const areaClose = ` ${W},${H} 0,${H} Z`;
    bwSvg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:48px;margin-top:8px">
      <defs><linearGradient id="bwg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6b35" stop-opacity="0.35"/><stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/></linearGradient></defs>
      <polygon points="${pts} ${areaClose}" fill="url(#bwg3)"/>
      <polyline points="${pts}" fill="none" stroke="#ff6b35" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  // ── 5. Long lost
  const longLost = [];
  Object.values(DB.exercises).flat().forEach(ex => {
    const last = DB.workouts.filter(w=>w.exId===ex.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if (!last) return;
    const ds = Math.floor((new Date(todayStr)-new Date(last.date))/dayMs);
    if (ds >= 7) longLost.push({name:ex.name, date:last.date, ds});
  });
  longLost.sort((a,b)=>b.ds-a.ds);
  const lostTop = longLost.slice(0,3);

  // ── Render ────────────────────────────────────────────────────────────────
  const suggCard = suggestion ? (() => {
    const col = suggestion.sp.color ? cv(suggestion.sp.color) : 'var(--acc)';
    const rows = suggestion.exList.map(e => {
      const lastStr = e.last ? `last ${maxWt(e.last.sets)}kg · ${e.last.sets.length}×${Math.round(e.last.sets.reduce((a,s)=>a+parseNum(s.reps),0)/e.last.sets.length)}` : 'no data yet';
      return `<div class="hc-today-row"><span class="hc-today-nm">${e.name}</span><span class="hc-today-last">${lastStr}</span></div>`;
    }).join('');
    const sub = suggestion.daysSince === null ? 'Never trained' : suggestion.daysSince === 0 ? 'Last trained today' : `Last trained ${suggestion.daysSince}d ago`;
    const spId = suggestion.sp.id;
    return `<div class="hc-card hc-today" onclick="switchTab('train');setTimeout(()=>goToSplit('${spId}'),80)">
      <div class="hc-today-meta"><span class="hc-today-dot"></span>Suggested · ${sub}</div>
      <div class="hc-today-name">${suggestion.sp.name.split(' ').length > 1
        ? suggestion.sp.name.replace(/(\S+)\s+(.+)/,'$1 <em>$2</em>')
        : suggestion.sp.name}</div>
      ${rows ? `<div class="hc-today-list">${rows}</div>` : ''}
      <button class="hc-today-cta" onclick="event.stopPropagation();switchTab('train');setTimeout(()=>goToSplit('${spId}'),80)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start workout
      </button>
    </div>`;
  })() : `<div class="hc-card hc-empty-cta">
    <div class="hc-lbl">Get started</div>
    <div class="hc-today-name">Create your <em>first</em> day</div>
    <button class="hc-today-cta" onclick="switchTab('train');setTimeout(addSplit,200)">+ Create workout day</button>
  </div>`;

  const barsHtml = dayVols.map((v,i) => {
    const h = Math.max(4, Math.round((v/maxDV)*36));
    const isToday = days7[i] === todayStr;
    return `<div class="hc-bar${isToday?' hc-bar-today':''}" style="height:${h}px"></div>`;
  }).join('');

  const dotsHtml = weekDayLabels.map((lbl,i) => {
    const lit = trained.has(weekDates[i]);
    const isToday = i === todayDow;
    return `<div class="hc-streak-dot${lit?' hc-streak-lit':''}${isToday?' hc-streak-today':''}">${lbl}</div>`;
  }).join('');

  const bwCard = latBW && latBW.weight ? `<div class="hc-card hc-bw" onclick="switchTab('progress');setTimeout(()=>switchProgressTab('bodyweight'),50)">
    <div class="hc-lbl">Body Weight</div>
    <div class="hc-bw-row">
      <div>
        <div class="hc-bw-num">${parseNum(latBW.weight).toFixed(1)}<span class="hc-bw-unit">kg</span></div>
        ${bwDelta !== null ? `<div class="hc-delta ${bwDelta<=0?'hc-delta-up':'hc-delta-dn'}">${bwDelta<=0?'↓':'↑'} ${Math.abs(bwDelta).toFixed(1)}kg this month</div>` : ''}
      </div>
      ${bwSvg}
    </div>
    ${DB.bwGoal ? (() => {
      const g=DB.bwGoal, cur=parseNum(latBW.weight), goal=parseNum(g.kg);
      const start=g.start?parseNum(g.start):cur, total=Math.abs(goal-start)||1;
      const done=Math.abs(cur-start), pct=Math.min(100,Math.round(done/total*100));
      const rem=Math.abs(cur-goal).toFixed(1);
      return `<div class="hc-goal-bar"><div class="hc-goal-fill" style="width:${pct}%"></div></div>
        <div class="hc-goal-txt"><span>Goal · ${goal}kg</span><span>${rem}kg to go</span></div>`;
    })() : ''}
  </div>` : '';

  const lostCard = lostTop.length ? `<div class="hc-card hc-lost">
    <div class="hc-lbl">Haven't trained in a while</div>
    ${lostTop.map(e => `<div class="hc-lost-row">
      <div><div class="hc-lost-nm">${e.name}</div><div class="hc-lost-sub">last · ${fd(e.date)}</div></div>
      <div class="hc-lost-pill">${e.ds}d ago</div>
    </div>`).join('')}
  </div>` : '';

  pg.innerHTML = `<div class="hc-scroll">
    ${suggCard}
    <div class="hc-grid2">
      <div class="hc-card hc-stat" onclick="switchTab('progress')">
        <div class="hc-lbl">This week</div>
        <div class="hc-big">${weekVolDisp}<span class="hc-unit">kg</span></div>
        <div class="hc-delta ${volDeltaClass}">${volDeltaStr} vs last</div>
        <div class="hc-spark">${barsHtml}</div>
      </div>
      <div class="hc-card hc-stat">
        <div class="hc-lbl">Streak</div>
        <div class="hc-big">${streak}<span class="hc-unit">days</span></div>
        <div class="hc-delta flat">best · ${best}</div>
        <div class="hc-dots">${dotsHtml}</div>
      </div>
    </div>
    ${bwCard}
    ${lostCard}
  </div>`;
}

// ── Settings sheet (replaces sidebar footer) ──────────────────────────────────
function showSettingsSheet() {
  const on = DB.settings?.restEnabled !== false;
  document.getElementById('shTitle').textContent = 'Settings';
  // Build settings sheet HTML into the existing sheet
  const restSecs = DB.settings?.restSecs || 90;

  document.getElementById('shInp').style.display = 'none';
  document.getElementById('shTitle').style.fontFamily = "'Instrument Serif', serif";
  document.getElementById('shTitle').style.fontSize = '24px';

  const acts = document.querySelector('#addSheet .sh-acts');
  if (acts) acts.style.display = 'none';

  // Build body
  let existing = document.getElementById('settSheetBody');
  if (existing) existing.remove();
  const body = document.createElement('div');
  body.id = 'settSheetBody';
  body.style.cssText = 'padding:0 18px 32px;display:flex;flex-direction:column;gap:0';
  body.innerHTML = `
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:4px 0 10px">Rest Timer</div>
    <div style="background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${on?'12px':'0'}">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--text)">Auto rest timer</div>
          <div style="font-size:11px;color:var(--t3)">Starts after each set</div>
        </div>
        <button onclick="toggleRestTimer();showSettingsSheet()" style="width:44px;height:26px;border-radius:999px;border:none;cursor:pointer;transition:all .2s;background:${on?'var(--acc)':'var(--s3)'};position:relative">
          <div style="position:absolute;top:3px;left:${on?'21px':'3px'};width:20px;height:20px;border-radius:50%;background:#fff;transition:all .2s"></div>
        </button>
      </div>
      ${on ? `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--t2);flex:1">Duration</span>
        ${[60,90,120,180].map(s=>`<button onclick="DB.settings.restSecs=${s};saveDB();showSettingsSheet()" style="padding:5px 10px;border-radius:var(--r-pill);border:1.5px solid ${restSecs===s?'var(--acc)':'var(--border)'};background:${restSecs===s?'var(--acc-dim)':'transparent'};color:${restSecs===s?'var(--acc)':'var(--t2)'};font-size:11px;font-weight:600;cursor:pointer">${s}s</button>`).join('')}
      </div>` : ''}
    </div>

    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:4px 0 10px">Data</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      <button onclick="exportData()" style="display:flex;align-items:center;gap:12px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;text-align:left">
        <span style="font-size:20px">⬇</span>
        <div><div style="font-size:14px;font-weight:600;color:var(--text)">Export JSON</div><div style="font-size:11px;color:var(--t3)">Full backup of all your data</div></div>
      </button>
      <button onclick="document.getElementById('impF').click()" style="display:flex;align-items:center;gap:12px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;text-align:left">
        <span style="font-size:20px">⬆</span>
        <div><div style="font-size:14px;font-weight:600;color:var(--text)">Import JSON</div><div style="font-size:11px;color:var(--t3)">Restore from a backup file</div></div>
      </button>
      <button onclick="closeSheet();exportMarkdown()" style="display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(255,107,53,.12),rgba(255,179,138,.06));border:1.5px solid rgba(255,107,53,.25);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;text-align:left">
        <span style="font-size:20px">✦</span>
        <div><div style="font-size:14px;font-weight:600;color:var(--text)">Export for AI analysis</div><div style="font-size:11px;color:var(--t2)">Markdown summary · paste into ChatGPT / Claude</div></div>
      </button>
    </div>

    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:4px 0 10px">Workout</div>
    <button onclick="closeSheet();addSplit()" style="display:flex;align-items:center;gap:12px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;text-align:left">
      <span style="font-size:20px">＋</span>
      <div><div style="font-size:14px;font-weight:600;color:var(--text)">New workout day</div><div style="font-size:11px;color:var(--t3)">Add a new training split</div></div>
    </button>

    <button onclick="closeSheet()" style="margin-top:18px;padding:14px;border-radius:var(--r-pill);border:1.5px solid var(--border);background:transparent;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer">Close</button>
  `;

  const sheet = document.getElementById('addSheet');
  sheet.appendChild(body);
  sheet.classList.add('open');
  document.getElementById('shBg').classList.add('open');
}

// ── N7: Markdown export for AI analysis (Step 25) ─────────────────────────────
function exportMarkdown() {
  const td = today();
  const lines = [];
  lines.push(`# IronLog Training Data`);
  lines.push(`Exported: ${td}\n`);

  // --- Summary stats ---
  const allW = DB.workouts.filter(w=>w.cat!=='cardio');
  const totalSessions = [...new Set(allW.map(w=>w.date))].length;
  const totalVol = Math.round(allW.reduce((a,w)=>a+vol(w.sets),0));
  const totalSets = allW.reduce((a,w)=>a+w.sets.length,0);
  lines.push(`## Summary`);
  lines.push(`- Total sessions: ${totalSessions}`);
  lines.push(`- Total volume: ${totalVol} kg`);
  lines.push(`- Total sets logged: ${totalSets}\n`);

  // --- Personal records ---
  const byEx = new Map();
  allW.forEach(w => {
    const m = maxWt(w.sets); if (!m) return;
    const cur = byEx.get(w.exId);
    if (!cur || m > cur.weight) byEx.set(w.exId, {name:w.name,cat:w.cat,weight:m,date:w.date,sets:w.sets});
  });
  const prs = [...byEx.values()].sort((a,b)=>b.weight-a.weight);
  lines.push(`## Personal Records`);
  prs.forEach(p => {
    const top = p.sets.find(s=>parseNum(s.weight)===p.weight);
    const reps = top ? top.reps : '?';
    lines.push(`- **${p.name}** (${CAT_LBL[p.cat]||p.cat}): ${p.weight}kg × ${reps} reps — ${p.date}`);
  });
  lines.push('');

  // --- Last 8 weeks volume by muscle group ---
  const eightWAgo = new Date(); eightWAgo.setDate(eightWAgo.getDate()-56);
  const ewStr = eightWAgo.toISOString().slice(0,10);
  const recent = allW.filter(w=>w.date>=ewStr);
  const volByCat = {};
  recent.forEach(w=>{volByCat[w.cat]=(volByCat[w.cat]||0)+vol(w.sets)});
  lines.push(`## Volume Last 8 Weeks (by muscle group)`);
  Object.entries(volByCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,v])=>{
    lines.push(`- ${CAT_LBL[cat]||cat}: ${Math.round(v)} kg`);
  });
  lines.push('');

  // --- Recent sessions (last 20) ---
  const sessions = {};
  DB.workouts.forEach(w=>{(sessions[w.date]=sessions[w.date]||[]).push(w)});
  const sortedDates = Object.keys(sessions).sort((a,b)=>b.localeCompare(a)).slice(0,20);
  lines.push(`## Recent Sessions (last ${sortedDates.length})`);
  sortedDates.forEach(date=>{
    const dayW = sessions[date];
    const cats = [...new Set(dayW.map(w=>CAT_LBL[w.cat]||w.cat))].join(', ');
    const dayVol = Math.round(dayW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+vol(w.sets),0));
    lines.push(`\n### ${date} — ${cats}`);
    if (dayVol) lines.push(`Volume: ${dayVol} kg`);
    dayW.filter(w=>w.cat!=='cardio'&&w.exId).forEach(w=>{
      const setStr = w.sets.map(s=>`${parseNum(s.weight)}kg×${s.reps}`).join(', ');
      lines.push(`- ${w.name}: ${setStr}`);
    });
    dayW.filter(w=>w.cat==='cardio').forEach(w=>{
      lines.push(`- Cardio: ${w.duration||'?'}min${w.calories?' · '+w.calories+'kcal':''}`);
    });
  });
  lines.push('');

  // --- Body weight ---
  if ((DB.bodyWeights||[]).length) {
    const bwSorted = [...DB.bodyWeights].sort((a,b)=>a.date.localeCompare(b.date));
    lines.push(`## Body Weight Log (last 30 entries)`);
    bwSorted.slice(-30).forEach(e=>lines.push(`- ${e.date}: ${e.weight} kg`));
    lines.push('');
    if (DB.bwGoal) lines.push(`**Goal:** ${DB.bwGoal.kg} kg\n`);
  }

  const md = lines.join('\n');
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ironlog-ai-${td}.md`;
  a.click();
  toast('Markdown exported ✦');
}

  const ov=document.getElementById('welcomeOv');
  if(ov)ov.style.display='none';
}
function startFresh(){
  DB=loadDB();
  renderSidebar();updateStreak();switchTab('home');

}

    DB=loadDB();
    renderSidebar();updateStreak();switchTab('home');
    dismissWelcome();

})();

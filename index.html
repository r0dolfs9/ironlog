  });
}
function resolveConf(v){document.getElementById('confOv').classList.remove('open');if(_cr){_cr(v);_cr=null}}

// ── Rest Timer ────────────────────────────────────────────────────────────────
// Time-based: remaining is computed from restEndsAt - Date.now() so it
// survives iOS backgrounding the JS thread (counter would freeze).
// A separate setTimeout fires the alarm at the exact end time — more reliable
// than the 250ms tick (browsers throttle setInterval in background).
// A Notification (via SW when hidden) alerts the user even if app is fully
// backgrounded / screen off.
let restInt=null,restTotal=90,restEndsAt=0;
let restEndTimeout=null,restNotif=null,restWakeLock=null,restNotifPromptShown=false;
const REST_CIRC=565.5; // 2*π*90 ≈ 565.5

function _restRemaining(){return Math.max(0,Math.ceil((restEndsAt-Date.now())/1000))}

async function _requestNotifPerm(){
  if(!('Notification' in window))return 'unsupported';
  if(Notification.permission==='granted'||Notification.permission==='denied')return Notification.permission;
  if(restNotifPromptShown)return Notification.permission;
  restNotifPromptShown=true;
  try{return await Notification.requestPermission()}catch(_){return 'default'}
}
async function _acquireWakeLock(){
  try{
    if('wakeLock' in navigator&&!restWakeLock){
      restWakeLock=await navigator.wakeLock.request('screen');
      restWakeLock.addEventListener?.('release',()=>{restWakeLock=null});
    }
  }catch(_){}
}
function _releaseWakeLock(){
  try{restWakeLock?.release?.()}catch(_){}
  restWakeLock=null;
}
function _fireRestAlarm(){
  try{navigator.vibrate&&navigator.vibrate([200,100,200,100,200])}catch(_){}
  if('Notification' in window&&Notification.permission==='granted'){
    const body='Hit your next set.';
    const opts={body,icon:'icon-192.png',badge:'icon-192.png',tag:'ironlog-rest',renotify:true,vibrate:[200,100,200,100,200]};
    try{
      if(document.hidden&&navigator.serviceWorker?.ready){
        navigator.serviceWorker.ready.then(reg=>{
          reg.showNotification('Rest over — go! 💪',opts).catch(()=>{
            try{restNotif=new Notification('Rest over — go! 💪',opts)}catch(_){}
          });
        }).catch(()=>{
          try{restNotif=new Notification('Rest over — go! 💪',opts)}catch(_){}
        });
      }else{
        restNotif=new Notification('Rest over — go! 💪',opts);
      }
    }catch(_){}
  }
  toast('Rest over — go! 💪');
}

function startRest(hint=''){
  if(!DB.settings.restEnabled)return;
  cancelRest();
  restTotal=DB.settings.restSecs||90;
  restEndsAt=Date.now()+restTotal*1000;
  const ov=document.getElementById('restOv');
  const numEl=document.getElementById('restNum');
  const ringEl=document.getElementById('restRing');
  const hintEl=document.getElementById('restHint');
  if(!ov)return;
  numEl.textContent=restTotal;
  if(ringEl){ringEl.style.strokeDashoffset='0';ringEl.style.transition='none';void ringEl.getBoundingClientRect();ringEl.style.transition='stroke-dashoffset 1s linear'}
  if(hintEl)hintEl.textContent=hint;
  ov.classList.add('show');
  _requestNotifPerm();
  _acquireWakeLock();
  restEndTimeout=setTimeout(()=>{restEndTimeout=null;_fireRestAlarm();cancelRest()},restTotal*1000);
  const tick=()=>{
    const rem=_restRemaining();
    numEl.textContent=rem;
    if(ringEl){const pct=rem/restTotal;ringEl.style.strokeDashoffset=(REST_CIRC*(1-pct)).toString()}
    if(rem<=0&&!restEndTimeout){cancelRest()}
  };
  restInt=setInterval(tick,250);
}
function cancelRest(){
  if(restInt){clearInterval(restInt);restInt=null}
  if(restEndTimeout){clearTimeout(restEndTimeout);restEndTimeout=null}
  if(restNotif){try{restNotif.close()}catch(_){}restNotif=null}
  if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(reg=>{
      reg.getNotifications({tag:'ironlog-rest'}).then(ns=>ns.forEach(n=>n.close())).catch(()=>{});
    }).catch(()=>{});
  }
  _releaseWakeLock();
  restEndsAt=0;
  document.getElementById('restOv')?.classList.remove('show');
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&restEndsAt){
    _acquireWakeLock();
    const numEl=document.getElementById('restNum');
    const ringEl=document.getElementById('restRing');
    const rem=_restRemaining();
    if(numEl)numEl.textContent=rem;
    if(ringEl){const pct=rem/restTotal;ringEl.style.strokeDashoffset=(REST_CIRC*(1-pct)).toString()}
    if(rem<=0){_fireRestAlarm();cancelRest()}
  }
});
function setRestPreset(secs){
  restTotal=secs;
  restEndsAt=Date.now()+secs*1000;
  DB.settings.restSecs=secs;saveDB();
  if(restEndTimeout){clearTimeout(restEndTimeout);restEndTimeout=null}
  if(restEndsAt){restEndTimeout=setTimeout(()=>{restEndTimeout=null;_fireRestAlarm();cancelRest()},secs*1000)}
  const numEl=document.getElementById('restNum');
  const ringEl=document.getElementById('restRing');
  if(numEl)numEl.textContent=secs;
  if(ringEl){ringEl.style.strokeDashoffset='0'}
  if(navigator.vibrate)navigator.vibrate(15);
}
function adjustRestTime(delta){
  const rem=Math.max(5,_restRemaining()+delta);
  restTotal=Math.max(5,restTotal+delta);
  restEndsAt=Date.now()+rem*1000;
  DB.settings.restSecs=restTotal;saveDB();
  if(restEndTimeout){clearTimeout(restEndTimeout);restEndTimeout=null}
  restEndTimeout=setTimeout(()=>{restEndTimeout=null;_fireRestAlarm();cancelRest()},rem*1000);
  const numEl=document.getElementById('restNum');
  const ringEl=document.getElementById('restRing');
  if(numEl)numEl.textContent=rem;
  if(ringEl){const pct=rem/restTotal;ringEl.style.strokeDashoffset=(REST_CIRC*(1-pct)).toString()}
}
function disableRest(){DB.settings.restEnabled=false;saveDB();cancelRest();updateRestToggleBtn();toast('Rest timer off. Re-enable in sidebar.')}
function toggleRestTimer(){DB.settings.restEnabled=!DB.settings.restEnabled;saveDB();updateRestToggleBtn();toast(DB.settings.restEnabled?'Rest timer on':'Rest timer off')}
function updateRestToggleBtn(){
  const btn=document.getElementById('restToggleBtn');if(!btn)return;
  const on=DB.settings.restEnabled;
  btn.textContent=`⏱ Rest Timer: ${on?'ON':'OFF'}`;
  btn.style.color=on?'var(--acc)':'var(--t3)';
}

// ── Streak ────────────────────────────────────────────────────────────────────
function calcStreak(){
  const dates=[...new Set(DB.workouts.map(w=>w.date))].sort().reverse();
  if(!dates.length)return 0;
  const todayStr=today();
  let streak=0,prev=null;
  for(const d of dates){
    if(prev===null){const gap=Math.round((new Date(todayStr)-new Date(d))/86400000);if(gap>1)break;streak=1;prev=d}
    else{const gap=Math.round((new Date(prev)-new Date(d))/86400000);if(gap!==1)break;streak++;prev=d}
  }
  return streak;
}
function updateStreak(){
  const s=calcStreak();
  const el=document.getElementById('streakBadge');
  if(el)el.textContent=s>0?`🔥 ${s} day streak`:'No streak yet';
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeSheet();closeSummary();cancelRest();closeFullChart();if(_cr)resolveConf(false)}
});
document.addEventListener('input',e=>{
  const el=e.target;
  if(el.inputMode==='decimal'||el.inputMode==='numeric'){
    const pos=el.selectionStart;const replaced=el.value.replace(/,/g,'.');
    if(replaced!==el.value){el.value=replaced;try{el.setSelectionRange(pos,pos)}catch(_){}}
  }
});
// ── Gesture controls ──────────────────────────────────────────────────────────
(function(){
  let _gs=null; // active gesture state
  document.addEventListener('pointerdown',function(e){
    const wheel=e.target.closest('.sc3-wheel');
    const slider=e.target.closest('.sc3-rpe-slider');
    if(!wheel&&!slider)return;
    // Don't start gesture if tapping the edit input itself
    if(e.target.classList.contains('sc3-inp-edit'))return;
    e.preventDefault();
    if(wheel){
      const exId=wheel.dataset.exid;const si=+wheel.dataset.setidx;
      const inp=document.getElementById('w-'+exId+'-'+si);
      const startVal=parseNum(inp?.value)||0;
      _gs={type:'wheel',exId,si,startY:e.clientY,startVal,lastTicks:0,moved:false};
      try{wheel.setPointerCapture(e.pointerId)}catch(_){}
    } else {
      const exId=slider.dataset.exid;const si=+slider.dataset.setidx;
      const track=slider.querySelector('.sc3-rpe-track');
      const rect=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
      const val=Math.round(pct*4+6);
      _gs={type:'rpe',exId,si,lastVal:val};
      sc3RpeSliderUpdate(exId,si,val);
      try{slider.setPointerCapture(e.pointerId)}catch(_){}
    }
  });
  document.addEventListener('pointermove',function(e){
    if(!_gs)return;
    if(_gs.type==='wheel'){
      const dy=_gs.startY-e.clientY; // up = positive = increase
      const ticks=Math.floor(Math.abs(dy)/28)*(dy<0?-1:1);
      if(ticks!==_gs.lastTicks){
        const diff=ticks-_gs.lastTicks;_gs.lastTicks=ticks;
        const inp=document.getElementById('w-'+_gs.exId+'-'+_gs.si);
        const valSpan=document.getElementById('wv-'+_gs.exId+'-'+_gs.si);
        if(!inp)return;
        let cur=parseNum(inp.value);
        if(isNaN(cur)||cur<0)cur=_gs.startVal;
        const next=Math.max(0,Math.min(500,Math.round((cur+diff*2.5)*10)/10));
        inp.value=next;
        if(valSpan)valSpan.textContent=next;
        try{navigator.vibrate&&navigator.vibrate(6)}catch(_){}
      }
      if(Math.abs(_gs.startY-e.clientY)>6)_gs.moved=true;
    } else {
      const slider=document.getElementById('rs-'+_gs.exId+'-'+_gs.si);
      if(!slider)return;
      const track=slider.querySelector('.sc3-rpe-track');
      const rect=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
      const val=Math.round(pct*4+6);
      if(val!==_gs.lastVal){
        _gs.lastVal=val;
        sc3RpeSliderUpdate(_gs.exId,_gs.si,val,true); // skipHaptic=true, fire manually
        try{navigator.vibrate&&navigator.vibrate(8)}catch(_){}
      }
    }
  });
  document.addEventListener('pointerup',function(e){
    if(!_gs)return;
    if(_gs.type==='wheel'){
      if(!_gs.moved){
        // Tap — enter type mode
        sc3WheelEdit(_gs.exId,_gs.si);
      } else {
        cacheDraft(_gs.exId,_gs.si);
      }
    }
    _gs=null;
  });
})();

// ── Sidebar ───────────────────────────────────────────────────────────────────
function toggleSB(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbOv').classList.toggle('open')}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOv').classList.remove('open')}
function renderSidebar(){
  const el=document.getElementById('sbSplits');if(!el)return;
  if(!DB.splits.length){
    el.innerHTML=`<div class="sb-empty">
      <div class="sb-empty-msg">No workout days yet</div>
      <button class="sb-empty-btn" onclick="addSplit()">+ Create your first workout</button>
    </div>`;
    return;
  }
  el.innerHTML=DB.splits.map(sp=>{
    const col=`var(${sp.color})`;const safeName=sp.name.replace(/&/g,'&amp;').replace(/'/g,'&#39;');
    return`<button class="sb-btn" data-pid="${sp.id}" style="--cc:${col}" onclick="navTo('${sp.id}','${safeName}','${sp.color}')"><span class="sb-dot" style="--cc:${col}"></span>${safeName}</button>`;
  }).join('');
}
function navTo(pid,title,colVar){
  closeSB();
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.toggle('active',b.dataset.pid===pid));
  const col=colVar?cv(colVar):'';
  document.getElementById('tbTitle').innerHTML=`<span style="color:${col}">${title}</span>`;
  if(!document.getElementById('page-'+pid)){
    const d=document.createElement('div');d.className='page';d.id='page-'+pid;
    document.getElementById('pages').appendChild(d);
  }
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pid).classList.add('active');
  if(pid==='history')renderHistory();
  else if(pid==='prs')renderPRs();
  else if(pid==='progress')renderProgressSel();
  else if(pid==='bodyweight')renderBW();
  else if(pid==='recap')renderRecap();
  else if(pid.startsWith('split-')){curSplit=pid;renderSplit(pid,col)}
  else if(pid.startsWith('muscle-')){curSplit=null;renderMuscle(pid.replace('muscle-',''),col)}
}

// ── Muscle Page ───────────────────────────────────────────────────────────────
function renderMuscle(cat,col){
  const pg=document.getElementById('page-muscle-'+cat);if(!pg)return;
  const exs=DB.exercises[cat]||[];
  pg.innerHTML=`<div class="pg-hdr" style="--pc:${col}">
    <div class="pg-title" style="color:${col}">${CAT_LBL[cat]}</div>
    <button class="add-btn" onclick="openSheet('${cat}')">+ Add</button>
  </div>
  <div class="ex-list">${exs.map(ex=>exCard(ex,cat,col,false)).join('')}</div>`;
}
function exCard(ex,cat,col,inSplit){
  const logs=DB.workouts.filter(w=>w.exId===ex.id).sort((a,b)=>b.date.localeCompare(a.date));
  const last=logs[0];
  let trendHTML='';
  if(logs.length>=2){
    const cur=logs[0],prev=logs[1];
    const curMax=maxWt(cur.sets),prevMax=maxWt(prev.sets);
    const curReps=cur.sets.reduce((a,s)=>a+parseNum(s.reps),0);
    const prevReps=prev.sets.reduce((a,s)=>a+parseNum(s.reps),0);
    let dir='same';
    if(curMax>prevMax||(curMax===prevMax&&curReps>prevReps))dir='up';
    else if(curMax<prevMax||(curMax===prevMax&&curReps<prevReps))dir='down';
    const tcol=dir==='up'?'#22c55e':dir==='down'?'#ef4444':'#facc15';
    const glow=dir==='up'?'0 0 6px rgba(34,197,94,.55)':dir==='down'?'0 0 6px rgba(239,68,68,.45)':'0 0 6px rgba(250,204,21,.45)';
    const title=dir==='up'?`Up vs ${fd(prev.date)}`:dir==='down'?`Down vs ${fd(prev.date)}`:`Same as ${fd(prev.date)}`;
    trendHTML=`<div class="ex-trend" title="${title}" style="background:${tcol};box-shadow:${glow}"></div>`;
  }
  let sub='No sessions yet';
  if(last&&last.sets.length){const ls=last.sets[last.sets.length-1];sub=`Last: ${ls.reps||'?'}×${ls.weight||'0'}kg · ${fd(last.date)}`}
  const isOpen=!!openCards[ex.id];
  const _isDone=_sessionDone.has(ex.id);
  return`<div class="ex-card${_isDone?' ex-done-today':''}" id="xc-${ex.id}" style="--pc:${col};${_isDone?'display:none':''}">
    <div class="ex-head" onclick="toggleCard('${ex.id}','${cat}','${col}',${inSplit})">
      <div class="ex-bar" style="background:${col}"></div>
      <div class="ex-inf">
        <div class="ex-nm">${ex.name}</div>
        <div class="ex-sb">${sub}</div>
      </div>
      ${trendHTML}
      <button class="ex-del" onclick="event.stopPropagation();delEx('${ex.id}','${cat}')">&#10005;</button>
      <div class="ex-arr ${isOpen?'open':''}" id="xa-${ex.id}">&#8250;</div>
    </div>
    ${isOpen?logForm(ex.id,cat,col,last):''}
  </div>`;
}
function isBodyweightExercise(name){
  if(!name)return false;
  const n=name.toLowerCase();
  return /\b(pull[\s-]?up|chin[\s-]?up|push[\s-]?up|dip|muscle[\s-]?up|bw|body[\s-]?weight)\b/.test(n);
}
function latestBodyweight(){
  const arr=DB.bodyWeights||[];if(!arr.length)return null;
  const sorted=[...arr].sort((a,b)=>b.date.localeCompare(a.date));
  return sorted[0].weight;
}
function _sc3Card(exId,i,p,rv,wv,bwFill,isDone,col,rpeVal){
  const ph_r=p?p.reps:'10';
  const ph_w=p?p.weight:(bwFill||'0');
  const rpeThumbPct=rpeVal?((rpeVal-6)/4*100):null;
  const rpeHtml=`<div class="sc3-rpe-slider" id="rs-${exId}-${i}" data-exid="${exId}" data-setidx="${i}" style="--pc:${col}">
      <div class="sc3-rpe-track">
        <div class="sc3-rpe-fill" id="rf-${exId}-${i}" style="width:${rpeThumbPct!==null?rpeThumbPct+'%':'0%'}"></div>
        <div class="sc3-rpe-thumb${rpeThumbPct!==null?' has-val':''}" id="rt-${exId}-${i}" style="left:${rpeThumbPct!==null?rpeThumbPct+'%':'0%'}"></div>
      </div>
      <div class="sc3-rpe-labels"><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
    </div>`;
  // Note: no onchange/auto-timer, no checkmark button (fixes #3 and #5)
  return`<div class="sc3-card" id="sc3-${exId}-${i}" style="--pc:${col}">
    <div class="sc3-num">Set ${i+1}</div>
    <div class="sc3-inputs">
      <div class="sc3-wheel" id="wh-${exId}-${i}" data-exid="${exId}" data-setidx="${i}" style="--pc:${col}">
        <div class="sc3-inp-lbl">Weight</div>
        <div class="sc3-wheel-display" id="wd-${exId}-${i}">
          <span class="sc3-wheel-val" id="wv-${exId}-${i}">${wv||ph_w}</span>
          <span class="sc3-wheel-unit">kg</span>
          <span class="sc3-wheel-hint">↕</span>
        </div>
        <input class="sc3-inp-edit" type="text" inputmode="decimal" id="w-${exId}-${i}" value="${wv||''}" placeholder="${ph_w}" oninput="cacheDraft('${exId}',${i})" onblur="sc3WheelBlur('${exId}',${i})">
      </div>
      <div class="sc3-input-grp">
        <div class="sc3-inp-lbl">Reps</div>
        <input class="sc3-inp" type="text" inputmode="decimal" placeholder="${ph_r}" value="${rv||''}" id="r-${exId}-${i}" style="--pc:${col}" oninput="cacheDraft('${exId}',${i})" onblur="tryStartRest('${exId}',${i})">
        <div class="sc3-inp-unit">reps</div>
      </div>
    </div>
    <div class="sc3-rpe" style="align-items:flex-start">
      <div class="sc3-rpe-lbl" style="padding-top:4px">RPE</div>
      ${rpeHtml}
    </div>
    <input type="hidden" id="rpe-${exId}-${i}" value="${rpeVal||''}">
  </div>`;
}
function sc3SetRpe(exId,i,val,_btn){sc3RpeSliderUpdate(exId,i,val);}
function sc3RpeSliderUpdate(exId,i,val,skipHaptic){
  const pct=(val-6)/4*100;
  const fill=document.getElementById('rf-'+exId+'-'+i);
  const thumb=document.getElementById('rt-'+exId+'-'+i);
  const hidden=document.getElementById('rpe-'+exId+'-'+i);
  if(fill)fill.style.width=pct+'%';
  if(thumb){thumb.style.left=pct+'%';thumb.classList.add('has-val')}
  if(hidden)hidden.value=val;
  cacheDraft(exId,i);
  if(!skipHaptic)try{navigator.vibrate&&navigator.vibrate(8)}catch(_){}
}
function sc3WheelEdit(exId,i){
  const wd=document.getElementById('wd-'+exId+'-'+i);
  const inp=document.getElementById('w-'+exId+'-'+i);
  if(!wd||!inp)return;
  wd.style.display='none';
  inp.classList.add('active');
  inp.focus();inp.select();
}
function sc3WheelBlur(exId,i){
  const wd=document.getElementById('wd-'+exId+'-'+i);
  const inp=document.getElementById('w-'+exId+'-'+i);
  const valSpan=document.getElementById('wv-'+exId+'-'+i);
  if(!wd||!inp||!valSpan)return;
  const v=inp.value.replace(',','.').trim();
  valSpan.textContent=v||inp.placeholder;
  inp.classList.remove('active');
  wd.style.display='';
  cacheDraft(exId,i);
}
function cacheDraft(exId,i){
  if(!_draftCache[exId])_draftCache[exId]=[];
  _draftCache[exId][i]={
    w:document.getElementById(`w-${exId}-${i}`)?.value||'',
    r:document.getElementById(`r-${exId}-${i}`)?.value||'',
    rpe:document.getElementById(`rpe-${exId}-${i}`)?.value||''
  };
}
function getDraft(exId,i){return _draftCache[exId]?.[i]||null;}
function clearDraft(exId){delete _draftCache[exId];}
function tryStartRest(exId,i){
  const w=parseNum(document.getElementById(`w-${exId}-${i}`)?.value);
  const r=parseNum(document.getElementById(`r-${exId}-${i}`)?.value);
  if(w>0||r>0){
    cacheDraft(exId,i);
    startRest(w>0?`${r>0?r+' reps @ ':''}${w}kg — beat it next set`:'Rest');
    try{navigator.vibrate&&navigator.vibrate(20)}catch(_){}
  }
}
function logForm(exId,cat,col,last){
  const n=setCounts[exId]||2;
  const ex=Object.values(DB.exercises).flat().find(e=>e.id===exId);
  const isBW=isBodyweightExercise(ex?.name||'');
  const latestBW=latestBodyweight();
  const bwFill=(isBW&&latestBW)?latestBW:null;
  let lb='';
  if(last&&last.sets.length){
    const ls=last.sets[last.sets.length-1];const top=maxWt(last.sets);
    lb=`<div class="last-ref">
      <div class="lr-left">
        <div class="lr-ttl">Last session · ${fd(last.date)}</div>
        <div class="lr-val">${ls.reps||'?'} reps × ${ls.weight||'0'} kg</div>
        <div class="lr-sub">Top weight: ${top}kg · ${last.sets.length} sets</div>
      </div>
    </div>`;
  }
  let cards='';
  for(let i=0;i<n;i++){
    const p=last&&last.sets[i];
    const draft=getDraft(exId,i);
    const rv=draft?.r||'';
    const wv=draft?.w||(bwFill&&!p?bwFill:'');
    const rpeV=draft?.rpe||'';
    cards+=_sc3Card(exId,i,p,rv,wv,bwFill,false,col,rpeV);
  }
  return`<div class="lf open" id="lf-${exId}">
    ${lb}
    <div class="lf-in">
      <input type="date" class="lf-date" id="ld-${exId}" value="${today()}">
      <div class="sets-hdr">
        <div class="sets-lbl">SETS</div>
        <div class="sets-ctl">
          <div class="sc-b" onclick="chgSets('${exId}','${cat}','${col}',-1)">&#8722;</div>
          <div class="sc-n" id="scn-${exId}">${n}</div>
          <div class="sc-b" onclick="chgSets('${exId}','${cat}','${col}',1)">+</div>
        </div>
      </div>
      <div class="sc3-list" id="stb-${exId}">${cards}</div>
      <div class="add-set-row">
        <button class="add-set-btn" onclick="chgSets('${exId}','${cat}','${col}',1)">+ Add Set</button>
      </div>
      <textarea class="lf-nt" id="ln-${exId}" placeholder="Notes..." rows="2"></textarea>
      <button class="sav-btn" style="background:${col}" onclick="saveEx('${exId}','${cat}')">Save</button>
    </div>
  </div>`;
}
function toggleCard(exId,cat,col,inSplit){
  openCards[exId]=!openCards[exId];
  if(openCards[exId])Object.keys(openCards).forEach(k=>{if(k!==exId)openCards[k]=false});
  if(inSplit)renderSplit(curSplit,col);else renderMuscle(cat,col);
  setTimeout(()=>{const el=document.getElementById('xc-'+exId);if(el){const rect=el.getBoundingClientRect();const page=el.closest('.page');if(page&&rect.top<60)page.scrollTop+=rect.top-70}},60);
}
function chgSets(exId,cat,col,d){
  const scnEl=document.getElementById('scn-'+exId);const stbEl=document.getElementById('stb-'+exId);
  if(!scnEl||!stbEl)return;
  const old=setCounts[exId]||2;const n=Math.max(1,Math.min(10,old+d));
  setCounts[exId]=n;scnEl.textContent=n;
  const saved={};
  for(let i=0;i<=old;i++){saved[i]={r:document.getElementById(`r-${exId}-${i}`)?.value||'',w:document.getElementById(`w-${exId}-${i}`)?.value||'',done:!!document.getElementById(`dk-${exId}-${i}`)?.classList.contains('on'),rpe:document.getElementById(`rpe-${exId}-${i}`)?.value||''}}
  const last=DB.workouts.filter(w=>w.exId===exId).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const exObj=Object.values(DB.exercises).flat().find(e=>e.id===exId);
  const bwFill=(isBodyweightExercise(exObj?.name||'')&&latestBodyweight())||null;
  let rows='';
  for(let i=0;i<n;i++){
    const p=last&&last.sets[i];
    const rv=saved[i]!==undefined?saved[i].r:'';
    const wv=saved[i]!==undefined?saved[i].w:(bwFill&&!p?bwFill:'');
    const isDone=saved[i]?.done||false;
    const rpeV=saved[i]?.rpe||'';
    rows+=_sc3Card(exId,i,p,rv,wv,bwFill,false,col,rpeV);
  }
  stbEl.innerHTML=rows;
}
function onWeightEntry(exId,i){
  // N1: auto-start rest timer when a weight value is entered, w/o needing ✓ tap
  const wEl=document.getElementById(`w-${exId}-${i}`);if(!wEl)return;
  const wVal=parseNum(wEl.value);if(!(wVal>0))return;
  const dk=document.getElementById(`dk-${exId}-${i}`);
  if(dk&&!dk.classList.contains('on')){
    dk.classList.add('on');
    dk.classList.remove('bounce');void dk.offsetWidth;dk.classList.add('bounce');
    try{navigator.vibrate&&navigator.vibrate(20)}catch(_){}
    const rVal=parseNum(document.getElementById(`r-${exId}-${i}`)?.value);
    startRest(`${rVal>0?rVal+' reps @ ':''}${wVal}kg — beat it next set`);
  }
}
function tDone(exId,i){
  const el=document.getElementById(`dk-${exId}-${i}`);if(!el)return;
  el.classList.toggle('on');
  // Also toggle sc3 card done style
  const card=document.getElementById(`sc3-${exId}-${i}`);
  if(card)card.classList.toggle('sc3-done-card',el.classList.contains('on'));
  if(el.classList.contains('on')){
    el.classList.remove('bounce');void el.offsetWidth;el.classList.add('bounce');
    try{navigator.vibrate&&navigator.vibrate(20)}catch(_){}
    const wVal=parseNum(document.getElementById(`w-${exId}-${i}`)?.value);
    const rVal=parseNum(document.getElementById(`r-${exId}-${i}`)?.value);
    startRest(wVal>0?`${rVal>0?rVal+' reps @ ':''}${wVal}kg — beat it next set`:'');
  }else{cancelRest()}
}
function saveEx(exId,cat){
  const date=document.getElementById('ld-'+exId)?.value;if(!date){toast('Pick a date');return}
  const n=setCounts[exId]||2;const sets=[];
  for(let i=0;i<n;i++){const rpe=document.getElementById(`rpe-${exId}-${i}`)?.value||'';sets.push({reps:document.getElementById(`r-${exId}-${i}`)?.value||'',weight:document.getElementById(`w-${exId}-${i}`)?.value||'',done:true,...(rpe?{rpe}:{})})}
  const notes=document.getElementById('ln-'+exId)?.value||'';
  const ex=Object.values(DB.exercises).flat().find(e=>e.id===exId);
  const prevBest=Math.max(0,...DB.workouts.filter(w=>w.exId===exId).map(w=>maxWt(w.sets)));
  const newBest=maxWt(sets);
  // session duration: track sessionStart per (date,splitId)
  if(!DB.sessionStarts)DB.sessionStarts={};
  const sessKey=`${date}|${curSplit||'solo-'+cat}`;
  if(!DB.sessionStarts[sessKey])DB.sessionStarts[sessKey]=Date.now();
  const nowTs=Date.now();
  // N4: if a workout for this exercise on this date already exists in this split, append sets to it
  const existing=DB.workouts.find(w=>w.exId===exId&&w.date===date&&(w.splitId||null)===(curSplit||null));
  if(existing){
    existing.sets=[...existing.sets,...sets];
    if(notes)existing.notes=existing.notes?existing.notes+'\n'+notes:notes;
    existing.savedAt=nowTs;
  }else{
    DB.workouts.push({id:uid(),exId,cat,name:ex?.name||'?',date,sets,notes,splitId:curSplit||null,sessionStart:DB.sessionStarts[sessKey],savedAt:nowTs});
  }
  saveDB();openCards[exId]=false;delete setCounts[exId];clearDraft(exId);_sessionDone.add(exId);cancelRest();
  if(curSplit)renderSplit(curSplit,cc(cat));else renderMuscle(cat,cc(cat));
  updateStreak();
  if(newBest>prevBest&&newBest>0){
    try{navigator.vibrate&&navigator.vibrate([40,30,80,30,40])}catch(_){}
    toast(`🏆 New PR! ${newBest}kg`);
  }else{
    try{navigator.vibrate&&navigator.vibrate(15)}catch(_){}
    toast('Saved!');
  }
}
async function delEx(exId,cat){
  const ok=await confirm2('Remove this exercise? History is kept.');if(!ok)return;
  DB.exercises[cat]=(DB.exercises[cat]||[]).filter(e=>e.id!==exId);saveDB();
  openCards[exId]=false;if(curSplit)renderSplit(curSplit,cc(cat));else renderMuscle(cat,cc(cat));toast('Removed');
}

// ── Split Page ────────────────────────────────────────────────────────────────
let splitEditing=null;
function renderSplit(spId,col){
  const sp=DB.splits.find(s=>s.id===spId);const pg=document.getElementById('page-'+spId);
  if(!pg||!sp)return;
  const editing=splitEditing===spId;const spCol=cv(sp.color)||col;
  let hdr;
  if(editing){
    hdr=`<div class="edit-banner">EDITING — tap Done when finished</div>
    <div class="sp-hdr sp-hdr-edit">
      <input class="sp-name-inp" id="spNameInp-${spId}" value="${sp.name.replace(/"/g,'&quot;')}" onblur="renameSplit('${spId}',this.value)" placeholder="Workout name">
      <button class="sp-done-btn" onclick="exitEditMode('${spId}')">Done</button>
    </div>
    <div class="sp-edit-colors-row">${SPLIT_COLORS.map(c=>`<div class="sp-color-dot${sp.color===c?' sel':''}" style="background:${cv(c)}" title="${c.replace('--','')}" onclick="recolorSplit('${spId}','${c}')"></div>`).join('')}</div>`;
  }else{
    hdr=`<div class="sp-hdr">
      <div class="sp-title">${sp.name}</div>
      <button class="sp-edit-btn" onclick="enterEditMode('${spId}')">✏ Edit</button>
      <button class="fin-btn" onclick="openSummary('${spId}')">Finish 🏁</button>
    </div>`;
  }
  let sectionsHtml='';
  sp.sections.forEach((sec,idx)=>{
    const total=sp.sections.length;
    const reorderBtns=editing?`<div class="sec-reorder">
      <button class="sec-move-btn${idx===0?' disabled':''}" onclick="moveSection('${spId}',${idx},-1)" ${idx===0?'disabled':''}>↑</button>
      <button class="sec-move-btn${idx===total-1?' disabled':''}" onclick="moveSection('${spId}',${idx},1)" ${idx===total-1?'disabled':''}>↓</button>
    </div>`:'';
    const removeBtn=editing?`<button class="sec-remove" onclick="removeSection('${spId}',${idx})">&#10005;</button>`:'';
    if(sec.type==='cardio'){
    sectionsHtml+=`<div class="sp-cat sp-cat-edit-wrap" draggable="${editing?'true':'false'}" data-sec-idx="${idx}" data-sec-spid="${spId}">${reorderBtns}<div class="sp-cat-edit-inner" style="position:relative">${removeBtn}${cardioHTML()}</div></div>`;return;
    }
    const group=sec.group;const c=cc(group);
    let exs;
    if(sec.type==='muscle'){exs=DB.exercises[group]||[]}
    else{
      const all=DB.exercises[group]||[];exs=all.filter(e=>sec.list.includes(e.name));
      sec.list.forEach(nm=>{
        if(!exs.find(e=>e.name===nm)){
          if(!DB.exercises[group])DB.exercises[group]=[];
          const newEx={id:uid(),name:nm};DB.exercises[group].push(newEx);saveDB();exs.push(newEx);
        }
      });
    }
    const lbl=sec.type==='exercises'?`${CAT_LBL[group]||group} <span style="font-size:8px;color:var(--t3)">(selected)</span>`:CAT_LBL[group]||group;
    sectionsHtml+=`<div class="sp-cat sp-cat-edit-wrap" draggable="${editing?'true':'false'}" data-sec-idx="${idx}" data-sec-spid="${spId}">${reorderBtns}<div class="sp-cat-edit-inner" style="position:relative">
      ${removeBtn}
      <div class="sp-cat-lbl" style="color:${c}">${lbl}</div>
      <div class="sp-ex-list">
        ${exs.map(ex=>exCard(ex,group,c,true)).join('')}
        ${!editing?`<button class="add-cat-btn" style="border-color:${c}44;color:${c}" onclick="openSheet('${group}')">+ Add ${CAT_LBL[group]} exercise</button>`:''}
      </div>
    </div></div>`;
  });
  let editTools='';
  if(editing){
    editTools=`<div class="sp-edit-tools">
      <button class="sp-add-sec-btn" onclick="openAddSection('${spId}')">＋ Add Section</button>
      <button class="sp-add-sec-btn" onclick="openExercisePicker('${spId}')">＋ Pick Exercises</button>
      <button class="sp-del-split-btn" onclick="deleteSplit('${spId}')">Delete this day</button>
    </div>`;
  }
  // Build "Done this session" section
  let doneSectionHtml='';
  const doneExIds=[..._sessionDone].filter(eid=>
    sp.sections.some(sec=>sec.type!=='cardio'&&(DB.exercises[sec.group]||[]).find(e=>e.id===eid))
  );
  if(doneExIds.length&&!editing){
    const doneCards=doneExIds.map(eid=>{
      const ex=Object.values(DB.exercises).flat().find(e=>e.id===eid);
      if(!ex)return'';
      const td=today();
      const w=DB.workouts.filter(wk=>wk.exId===eid&&wk.date===td).sort((a,b)=>(b.savedAt||0)-(a.savedAt||0))[0];
      const setCount=w?w.sets.length:0;const topWt=w?maxWt(w.sets):0;
      const sub=topWt?`${setCount} set${setCount!==1?'s':''} · top ${topWt}kg`:`${setCount} set${setCount!==1?'s':''}`;
      return`<div class="done-ex-card"><div class="done-ex-check">✓</div><div><div class="done-ex-name">${ex.name}</div><div class="done-ex-sub">${sub}</div></div></div>`;
    }).join('');
    doneSectionHtml=`<div class="done-section"><div class="done-section-lbl">Done this session</div>${doneCards}</div>`;
  }
  pg.innerHTML=hdr+sectionsHtml+doneSectionHtml+editTools;
  if(editing)setTimeout(()=>document.getElementById(`spNameInp-${spId}`)?.focus(),50);
}
function enterEditMode(spId){splitEditing=spId;renderSplit(spId,'')}
function exitEditMode(spId){splitEditing=null;const sp=DB.splits.find(s=>s.id===spId);renderSplit(spId,sp?cv(sp.color):'')}
function renameSplit(spId,val){
  const sp=DB.splits.find(s=>s.id===spId);if(!sp||!val.trim())return;
  sp.name=val.trim();saveDB();renderSidebar();
  document.getElementById('tbTitle').innerHTML=`<span style="color:${cv(sp.color)}">${sp.name}</span>`;
}
function recolorSplit(spId,colorVar){
  const sp=DB.splits.find(s=>s.id===spId);if(!sp)return;
  sp.color=colorVar;saveDB();renderSidebar();renderSplit(spId,cv(colorVar));
}
function removeSection(spId,idx){const sp=DB.splits.find(s=>s.id===spId);if(!sp)return;sp.sections.splice(idx,1);saveDB();renderSplit(spId,cv(sp.color))}
function moveSection(spId,idx,dir){
  const sp=DB.splits.find(s=>s.id===spId);if(!sp)return;
  const newIdx=idx+dir;if(newIdx<0||newIdx>=sp.sections.length)return;
  const[s]=sp.sections.splice(idx,1);sp.sections.splice(newIdx,0,s);saveDB();renderSplit(spId,cv(sp.color));
}

// Drag-to-reorder sections (HTML5 drag API)
let _dragSec=null;
document.addEventListener('dragstart',e=>{
  const t=e.target.closest('.sp-cat-edit-wrap[draggable="true"]');if(!t)return;
  _dragSec={spId:t.dataset.secSpid,idx:+t.dataset.secIdx,el:t};
  t.classList.add('dragging');
  try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',t.dataset.secIdx)}catch(_){}
});
document.addEventListener('dragend',e=>{
  if(_dragSec){_dragSec.el.classList.remove('dragging')}
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  _dragSec=null;
});
document.addEventListener('dragover',e=>{
  if(!_dragSec)return;
  const t=e.target.closest('.sp-cat-edit-wrap[draggable="true"]');if(!t||t===_dragSec.el)return;
  if(t.dataset.secSpid!==_dragSec.spId)return;
  e.preventDefault();
  const r=t.getBoundingClientRect();const above=e.clientY<r.top+r.height/2;
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  t.classList.add(above?'drop-above':'drop-below');
});
document.addEventListener('drop',e=>{
  if(!_dragSec)return;
  const t=e.target.closest('.sp-cat-edit-wrap[draggable="true"]');if(!t||t===_dragSec.el)return;
  if(t.dataset.secSpid!==_dragSec.spId)return;
  e.preventDefault();
  const r=t.getBoundingClientRect();const above=e.clientY<r.top+r.height/2;
  const sp=DB.splits.find(s=>s.id===_dragSec.spId);if(!sp)return;
  const fromIdx=_dragSec.idx;let toIdx=+t.dataset.secIdx;
  const[s]=sp.sections.splice(fromIdx,1);
  if(fromIdx<toIdx)toIdx--;
  sp.sections.splice(above?toIdx:toIdx+1,0,s);
  saveDB();renderSplit(_dragSec.spId,cv(sp.color));
  _dragSec=null;
});

// Pointer-based drag-to-reorder fallback (iOS / touch)
let _ptrDrag=null;
document.addEventListener('pointerdown',e=>{
  if(e.pointerType==='mouse')return;
  const t=e.target.closest('.sp-cat-edit-wrap[draggable="true"]');if(!t)return;
  // ignore taps on the inner controls (remove btn, up/down arrows, exercise rows)
  if(e.target.closest('.sec-remove,.sec-up,.sec-down,.x-row,button,input,select'))return;
  _ptrDrag={el:t,spId:t.dataset.secSpid,idx:+t.dataset.secIdx,startY:e.clientY,startX:e.clientX,active:false,target:null,above:true};
},{passive:true});
document.addEventListener('pointermove',e=>{
  if(!_ptrDrag||e.pointerType==='mouse')return;
  const dy=e.clientY-_ptrDrag.startY,dx=e.clientX-_ptrDrag.startX;
  if(!_ptrDrag.active){
    if(Math.abs(dy)<8||Math.abs(dx)>Math.abs(dy)*1.5)return;
    _ptrDrag.active=true;_ptrDrag.el.classList.add('dragging');
    document.body.style.userSelect='none';
  }
  e.preventDefault();
  const els=document.querySelectorAll(`.sp-cat-edit-wrap[draggable="true"][data-sec-spid="${_ptrDrag.spId}"]`);
  let hit=null,above=true;
  els.forEach(el=>{
    if(el===_ptrDrag.el)return;
    const r=el.getBoundingClientRect();
    if(e.clientY>=r.top&&e.clientY<=r.bottom){hit=el;above=e.clientY<r.top+r.height/2}
  });
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  if(hit){hit.classList.add(above?'drop-above':'drop-below');_ptrDrag.target=hit;_ptrDrag.above=above}else{_ptrDrag.target=null}
},{passive:false});
document.addEventListener('pointerup',e=>{
  if(!_ptrDrag||e.pointerType==='mouse')return;
  document.body.style.userSelect='';
  _ptrDrag.el.classList.remove('dragging');
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  if(_ptrDrag.active&&_ptrDrag.target){
    const sp=DB.splits.find(s=>s.id===_ptrDrag.spId);
    if(sp){
      const fromIdx=_ptrDrag.idx;let toIdx=+_ptrDrag.target.dataset.secIdx;
      const[s]=sp.sections.splice(fromIdx,1);
      if(fromIdx<toIdx)toIdx--;
      sp.sections.splice(_ptrDrag.above?toIdx:toIdx+1,0,s);
      saveDB();renderSplit(_ptrDrag.spId,cv(sp.color));
    }
  }
  _ptrDrag=null;
},{passive:true});
document.addEventListener('pointercancel',()=>{
  if(!_ptrDrag)return;
  document.body.style.userSelect='';
  _ptrDrag.el.classList.remove('dragging');
  document.querySelectorAll('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below'));
  _ptrDrag=null;
},{passive:true});

// Swipe-to-delete history sessions (touch)
let _swipe=null;
document.addEventListener('touchstart',e=>{
  const hd=e.target.closest('.hsess-hd');if(!hd)return;
  const sess=hd.closest('.hsess');if(!sess||!sess.dataset.sessKey)return;
  _swipe={sess,hd,startX:e.touches[0].clientX,startY:e.touches[0].clientY,dx:0,locked:false};
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!_swipe)return;
  const dx=e.touches[0].clientX-_swipe.startX;
  const dy=e.touches[0].clientY-_swipe.startY;
  if(!_swipe.locked){
    if(Math.abs(dx)>10||Math.abs(dy)>10){_swipe.locked=true;if(Math.abs(dy)>Math.abs(dx)){_swipe=null;return}}
    else return;
  }
  if(dx<0){
    e.preventDefault&&e.preventDefault();
    _swipe.dx=dx;
    _swipe.hd.style.transform=`translateX(${Math.max(dx,-180)}px)`;
    _swipe.sess.classList.toggle('swiping',dx<-30);
  }
},{passive:false});
document.addEventListener('touchend',()=>{
  if(!_swipe)return;
  const{sess,hd,dx}=_swipe;
  if(dx<-110){
    sess.classList.add('deleting');
    const key=sess.dataset.sessKey;
    setTimeout(async()=>{
      const ok=await confirm2('Delete entire session? All exercises in this session will be removed.');
      if(!ok){sess.classList.remove('deleting','swiping');hd.style.transform='';_swipe=null;return}
      // delete all workouts matching the session key
      const[date,...rest]=key.split('|');
      const sid=rest[0];
      DB.workouts=DB.workouts.filter(w=>{
        if(sid==='solo'){return!(w.date===date&&!w.splitId)}
        return!(w.date===date&&w.splitId===sid);
      });
      saveDB();renderHistory();toast('Session deleted');
    },200);
  }else{
    hd.style.transform='';sess.classList.remove('swiping');
  }
  _swipe=null;
},{passive:true});

let pickerTargetSplit=null,pickerSelected=new Set();
function openExercisePicker(spId){pickerTargetSplit=spId;pickerSelected=new Set();renderPickerList('');document.getElementById('pickerSearch').value='';document.getElementById('pickerOv').classList.add('open')}
function closePicker(){document.getElementById('pickerOv').classList.remove('open');pickerTargetSplit=null;pickerSelected=new Set()}
function filterPicker(){renderPickerList(document.getElementById('pickerSearch').value.trim().toLowerCase())}
function renderPickerList(query){
  let html='';
  MUSCLES.forEach(group=>{
    const exs=(DB.exercises[group]||[]).filter(e=>!query||e.name.toLowerCase().includes(query));
    if(!exs.length)return;const c=cc(group);
    html+=`<div class="picker-group"><div class="picker-group-lbl" style="color:${c}">${CAT_LBL[group]}</div>`;
    exs.forEach(ex=>{
      const checked=pickerSelected.has(ex.id);
      html+=`<label class="picker-row${checked?' checked':''}">
        <input type="checkbox" style="display:none" ${checked?'checked':''} onchange="togglePick('${ex.id}','${group}',this)">
        <div class="picker-check${checked?' on':''}">${checked?'✓':''}</div>
        <div class="picker-nm">${ex.name}</div>
        <div class="picker-cat" style="color:${c}">${CAT_LBL[group]}</div>
      </label>`;
    });
    html+=`</div>`;
  });
  if(!html)html=`<div class="no-data">No exercises found</div>`;
  document.getElementById('pickerList').innerHTML=html;
}
function togglePick(exId,group,checkbox){
  if(checkbox.checked)pickerSelected.add(exId+'|'+group);else pickerSelected.delete(exId+'|'+group);
  const list=document.getElementById('pickerList');
  list.querySelectorAll('.picker-row').forEach(row=>{
    const cb=row.querySelector('input[type=checkbox]');const check=row.querySelector('.picker-check');
    if(!cb)return;const isChecked=cb.checked;
    row.classList.toggle('checked',isChecked);check.classList.toggle('on',isChecked);check.textContent=isChecked?'✓':'';
  });
}
function confirmPicker(){
  if(!pickerSelected.size){toast('Select at least one exercise');return}
  const sp=DB.splits.find(s=>s.id===pickerTargetSplit);if(!sp)return;
  const byGroup={};
  pickerSelected.forEach(key=>{
    const[exId,group]=key.split('|');if(!byGroup[group])byGroup[group]=[];
    const ex=(DB.exercises[group]||[]).find(e=>e.id===exId);if(ex)byGroup[group].push(ex.name);
  });
  Object.entries(byGroup).forEach(([group,names])=>{
    if(sp.sections.find(s=>s.type==='muscle'&&s.group===group)){toast(`${CAT_LBL[group]} already added as full section`);return}
    const existing=sp.sections.find(s=>s.type==='exercises'&&s.group===group);
    if(existing){names.forEach(n=>{if(!existing.list.includes(n))existing.list.push(n)})}
    else{sp.sections.push({type:'exercises',group,list:names})}
  });
  saveDB();closePicker();renderSplit(pickerTargetSplit,cv(sp.color));
  toast(`${pickerSelected.size} exercise${pickerSelected.size!==1?'s':''} added`);
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory(){
  const c=document.getElementById('histList');
  if(!DB.workouts.length){
    c.innerHTML=`<div class="empty-state">
  <div class="empty-state-art">📋</div>
  <div class="empty-state-msg">No sessions yet</div>
  <div class="empty-state-sub">Log your first workout and your training history will appear here.</div>
  <button class="empty-state-btn" onclick="switchTab('train')">Go to Train</button>
</div>`;return;
  }

  // ── 12-week heatmap ────────────────────────────────────────────────────────
  const todayD=new Date();todayD.setHours(0,0,0,0);
  // Start from the most recent Sunday (or today if Sunday), go back 12 weeks
  const dow=todayD.getDay(); // 0=Sun
  const heatEnd=new Date(todayD);
  const heatStart=new Date(heatEnd);heatStart.setDate(heatEnd.getDate()-83); // 12*7=84 days
  // Build date→count map
  const dateCounts={};
  DB.workouts.forEach(w=>{ dateCounts[w.date]=(dateCounts[w.date]||0)+1; });
  const maxCount=Math.max(...Object.values(dateCounts),1);
  // Build 84 cells (Sun→Sat columns), newest on right
  const cells=[];
  for(let i=0;i<84;i++){
    const d=new Date(heatStart);d.setDate(heatStart.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const cnt=dateCounts[ds]||0;
    const isToday=ds===todayD.toISOString().slice(0,10);
    const intensity=cnt===0?0:Math.max(0.18,cnt/maxCount);
    const title=`${ds}${cnt?' · '+cnt+' session'+(cnt>1?'s':''):''}`;
    cells.push(`<div class="hm-cell${isToday?' hm-today':''}" style="${cnt?`background:rgba(255,107,53,${intensity.toFixed(2)});`:''}opacity:${isToday&&!cnt?'0.5':'1'}" title="${title}"></div>`);
  }
  // Week-day labels (S M T W T F S)
  const dowLabels=['S','M','T','W','T','F','S'];
  const labelCol=dowLabels.map(l=>`<div class="hm-lbl">${l}</div>`).join('');
  const heatmapHTML=`<div class="hm-wrap">
    <div class="hm-hdr">
      <span class="hm-title">12-week activity</span>
      <span class="hm-sub">${Object.values(dateCounts).reduce((a,b)=>a+b,0)} total sessions</span>
    </div>
    <div class="hm-grid">
      <div class="hm-labels">${labelCol}</div>
      <div class="hm-cells">${cells.join('')}</div>
    </div>
    <div class="hm-legend">
      <span style="color:var(--t3);font-size:10px">Less</span>
      <div class="hm-cell" style="background:rgba(255,107,53,0.18)"></div>
      <div class="hm-cell" style="background:rgba(255,107,53,0.4)"></div>
      <div class="hm-cell" style="background:rgba(255,107,53,0.65)"></div>
      <div class="hm-cell" style="background:rgba(255,107,53,0.9)"></div>
      <span style="color:var(--t3);font-size:10px">More</span>
    </div>
  </div>`;

  // ── 7-day strip (kept below heatmap) ──────────────────────────────────────
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(todayD);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const dayWs=DB.workouts.filter(w=>w.date===ds);
    let primarySplit=null;
    if(dayWs.length){
      const counts={};dayWs.forEach(w=>{const k=w.splitId||'_solo_'+w.cat;counts[k]=(counts[k]||0)+1});
      primarySplit=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
    }
    let col='var(--t3)';
    if(primarySplit&&primarySplit.startsWith('_solo_')){col=cc(primarySplit.replace('_solo_',''))}
    else if(primarySplit){const sp=DB.splits.find(s=>s.id===primarySplit);if(sp)col=`var(${sp.color})`}
    const lbl=d.toLocaleDateString('en',{weekday:'short'})[0];
    const dn=d.getDate();
    const isToday=i===0;
    days.push(`<div class="hstrip-day${dayWs.length?' on':''}${isToday?' today':''}" title="${fd(ds)}${dayWs.length?' · '+dayWs.length+' logged':''}">
      <div class="hstrip-lbl">${lbl}</div>
      <div class="hstrip-dot" style="${dayWs.length?`background:${col};box-shadow:0 0 8px ${col}`:''}"></div>
      <div class="hstrip-num">${dn}</div>
    </div>`);
  }
  const stripHTML=`<div class="hstrip" style="margin:0 14px 14px"><div class="hstrip-hdr">LAST 7 DAYS</div><div class="hstrip-row">${days.join('')}</div></div>`;
  const sessMap=new Map();
  [...DB.workouts].sort((a,b)=>b.date.localeCompare(a.date)).forEach(w=>{
    const key=w.splitId?`${w.date}|${w.splitId}`:`${w.date}|solo|${w.cat}|${w.exId}`;
    if(!sessMap.has(key))sessMap.set(key,{date:w.date,splitId:w.splitId,entries:[]});
    sessMap.get(key).entries.push(w);
  });
  c.innerHTML=heatmapHTML+stripHTML+[...sessMap.values()].map((sess,i)=>{
    let sessName;
    if(sess.splitId)sessName=DB.splits.find(s=>s.id===sess.splitId)?.name||'Workout';
    else{const cats=[...new Set(sess.entries.map(e=>e.cat))];sessName=cats.map(ct=>CAT_LBL[ct]||ct).join(' & ')}
    const firstCat=sess.entries.find(e=>e.cat!=='cardio')?.cat||'cardio';const count=sess.entries.length;
    return`<div class="hsess" data-sess-key="${sess.splitId?`${sess.date}|${sess.splitId}`:`${sess.date}|solo`}">
      <div class="hsess-wipe">DELETE →</div>
      <button class="hsess-hd" onclick="tSess('hb${i}','ha${i}')">
        <div class="hsess-dot" style="background:${cc(firstCat)}"></div>
        <div class="hsess-info">
          <div class="hsess-name">${sessName}</div>
          <div class="hsess-meta">${fd(sess.date)} · ${count} exercise${count!==1?'s':''}</div>
        </div>
        <span class="hsess-arr" id="ha${i}">&#8250;</span>
      </button>
      <div class="hsess-body" id="hb${i}">${sess.entries.map(w=>histEntry(w)).join('')}</div>
    </div>`;
  }).join('');
}
function histEntry(w){
  const c=cc(w.cat);
  if(w.cat==='cardio')return`<div class="hentry"><div class="hel"><div class="henm">🏃 Cardio</div><div class="hechips"><div class="chip">${w.duration||'?'} min</div><div class="chip">${w.calories||'?'} kcal</div></div></div><button class="hedel" onclick="delW('${w.id}')">&#10005;</button></div>`;
  return`<div class="hentry"><div class="hel"><div class="henm">${w.name}</div><div class="hecat" style="color:${c}">${CAT_LBL[w.cat]||w.cat}</div><div class="hechips">${w.sets.map((s,i)=>`<div class="chip">S${i+1} ${s.reps||'?'}×${s.weight||'0'}kg</div>`).join('')}</div>${w.notes?`<div class="henotes">${w.notes}</div>`:''}</div><button class="hedel" onclick="delW('${w.id}')">&#10005;</button></div>`;

      html+=`<div class="pr-row" style="--pc:${col}" onclick="openFullChart('${p.exId}','${(p.name||'').replace(/'/g,'&#39;')}','${p.cat}')">
        <div class="pr-row-bar" style="background:${col}"></div>

  c.innerHTML=html;
}

function renderProgressStats(period='week'){
  renderProgressStatsHeader(period);
  renderProgressRadar(period);
}
function renderProgressStatsHeader(period){
  const hdr=document.getElementById('pst3Header');if(!hdr)return;
  const now=new Date();const td=today();
  let curStart,prevStart,prevEnd;
  if(period==='week'){
    curStart=new Date(now);curStart.setDate(now.getDate()-6);
    prevStart=new Date(curStart);prevStart.setDate(prevStart.getDate()-7);
    prevEnd=new Date(curStart);prevEnd.setDate(prevEnd.getDate()-1);
  } else {
    curStart=new Date(now.getFullYear(),now.getMonth(),1);
    prevStart=new Date(now.getFullYear(),now.getMonth()-1,1);
    prevEnd=new Date(curStart);prevEnd.setDate(prevEnd.getDate()-1);
  }
  const cs=curStart.toISOString().slice(0,10);
  const ps=prevStart.toISOString().slice(0,10);
  const pe=prevEnd.toISOString().slice(0,10);
  const curW=DB.workouts.filter(w=>w.date>=cs&&w.date<=td);
  const prevW=DB.workouts.filter(w=>w.date>=ps&&w.date<=pe);
  const curSess=[...new Set(curW.map(w=>w.date))].length;
  const prevSess=[...new Set(prevW.map(w=>w.date))].length;
  const curVol=Math.round(curW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+vol(w.sets),0));
  const prevVol=Math.round(prevW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+vol(w.sets),0));
  const curSets=curW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+w.sets.length,0);
  const prevSets=prevW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+w.sets.length,0);
  function fmt(cur,prv){
    const d=cur-prv;if(!prv&&!cur)return'';
    const sign=d>0?'+':'';const col=d>0?'var(--success)':d<0?'var(--red)':'var(--t3)';
    return`<div class="pst3-col-delta" style="color:${col}">${sign}${d}</div>`;
  }
  function fmtVol(kg){return kg>=1000?(kg/1000).toFixed(1)+'t':kg+'kg'}
  hdr.innerHTML=`<div class="pst3-hdr">
    <div class="pst3-hdr-top">
      <div class="pst3-hdr-title">${period==='week'?'This Week':'This Month'}</div>
      <div class="pst3-toggle">
        <button class="pst3-tbtn${period==='week'?' active':''}" onclick="renderProgressStats('week')">Week</button>
        <button class="pst3-tbtn${period==='month'?' active':''}" onclick="renderProgressStats('month')">Month</button>
      </div>
    </div>
    <div class="pst3-cols">
      <div class="pst3-col">
        <div class="pst3-col-num">${curSess}</div>
        <div class="pst3-col-lbl">Sessions</div>
        ${fmt(curSess,prevSess)}
      </div>
      <div class="pst3-col">
        <div class="pst3-col-num">${fmtVol(curVol)}</div>
        <div class="pst3-col-lbl">Volume</div>
        ${fmt(curVol,prevVol)}
      </div>
      <div class="pst3-col">
        <div class="pst3-col-num">${curSets}</div>
        <div class="pst3-col-lbl">Sets</div>
        ${fmt(curSets,prevSets)}
      </div>
    </div>
  </div>`;
}
let _radarChart=null;
function renderProgressRadar(period='week'){
  const wrap=document.getElementById('pst3Radar');if(!wrap)return;
  const now=new Date();const td=today();
  let curStart;
  if(period==='week'){curStart=new Date(now);curStart.setDate(now.getDate()-6);}
  else{curStart=new Date(now.getFullYear(),now.getMonth(),1);}
  const cs=curStart.toISOString().slice(0,10);
  const curW=DB.workouts.filter(w=>w.date>=cs&&w.date<=td&&w.cat!=='cardio');
  if(!curW.length){wrap.innerHTML='';return;}
  const freq={};MUSCLES.forEach(m=>{freq[m]=0});
  curW.forEach(w=>{if(freq[w.cat]!==undefined)freq[w.cat]++;});
  const activeMuscles=MUSCLES.filter(m=>freq[m]>0);
  if(activeMuscles.length<3){wrap.innerHTML='';return;}
  const labels=activeMuscles.map(m=>CAT_LBL[m]||m);

    'biceps':'#ff8a5c','legs':'#60a5fa','shoulders':'#fbbf24','abs':'#34d399',
    'forearms':'#f472b6','cardio':'#fb7185'};
  activeMuscles.forEach((m,i)=>{
    const col=muscleColMap[m]||'#ff6b35';
    const div=document.createElement('div');div.className='pst3-radar-leg-item';
    div.innerHTML=`<div class="pst3-radar-leg-dot" style="background:${col}"></div>${labels[i]}: ${data[i]}`;
    legEl.appendChild(div);
  });
  const ctx=document.getElementById('pst3RadarCanvas');
  if(!ctx)return;
  if(_radarChart){_radarChart.destroy();_radarChart=null;}
  _radarChart=new Chart(ctx,{
    type:'radar',
    data:{
      labels:labels,
      datasets:[{
        data:data,
        backgroundColor:'rgba(255,107,53,0.15)',
        borderColor:'rgba(255,107,53,0.8)',
        borderWidth:2,
        pointBackgroundColor:'rgba(255,107,53,1)',
        pointRadius:4,
        pointHoverRadius:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{r:{
        beginAtZero:true,ticks:{stepSize:1,color:'rgba(168,161,149,0.6)',font:{size:9},
          backdropColor:'transparent'},
        grid:{color:'rgba(245,241,232,0.07)'},
        pointLabels:{color:'var(--t2)',font:{size:10,weight:'600'}},
        angleLines:{color:'rgba(245,241,232,0.07)'}
      }},
      plugins:{legend:{display:false},tooltip:{
        callbacks:{label:ctx=>`${ctx.raw} set${ctx.raw!==1?'s':''}`}
      }}
    }
  });
}

  <div class="pr-ex-list">${exBests.map(e=>`<div class="pr-ex-row" onclick="openFullChart('${e.exId}','${e.name.replace(/'/g,'&#39;')}','${val}')"><div class="pre-nm">${e.name}</div><div class="pre-val">${e.best}kg · ${e.sessions} sess<br>${fd(e.lastDate)}</div></div>`).join('')}</div>`;

function openFullChart(exId,name,cat){

// ── Body Weight ───────────────────────────────────────────────────────────────
function renderBW(){
  document.getElementById('bwDate').value=today();
  const chartSlot=document.getElementById('bwChartSlot');
  const entries=[...(DB.bodyWeights||[])].sort((a,b)=>b.date.localeCompare(a.date));
  const sortedAsc=[...entries].sort((a,b)=>a.date.localeCompare(b.date));

  // ── v3 BW hero card ────────────────────────────────────────────────────────
  if(chartSlot){
    if(entries.length){
      const latest=entries[0];
      const curW=parseNum(latest.weight);
      // Month delta
      const m30=new Date();m30.setDate(m30.getDate()-30);
      const m30str=m30.toISOString().slice(0,10);
      const oldEntry=entries.find(e=>e.date<=m30str);
      let deltaHTML='';
      if(oldEntry){
        const d=(curW-parseNum(oldEntry.weight)).toFixed(1);
        const sign=d>0?'+':'';
        const goalDir=(DB.bwGoal?.direction||'').toLowerCase();
        const wantsLose=goalDir==='lose'||goalDir==='down';
        const isGood=(wantsLose&&d<0)||(!wantsLose&&d>0&&goalDir);
        const dCol=isGood?'var(--success)':'var(--red)';
        const arrow=d>0?'↑':'↓';
        deltaHTML=`<div class="bw3-delta" style="color:${dCol}">${arrow} ${Math.abs(d)}kg this month</div>`;
      }
      // Sparkline (last 30 entries, ascending)
      const pts30=sortedAsc.slice(-30);
      let sparkHTML='';
      if(pts30.length>=2){
        const vals=pts30.map(e=>parseNum(e.weight));
        const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||0.5;
        const W=340,H=56;
        const coords=vals.map((v,i)=>`${((i/(vals.length-1))*W).toFixed(1)},${(H-(v-mn)/rng*(H-10)-5).toFixed(1)}`).join(' ');
        const areaClose=` ${W},${H} 0,${H} Z`;
        sparkHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:56px;margin-top:-4px">
          <defs><linearGradient id="bwg3h" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6b35" stop-opacity="0.3"/><stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/></linearGradient></defs>
          <polygon points="${coords} ${areaClose}" fill="url(#bwg3h)"/>
          <polyline points="${coords}" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;
      }
      // Goal bar
      let goalBarHTML='';
      if(DB.bwGoal){
        const g=DB.bwGoal,target=parseNum(g.target);
        const startW=sortedAsc.length?parseNum(sortedAsc[0].weight):curW;
        const total=Math.abs(target-startW)||1;
        const done=Math.abs(curW-startW);
        const pct=Math.min(100,Math.round(done/total*100));
        const rem=Math.abs(curW-target).toFixed(1);
        goalBarHTML=`<div class="bw3-goal-bar"><div class="bw3-goal-fill" style="width:${pct}%"></div></div>
          <div class="bw3-goal-txt"><span>Goal · ${target}kg</span><span>${rem}kg to go</span></div>`;
      }
      chartSlot.innerHTML=`<div class="bw3-hero">
        <div class="bw3-top">
          <div>
            <div class="bw3-lbl">Body Weight</div>
            <div class="bw3-num">${curW.toFixed(1)}<span class="bw3-unit">kg</span></div>
            ${deltaHTML}
          </div>
        </div>
        ${sparkHTML}
        ${goalBarHTML}
      </div>`;
    } else {
      chartSlot.innerHTML='';
    }
  }
  renderBWGoalCard();
  const listEl=document.getElementById('bwList');
  if(!entries.length){
    listEl.innerHTML=`<div class="empty-state">
  <div class="empty-state-art">⚖️</div>
  <div class="empty-state-msg">No weight logged yet</div>
  <div class="empty-state-sub">Enter your weight above to start tracking your progress over time.</div>
</div>`;return;
  }
  const diffMap={};
  for(let i=1;i<sortedAsc.length;i++){diffMap[sortedAsc[i].id]=(parseNum(sortedAsc[i].weight)-parseNum(sortedAsc[i-1].weight)).toFixed(1)}
  listEl.innerHTML=`<div class="bw-list-hdr">HISTORY</div>${entries.map(e=>{
    const d=diffMap[e.id];const sign=d>0?'+':'';
    const goalDir=(DB.bwGoal?.direction||'').toString().toLowerCase();
    const wantsGain=goalDir==='gain'||goalDir==='up';
    const wantsLose=goalDir==='lose'||goalDir==='down';
    let col;
    if(d===undefined||d==0)col='var(--t2)';
    else if(wantsGain)col=d>0?'#22c55e':'#ef4444';
    else if(wantsLose)col=d>0?'#ef4444':'#22c55e';
    else col='var(--t2)';
    const badge=d!==undefined?`<div class="bw-diff" style="color:${col}">${sign}${d}</div>`:'';
    return`<div class="bw-entry"><div class="bw-date">${fd(e.date)}</div><div class="bw-kg">${e.weight} kg</div>${badge}<button class="bw-del" onclick="delBW('${e.id}')">&#10005;</button></div>`;
  }).join('')}`;
}
function renderBWGoalCard(){
  const g=DB.bwGoal;
  const entries=[...(DB.bodyWeights||[])].sort((a,b)=>a.date.localeCompare(b.date));
  const current=entries.length?parseNum(entries[entries.length-1].weight):null;
  let goalHTML='';
  if(g){
    const target=parseNum(g.target);const dir=g.direction==='gain'?'Gain to':'Lose to';let progBar='';
    if(current!==null&&entries.length>1){
      const start=parseNum(entries[0].weight);const total=Math.abs(target-start);const done=Math.abs(current-start);
      const pct=total>0?Math.min(100,Math.round(done/total*100)):100;const onTrack=g.direction==='lose'?current<=start:current>=start;
      const barCol=onTrack?'#22c55e':'#ef4444';
      progBar=`<div class="bw-goal-prog"><div class="bw-goal-prog-bar"><div style="width:${pct}%;background:${barCol};height:100%;border-radius:4px;transition:width .4s"></div></div><div class="bw-goal-prog-lbl">${pct}% · ${current}kg → ${target}kg</div></div>`;
    }
    goalHTML=`<div class="bw-goal-card"><div class="bw-goal-hdr"><div class="bw-goal-lbl">Goal: ${dir} ${target}kg${g.deadline?` by ${fd(g.deadline)}`:''}</div><button class="bw-goal-edit" onclick="toggleBWGoalForm(true)">Edit</button><button class="bw-goal-clear" onclick="clearBWGoal()">&#10005;</button></div>${progBar}</div>`;
  }else{
    goalHTML=`<div class="bw-goal-card bw-goal-collapsed" id="bwGoalCard"><button class="bw-goal-open-btn" onclick="toggleBWGoalForm(true)">+ Set Weight Goal</button></div>`;
  }
  goalHTML+=`<div class="bw-goal-form" id="bwGoalForm" style="display:none">

function openSummary(spId){
  const sp=DB.splits.find(s=>s.id===spId);const td=today();
  const todayAll=DB.workouts.filter(w=>w.date===td&&(w.splitId===spId||w.splitId===null));
  if(!todayAll.length){
    document.getElementById('sumBox').innerHTML=`<div class="sum-hd"><div class="sum-title">Summary</div><button class="sum-close" onclick="closeSummary()">&#10005;</button></div><div style="text-align:center;padding:50px 0;color:var(--t3)">No exercises logged today yet.</div>`;
    document.getElementById('sumOv').classList.add('open');return;
  }
  const nonCardio=todayAll.filter(w=>w.cat!=='cardio');
  const totalVol=nonCardio.reduce((a,w)=>a+vol(w.sets),0);
  const totalSets=nonCardio.reduce((a,w)=>a+w.sets.length,0);
  const muscles=[...new Set(nonCardio.map(w=>w.cat))];
  const prs=nonCardio.filter(w=>{
    const prevBest=Math.max(0,...DB.workouts.filter(x=>x.exId===w.exId&&x.id!==w.id&&new Date(x.date)<new Date(td)).map(x=>maxWt(x.sets)));
    return maxWt(w.sets)>prevBest&&maxWt(w.sets)>0;
  });
  const byEx=new Map();
  nonCardio.forEach(w=>{if(!byEx.has(w.exId))byEx.set(w.exId,{name:w.name,cat:w.cat,sets:w.sets,notes:w.notes,id:w.id});});
  const prevSess=DB.workouts.filter(w=>w.splitId===spId&&w.date<td);
  const lastDate=[...new Set(prevSess.map(w=>w.date))].sort().reverse()[0];
  const lastAll=lastDate?DB.workouts.filter(w=>w.splitId===spId&&w.date===lastDate):[];
  const todayVolMap=new Map();nonCardio.forEach(w=>todayVolMap.set(w.exId,(todayVolMap.get(w.exId)||0)+vol(w.sets)));
  const lastVolMap=new Map();lastAll.filter(w=>w.cat!=='cardio').forEach(w=>lastVolMap.set(w.exId,(lastVolMap.get(w.exId)||0)+vol(w.sets)));
  let html=`<div class="sum-hd"><div class="sum-title">${sp?.name||'Summary'}</div><button class="sum-close" onclick="closeSummary()">&#10005;</button></div>
  <div class="sum-date">${fd(td)}</div>
  <div class="sum-stats">
    <div class="sum-stat"><div class="sum-stat-val">${(()=>{const ws=todayAll.filter(w=>w.sessionStart&&w.savedAt);if(!ws.length)return '—';const start=Math.min(...ws.map(w=>w.sessionStart));const end=Math.max(...ws.map(w=>w.savedAt||w.sessionStart));const m=Math.max(1,Math.round((end-start)/60000));return m+'m'})()}</div><div class="sum-stat-lbl">Duration</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${prs.length}</div><div class="sum-stat-lbl">PRs</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${byEx.size}</div><div class="sum-stat-lbl">Exercises</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${totalSets}</div><div class="sum-stat-lbl">Sets</div></div>
  </div>`;
  if(muscles.length){
    html+=`<div class="sum-mg"><div class="sum-mg-lbl">Muscles Worked</div><div class="sum-mg-chips">${muscles.map(m=>`<div class="sum-mg-chip" style="color:${cc(m)};border-color:${cc(m)}44">${CAT_LBL[m]||m}</div>`).join('')}</div></div>`;
  }
  html+=`<div class="sum-sec"><div class="sum-sec-lbl" style="color:var(--t3)">Exercises</div>`;
  byEx.forEach((w,exId)=>{
    const isPR=prs.find(p=>p.exId===exId);
    const todayV=todayVolMap.get(exId)||0;const lastV=lastVolMap.get(exId)||0;
    let prog='';
    if(lastV>0){
      const diff=todayV-lastV;const pct=Math.round(Math.abs(diff)/lastV*100);
      const cls=diff>0?'up':diff<0?'dn':'eq';const sign=diff>0?'+':'';
      prog=`<div class="sum-prog"><div class="sum-prog-pill ${cls}">${sign}${pct}%</div><div class="sum-prog-vs">vs last time</div></div>`;
    }
    html+=`<div class="sum-ex">
      <div class="sum-ex-nm">${w.name}${isPR?'<span class="sum-pr-badge">PR</span>':''}</div>
      <div class="sum-chips">${w.sets.map((s,i)=>`<div class="sum-chip">S${i+1} ${s.reps||'?'}×${s.weight||'0'}kg</div>`).join('')}</div>
      ${prog}${w.notes?`<div style="font-size:10px;color:var(--t3);margin-top:5px;font-style:italic">${w.notes}</div>`:''}
    </div>`;
  });
  const sessKeyN=`${td}|${spId||'solo'}`;
  if(!DB.sessionNotes)DB.sessionNotes={};
  const sessNote=DB.sessionNotes[sessKeyN]||'';
  html+=`<div class="sum-sec" style="margin-top:8px"><div class="sum-sec-lbl" style="color:var(--t3)">Session Note</div><textarea class="sum-note" placeholder="How did this session feel?" oninput="saveSessionNote('${sessKeyN}',this.value)">${sessNote.replace(/"/g,'&quot;')}</textarea></div>`;

function renderRecap(){
  // v3: recapContent already exists inside progress-sub-recap
  const el=document.getElementById('recapContent');

function renderRecapContent(period){
  const el=document.getElementById('recapContent');
  if(!el)return;
  const now=new Date();const td=today();
  let startDate;
  if(period==='week'){startDate=new Date(now);startDate.setDate(now.getDate()-6)}
  else{startDate=new Date(now);startDate.setDate(1)}
  const startStr=startDate.toISOString().slice(0,10);
  const prev=period==='week'?new Date(startDate):new Date(startDate);
  if(period==='week')prev.setDate(prev.getDate()-7);
  else prev.setMonth(prev.getMonth()-1);
  const prevEnd=new Date(startDate);prevEnd.setDate(prevEnd.getDate()-1);
  const curW=DB.workouts.filter(w=>w.date>=startStr&&w.date<=td);
  const prevW=DB.workouts.filter(w=>w.date>=prev.toISOString().slice(0,10)&&w.date<=prevEnd.toISOString().slice(0,10));
  const curSessions=[...new Set(curW.map(w=>w.date))].length;
  const prevSessions=[...new Set(prevW.map(w=>w.date))].length;
  const curVol=Math.round(curW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+vol(w.sets),0));
  const prevVol=Math.round(prevW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+vol(w.sets),0));
  const curSets=curW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+w.sets.length,0);
  const prevSets=prevW.filter(w=>w.cat!=='cardio').reduce((a,w)=>a+w.sets.length,0);
  const curPRs=curW.filter(w=>w.cat!=='cardio'&&w.exId).filter(w=>{
    const prevBest=Math.max(0,...DB.workouts.filter(x=>x.exId===w.exId&&new Date(x.date)<new Date(w.date)).map(x=>maxWt(x.sets)));
    return maxWt(w.sets)>prevBest&&maxWt(w.sets)>0;
  }).length;
  function fmtVol(kg){return kg>=1000?(kg/1000).toFixed(1)+'t':kg+'kg'}
  function delta(cur,prv,fmt){
    if(!prv&&prv!==0)return'';const d=cur-prv;const sign=d>0?'+':'';
    const col=d>0?'var(--success)':d<0?'var(--red)':'var(--t3)';
    const val=fmt?fmt(Math.abs(d)):(sign+d);
    return`<div class="rc3-stat-delta" style="color:${col}">${d>0?'+':''}${fmt?fmt(d):d} vs prev</div>`;
  }
  const periodLabel=period==='week'?'Last 7 days':`${startDate.toLocaleString('default',{month:'long'})} ${startDate.getFullYear()}`;
  // Body weight card
  const bwEntries=[...(DB.bodyWeights||[])].filter(e=>e.date>=startStr).sort((a,b)=>a.date.localeCompare(b.date));
  let bwHTML='';
  if(bwEntries.length>=2){
    const first=parseNum(bwEntries[0].weight);const last=parseNum(bwEntries[bwEntries.length-1].weight);
    const diff=(last-first).toFixed(1);const isPos=parseFloat(diff)>0;
    const sign=isPos?'+':'';
    bwHTML=`<div class="rc3-bw">
      <div class="rc3-bw-lbl">Body Weight</div>
      <div class="rc3-bw-row">
        <span class="rc3-bw-from">${first}</span>
        <span class="rc3-bw-arrow">→</span>
        <span class="rc3-bw-to">${last}<small style="font-size:18px;color:var(--t3)">kg</small></span>
        <span class="rc3-bw-delta" style="color:${isPos?'var(--red)':'var(--success)'}">${sign}${diff}kg</span>
      </div>
    </div>`;
  }
  // Highlights
  const muscleFreq={};curW.filter(w=>w.cat!=='cardio').forEach(w=>{muscleFreq[w.cat]=(muscleFreq[w.cat]||0)+1});
  const topMuscle=Object.entries(muscleFreq).sort((a,b)=>b[1]-a[1])[0];
  let hlItems='';
  if(curPRs>0)hlItems+=`<div class="rc3-hl-item green"><div class="rc3-hl-icon">🏆</div><div><div class="rc3-hl-title">${curPRs} Personal Record${curPRs!==1?'s':''}</div><div class="rc3-hl-sub">New bests set this ${period}</div></div></div>`;
  if(topMuscle)hlItems+=`<div class="rc3-hl-item orange"><div class="rc3-hl-icon">💪</div><div><div class="rc3-hl-title">Most trained: ${CAT_LBL[topMuscle[0]]||topMuscle[0]}</div><div class="rc3-hl-sub">${topMuscle[1]} set${topMuscle[1]!==1?'s':''} logged</div></div></div>`;
  // Auto insight line
  let insightText='';
  if(!curSessions){insightText='No workouts logged yet. Start training to see your recap.';}
  else if(curSessions>prevSessions&&prevSessions>0){insightText=`More active than last ${period} — ${curSessions} vs ${prevSessions} session${prevSessions!==1?'s':''}. Keep it up! 🔥`;}
  else if(curVol>prevVol&&prevVol>0){const pct=Math.round((curVol-prevVol)/prevVol*100);insightText=`Volume is up ${pct}% vs last ${period}. Strong progress. 📈`;}
  else if(curPRs>0){insightText=`Hit ${curPRs} personal record${curPRs!==1?'s':''} this ${period}. New territory. 🏆`;}
  else if(curSessions>0){insightText=`${curSessions} session${curSessions!==1?'s':''} logged this ${period}. Consistency is the foundation.`;}
  el.innerHTML=`<div class="rc3-wrap">
    <div class="rc3-pills">
      <button class="rc3-pill${period==='week'?' active':''}" onclick="renderRecapContent('week')">Week</button>
      <button class="rc3-pill${period==='month'?' active':''}" onclick="renderRecapContent('month')">Month</button>
    </div>
    <div class="rc3-period">${periodLabel}</div>
    ${insightText?`<div class="rc3-insight"><div class="rc3-insight-icon">✦</div><div class="rc3-insight-text">${insightText}</div></div>`:''}
    <div class="rc3-grid">
      <div class="rc3-stat">
        <div class="rc3-stat-num">${curSessions}</div>
        <div class="rc3-stat-lbl">Workouts</div>
        ${delta(curSessions,prevSessions)}
      </div>
      <div class="rc3-stat">
        <div class="rc3-stat-num">${fmtVol(curVol)}</div>
        <div class="rc3-stat-lbl">Volume</div>
        ${delta(curVol,prevVol,(v)=>(v>0?'+':'')+fmtVol(Math.abs(v)))}
      </div>
      <div class="rc3-stat">
        <div class="rc3-stat-num">${curSets}</div>
        <div class="rc3-stat-lbl">Sets</div>
        ${delta(curSets,prevSets)}
      </div>
      <div class="rc3-stat">
        <div class="rc3-stat-num">${curPRs}</div>
        <div class="rc3-stat-lbl">PRs</div>
      </div>
    </div>
    ${hlItems?`<div class="rc3-hl-lbl">Highlights</div><div class="rc3-hl">${hlItems}</div>`:''}
    ${bwHTML}
  </div>`;
}

// ── Tab navigation ────────────────────────────────────────────────────────────
let _activeTab = 'home';
let _activeProgressSub = 'progress';

const _TAB_ORDER = ['home','train','progress','history'];
function switchTab(tab) {
  const prevTab = _activeTab;
  _activeTab = tab;
  const prevIdx = _TAB_ORDER.indexOf(prevTab);
  const nextIdx = _TAB_ORDER.indexOf(tab);
  const goingRight = nextIdx > prevIdx;

  document.querySelectorAll('.v3-tab').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tab-' + tab);
  if (btn) btn.classList.add('active');
  try{navigator.vibrate&&navigator.vibrate(8)}catch(_){}

  const animClasses = ['tab-enter-right','tab-enter-left','tab-exit-right','tab-exit-left'];
  const prevPage = document.querySelector('.page.active');
  if (prevPage && prevTab !== tab) {
    animClasses.forEach(c => prevPage.classList.remove(c));
    prevPage.classList.add(goingRight ? 'tab-exit-right' : 'tab-exit-left');
    setTimeout(() => { prevPage.classList.remove('active','tab-exit-right','tab-exit-left'); }, 220);
  } else if (prevPage) {
    prevPage.classList.remove('active');
  }

  const pageMap = {home:'page-home',train:'page-train',progress:'page-progress-hub',history:'page-history'};
  const newPage = document.getElementById(pageMap[tab]);
  if (newPage) {
    animClasses.forEach(c => newPage.classList.remove(c));
    newPage.classList.add('active', goingRight ? 'tab-enter-right' : 'tab-enter-left');
    setTimeout(() => newPage.classList.remove('tab-enter-right','tab-enter-left'), 300);
  }

  if (tab === 'home') {
    renderHome();
    updateTopbar('home');
  } else if (tab === 'train') {
    renderTrainTab();
    updateTopbar('train');
  } else if (tab === 'progress') {
    switchProgressTab(_activeProgressSub, false);
    updateTopbar('progress');
  } else if (tab === 'history') {
    renderHistory();
    updateTopbar('history');
  }
}

// ── Best streak ───────────────────────────────────────────────────────────────
function calcBestStreak() {
  const dates = [...new Set(DB.workouts.map(w => w.date))].sort();
  if (!dates.length) return 0;
  let best = 1, cur = 1;
  for (let i = 1; i < dates.length; i++) {
    const gap = Math.round((new Date(dates[i]) - new Date(dates[i-1])) / 86400000);
    if (gap === 1) { cur++; best = Math.max(best, cur); }
    else cur = 1;
  }
  return best;
}

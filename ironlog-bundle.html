<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>IronLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#0c0c0c; --s1:#151515; --s2:#1d1d1d; --s3:#252525;
  --border:#2a2a2a; --text:#f0f0f0; --t2:#777; --t3:#3d3d3d;
  --acc:#c9ff47; --red:#ff4f4f;
  --chest:#ff5c38; --triceps:#ff9f38; --back:#a855f7;
  --biceps:#c9ff47; --legs:#47b8ff; --shoulders:#ffd147;
  --abs:#38ffd4; --forearms:#ff7eb3; --cardio:#ff38a0;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); overflow:hidden; }
body { font-family:'DM Sans',sans-serif; color:var(--text); }

/* ── App shell ─────────────────────────────────────────────────────────────── */
.app { display:flex; height:100%; position:relative; }

/* ── Sidebar ───────────────────────────────────────────────────────────────── */
.sidebar {
  width:204px; min-width:204px;
  background:var(--s1); border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  padding-top:var(--safe-top);
  overflow-y:auto; overflow-x:hidden;
  transition:transform .25s; z-index:50;
  scrollbar-width:none;
}
.sidebar::-webkit-scrollbar { display:none; }

.sb-logo { padding:18px 16px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sb-logo h1 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; letter-spacing:-1px; color:var(--acc); }
.sb-logo p  { font-size:10px; color:var(--t3); margin-top:2px; letter-spacing:1px; text-transform:uppercase; }

.sb-sec     { padding:8px 0; }
.sb-sec-lbl { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--t3); padding:6px 16px 4px; }

.sb-btn {
  display:flex; align-items:center; gap:10px;
  width:100%; padding:9px 16px;
  background:none; border:none;
  color:var(--t2); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
  cursor:pointer; text-align:left;
  border-left:3px solid transparent;
  transition:all .12s;
}
.sb-btn:active, .sb-btn.active {
  background:var(--s2); color:var(--text);
  border-left-color:var(--cc, var(--acc));
}
.sb-dot  { width:7px; height:7px; border-radius:50%; background:var(--cc, var(--t3)); flex-shrink:0; }
.sb-icon { font-size:13px; flex-shrink:0; }

.sb-footer {
  margin-top:auto; padding:12px;
  border-top:1px solid var(--border);
  display:flex; flex-direction:column; gap:6px;
}
.sb-ftn {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px;
  background:var(--s2); border:1px solid var(--border); border-radius:8px;
  color:var(--t2); font-family:'DM Sans',sans-serif; font-size:11px;
  cursor:pointer; width:100%; transition:all .12s;
}
.sb-ftn:active { border-color:var(--acc); color:var(--acc); }
.sb-streak {
  text-align:center; font-size:11px; font-weight:600;
  color:var(--t2); padding:4px 0;
  letter-spacing:.3px;
}

/* ── Main ──────────────────────────────────────────────────────────────────── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

.topbar {
  display:flex; align-items:center; gap:10px;
  padding:calc(var(--safe-top) + 12px) 16px 12px;
  background:var(--bg); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.hmbgr {
  width:36px; height:36px; border-radius:9px;
  background:var(--s2); border:1px solid var(--border);
  color:var(--text); font-size:16px; cursor:pointer;
  display:none; align-items:center; justify-content:center; flex-shrink:0;
}
.hmbgr:active { background:var(--s3); }
.tb-title {
  font-family:'Syne',sans-serif; font-size:17px; font-weight:800;
  flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tb-bw {
  padding:7px 11px; border-radius:9px;
  background:var(--s2); border:1px solid var(--border);
  color:var(--t2); font-size:11px; font-weight:600;
  cursor:pointer; flex-shrink:0; transition:all .12s;
}
.tb-bw:active { border-color:var(--acc); color:var(--acc); }

/* ── Pages ─────────────────────────────────────────────────────────────────── */
.pages { flex:1; overflow:hidden; position:relative; }
.page  {
  position:absolute; inset:0;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  display:none; padding-bottom:60px;
}
.page.active { display:block; }

/* ── Muscle page ───────────────────────────────────────────────────────────── */
.pg-hdr {
  padding:20px 16px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.pg-title { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; text-transform:uppercase; letter-spacing:-.5px; }
.add-btn {
  padding:8px 14px; border-radius:9px;
  background:transparent; border:1px solid var(--pc, var(--acc));
  color:var(--pc, var(--acc));
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer;
}
.add-btn:active { opacity:.7; }
.ex-list { padding:12px 12px 0; display:flex; flex-direction:column; gap:8px; }

/* ── Exercise card ─────────────────────────────────────────────────────────── */
.ex-card { background:var(--s1); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.ex-head { display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer; }
.ex-head:active { background:var(--s2); }
.ex-bar  { width:3px; height:36px; border-radius:2px; flex-shrink:0; }
.ex-inf  { flex:1; min-width:0; }
.ex-nm   { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ex-sb   { font-size:10px; color:var(--t2); margin-top:2px; font-family:'DM Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ex-del  {
  width:30px; height:30px; border-radius:7px; flex-shrink:0;
  background:none; border:none; color:var(--t3); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.ex-del:active { color:var(--red); }
.ex-arr { color:var(--t3); font-size:18px; flex-shrink:0; transition:transform .2s; }
.ex-arr.open { transform:rotate(90deg); }

/* ── Log form ──────────────────────────────────────────────────────────────── */
.lf      { display:none; border-top:1px solid var(--border); }
.lf.open { display:block; }

.last-ref {
  margin:12px 14px 0;
  background:var(--s2); border:1px solid var(--border); border-radius:9px;
  padding:10px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.lr-left { flex:1; min-width:0; }
.lr-ttl  { font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--t3); margin-bottom:4px; }
.lr-val  { font-family:'DM Mono',monospace; font-size:15px; color:var(--text); }
.lr-sub  { font-size:9px; color:var(--t3); margin-top:2px; }

.lf-in   { padding:12px 14px 14px; }
.lf-date {
  width:100%; background:var(--s2); border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
  padding:10px 12px; outline:none; margin-bottom:10px;
}
.sets-hdr { display:flex; align-items:center; margin-bottom:8px; }
.sets-lbl { font-size:11px; color:var(--t2); font-weight:600; letter-spacing:.5px; }
.sets-ctl { display:flex; align-items:center; gap:6px; margin-left:auto; }
.sc-b {
  width:30px; height:30px; border-radius:7px;
  background:var(--s2); border:1px solid var(--border);
  color:var(--text); font-size:17px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  user-select:none;
}
.sc-b:active { background:var(--s3); }
.sc-n  { font-family:'DM Mono',monospace; font-size:15px; min-width:18px; text-align:center; }

.st    { width:100%; border-collapse:collapse; margin-bottom:6px; }
.st th { font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--t3); padding:4px; text-align:center; }
.st th:first-child { text-align:left; width:24px; }
.st td { padding:3px; }
.sn    { font-family:'DM Mono',monospace; font-size:12px; color:var(--t3); text-align:center; }
.sf {
  width:100%; background:var(--s2); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'DM Mono',monospace; font-size:15px;
  padding:9px 6px; outline:none; text-align:center;
  -webkit-appearance:none;
}
.sf:focus { border-color:var(--pc, var(--acc)); }
.sf::placeholder { color:var(--t3); }
.dk {
  width:30px; height:34px; border-radius:8px;
  background:var(--s2); border:1px solid var(--border);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all .12s; user-select:none;
}
.dk.on { background:#c9ff4722; border-color:var(--acc); color:var(--acc); }

.add-set-row { margin-bottom:10px; }
.add-set-btn {
  width:100%; padding:9px; border-radius:9px;
  background:none; border:1px dashed var(--border);
  color:var(--t2); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .12s;
}
.add-set-btn:active { border-color:var(--acc); color:var(--acc); }

.lf-nt {
  width:100%; background:var(--s2); border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px;
  padding:9px 12px; outline:none; resize:none; margin-bottom:12px;
}
.lf-nt::placeholder { color:var(--t3); }

.sav-btn {
  width:100%; padding:13px; border-radius:10px; border:none;
  color:#000; font-family:'Syne',sans-serif; font-size:15px; font-weight:700;
  cursor:pointer; letter-spacing:.3px;
}
.sav-btn:active { opacity:.75; }

/* ── Split page ────────────────────────────────────────────────────────────── */
.sp-hdr {
  padding:20px 16px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sp-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; letter-spacing:-.5px; }
.fin-btn {
  padding:9px 16px; border-radius:10px;
  background:var(--acc); border:none; color:#000;
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
}
.fin-btn:active { opacity:.75; }

.sp-cat     { margin-top:4px; }
.sp-cat-lbl { padding:14px 16px 6px; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.sp-ex-list { padding:0 12px; display:flex; flex-direction:column; gap:6px; }

.add-cat-btn {
  width:100%; background:none;
  border-width:1px; border-style:dashed; border-radius:10px;
  padding:9px; font-size:12px; font-weight:600;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  transition:opacity .12s;
}
.add-cat-btn:active { opacity:.6; }

/* ── Cardio ────────────────────────────────────────────────────────────────── */
.cc-wrap { padding:0 12px; }
.cc      { background:var(--s1); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.cc-hd   { display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer; }
.cc-hd:active { background:var(--s2); }
.cc-form       { display:none; border-top:1px solid var(--border); padding:12px 14px 14px; }
.cc-form.open  { display:block; }
.cc-fields { display:flex; gap:10px; margin-bottom:12px; }
.ccfw { flex:1; }
.cfl  { font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--t3); margin-bottom:4px; }
.cff  {
  width:100%; background:var(--s2); border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-family:'DM Mono',monospace; font-size:16px;
  padding:10px 8px; outline:none; text-align:center; -webkit-appearance:none;
}
.cff:focus { border-color:var(--cardio); }

/* ── History ───────────────────────────────────────────────────────────────── */
.hist-empty { text-align:center; padding:60px 20px; color:var(--t3); }
.hsess      { border-bottom:1px solid var(--border); }
.hsess-hd   {
  display:flex; align-items:center; gap:10px; padding:14px 16px;
  background:var(--s1); cursor:pointer; border:none; width:100%;
  color:var(--text); font-family:'DM Sans',sans-serif; text-align:left;
}
.hsess-hd:active { background:var(--s2); }
.hsess-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.hsess-info { flex:1; min-width:0; }
.hsess-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hsess-meta { font-size:10px; color:var(--t3); margin-top:1px; }
.hsess-arr       { color:var(--t3); font-size:15px; flex-shrink:0; transition:transform .2s; }
.hsess-arr.open  { transform:rotate(90deg); }
.hsess-body      { display:none; }
.hsess-body.open { display:block; }

.hentry { padding:11px 16px; border-top:1px solid var(--border); display:flex; align-items:flex-start; gap:10px; }
.hel    { flex:1; min-width:0; }
.henm   { font-size:13px; font-weight:600; }
.hecat  { font-size:9px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-top:1px; }
.hechips { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
.chip    { font-family:'DM Mono',monospace; font-size:10px; background:var(--s3); border:1px solid var(--border); border-radius:5px; padding:3px 7px; color:var(--t2); }
.henotes { font-size:10px; color:var(--t3); margin-top:4px; font-style:italic; }
.hedel  { background:none; border:none; color:var(--t3); font-size:16px; cursor:pointer; padding:2px 4px; flex-shrink:0; }
.hedel:active { color:var(--red); }

/* ── Progress ──────────────────────────────────────────────────────────────── */
.psel-wrap { padding:14px 14px 0; }
.psel {
  width:100%; background:var(--s1); border:1px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
  padding:11px 14px; outline:none; -webkit-appearance:none;
}
.pr-cards { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:14px; }
.pr-card  { background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:14px; }
.pr-val   { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; line-height:1; }
.pr-unit  { font-size:12px; color:var(--t2); }
.pr-lbl   { font-size:9px; color:var(--t3); margin-top:3px; text-transform:uppercase; letter-spacing:1px; }

.chart-box { margin:0 14px 14px; background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:14px; }
.cbt { font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--t3); margin-bottom:12px; }
.cw  { position:relative; height:150px; }

.pr-ex-list { padding:0 14px 14px; display:flex; flex-direction:column; gap:6px; }
.pr-ex-row  { background:var(--s1); border:1px solid var(--border); border-radius:9px; padding:11px 13px; display:flex; align-items:center; gap:10px; }
.pre-nm     { flex:1; font-size:13px; font-weight:600; }
.pre-val    { font-family:'DM Mono',monospace; font-size:11px; color:var(--t2); text-align:right; }
.no-data    { text-align:center; padding:40px 20px; color:var(--t3); font-size:13px; }

/* ── Body Weight ───────────────────────────────────────────────────────────── */
.bw-card       { margin:14px; background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:16px; }
.bw-card-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; margin-bottom:14px; }
.bw-row   { display:flex; gap:8px; align-items:flex-end; }
.bw-field { flex:1; }
.bw-lbl   { font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--t3); margin-bottom:5px; }
.bw-inp   {
  width:100%; background:var(--s2); border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-family:'DM Mono',monospace; font-size:16px;
  padding:10px; outline:none; text-align:center; -webkit-appearance:none;
}
.bw-inp:focus { border-color:var(--acc); }
.bw-add {
  padding:10px 16px; border-radius:10px;
  background:var(--acc); border:none; color:#000;
  font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; white-space:nowrap; align-self:flex-end;
}
.bw-add:active { opacity:.75; }
.bw-list     { padding:0 14px 14px; }
.bw-list-hdr { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--t3); padding:4px 0 10px; }
.bw-entry    { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.bw-date     { font-size:12px; color:var(--t2); flex:1; }
.bw-kg       { font-family:'DM Mono',monospace; font-size:16px; color:var(--acc); margin-right:12px; }
.bw-diff     { font-size:11px; font-weight:600; margin-right:10px; }
.bw-del      { background:none; border:none; color:var(--t3); font-size:15px; cursor:pointer; padding:2px 6px; }
.bw-del:active { color:var(--red); }

/* ── Summary overlay ───────────────────────────────────────────────────────── */
.sum-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:400;
  display:none; flex-direction:column;
  padding:calc(var(--safe-top) + 16px) 0 calc(var(--safe-bot) + 16px);
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.sum-ov.open { display:flex; }
.sum-box     { width:100%; max-width:480px; margin:0 auto; padding:0 16px; }

.sum-hd    { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.sum-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
.sum-close {
  width:34px; height:34px; border-radius:8px;
  background:var(--s2); border:1px solid var(--border);
  color:var(--t2); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.sum-date  { font-size:11px; color:var(--t3); margin-bottom:14px; }
.sum-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.sum-stat  { background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
.sum-stat-val { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--acc); line-height:1; }
.sum-stat-lbl { font-size:9px; color:var(--t3); margin-top:3px; text-transform:uppercase; letter-spacing:1px; }

.sum-mg      { margin-bottom:16px; }
.sum-mg-lbl  { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--t3); margin-bottom:8px; }
.sum-mg-chips { display:flex; flex-wrap:wrap; gap:6px; }
.sum-mg-chip  { padding:5px 11px; border-radius:7px; font-size:12px; font-weight:600; border:1px solid; }

.sum-sec     { margin-bottom:16px; }
.sum-sec-lbl { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.sum-ex      { background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:6px; }
.sum-ex-nm   { font-size:13px; font-weight:600; margin-bottom:6px; }
.sum-chips   { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px; }
.sum-chip    { font-family:'DM Mono',monospace; font-size:10px; background:var(--s2); border:1px solid var(--border); border-radius:5px; padding:3px 7px; }
.sum-prog    { display:flex; align-items:center; gap:8px; margin-top:6px; }
.sum-prog-pill { font-size:11px; font-weight:700; padding:3px 9px; border-radius:6px; }
.sum-prog-pill.up { color:#22c55e; background:#22c55e15; }
.sum-prog-pill.dn { color:#ef4444; background:#ef444415; }
.sum-prog-pill.eq { color:var(--t2); background:var(--s3); }
.sum-prog-vs { font-size:10px; color:var(--t3); }

.ss-btn {
  width:100%; padding:14px; border-radius:12px; margin-top:8px;
  background:var(--s2); border:1px solid var(--border);
  color:var(--text); font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer;
}
.ss-btn:active { background:var(--s3); }

/* ── Sheet ─────────────────────────────────────────────────────────────────── */
.ov-dark      { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; display:none; }
.ov-dark.open { display:block; }
.sheet {
  position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
  background:var(--s1); border-radius:18px 18px 0 0; border-top:1px solid var(--border);
  padding:16px 18px calc(var(--safe-bot) + 18px);
  z-index:201; transform:translateY(100%); transition:transform .25s;
}
.sheet.open  { transform:translateY(0); }
.sh-handle   { width:34px; height:4px; border-radius:2px; background:var(--s3); margin:0 auto 16px; }
.sh-title    { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; margin-bottom:14px; }
.sh-inp {
  width:100%; background:var(--s2); border:1px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px;
  padding:12px 14px; outline:none; margin-bottom:12px;
}
.sh-inp:focus  { border-color:var(--acc); }
.sh-acts   { display:flex; gap:8px; }
.sh-cancel {
  flex:1; padding:13px; border-radius:10px;
  background:var(--s2); border:1px solid var(--border);
  color:var(--t2); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer;
}
.sh-ok {
  flex:2; padding:13px; border-radius:10px;
  background:var(--acc); border:none; color:#000;
  font-family:'Syne',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
}
.sh-ok:active { opacity:.8; }

/* ── Confirm ───────────────────────────────────────────────────────────────── */
.conf-ov      { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:300; display:none; align-items:center; justify-content:center; padding:20px; }
.conf-ov.open { display:flex; }
.conf-box     { background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:22px 18px; width:100%; max-width:300px; text-align:center; }
.conf-msg     { font-size:14px; line-height:1.5; margin-bottom:18px; }
.conf-btns    { display:flex; gap:8px; }
.c-no  { flex:1; padding:12px; border-radius:9px; background:var(--s2); border:1px solid var(--border); color:var(--t2); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
.c-yes { flex:1; padding:12px; border-radius:9px; background:#3a1010; border:1px solid #5a2020; color:#ff6b6b; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
.c-yes:active { background:#5a2020; }

/* ── Toast ─────────────────────────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--s2); border:1px solid var(--border); border-left:3px solid var(--acc);
  padding:9px 16px; border-radius:9px;
  font-size:12px; font-weight:500;
  opacity:0; transition:all .22s;
  pointer-events:none; white-space:nowrap; z-index:500;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── Rest Timer ────────────────────────────────────────────────────────────── */
.rest-pill {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%);
  background:var(--s2); border:2px solid var(--acc); border-radius:50px;
  padding:10px 20px;
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--acc);
  z-index:600; display:none; align-items:center; gap:14px;
  box-shadow:0 4px 24px rgba(201,255,71,.15);
  pointer-events:auto;
}
.rest-pill.show { display:flex; }
.rest-pill-cancel {
  background:none; border:none;
  color:var(--t2); font-size:14px; cursor:pointer; padding:0;
  line-height:1;
}
.rest-pill-cancel:active { color:var(--red); }

/* ── Mobile overlay ────────────────────────────────────────────────────────── */
.sb-ov      { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:49; display:none; }
.sb-ov.open { display:block; }

@media (max-width:600px) {
  .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%); z-index:50; }
  .sidebar.open { transform:translateX(0); }
  .hmbgr { display:flex; }
  .rest-pill { bottom:16px; }
}

/* ── Profile Picker ────────────────────────────────────────────────────────── */
.prof-ov {
  position:fixed; inset:0; background:var(--bg); z-index:1000;
  display:none; align-items:center; justify-content:center; padding:24px;
}
.prof-ov.open { display:flex; }
.prof-wrap {
  width:100%; max-width:320px;
  display:flex; flex-direction:column; align-items:center;
}
.prof-logo {
  font-family:'Syne',sans-serif; font-size:34px; font-weight:800;
  color:var(--acc); letter-spacing:-1px; margin-bottom:6px;
}
.prof-sub { font-size:13px; color:var(--t2); margin-bottom:24px; text-align:center; }
.prof-list { width:100%; display:flex; flex-direction:column; gap:8px; margin-bottom:14px; min-height:0; }
.prof-item {
  display:flex; align-items:center; gap:14px;
  padding:13px 16px; border-radius:12px;
  background:var(--s1); border:1px solid var(--border);
  cursor:pointer; transition:all .12s; width:100%;
  font-family:'DM Sans',sans-serif; text-align:left;
}
.prof-item:active { border-color:var(--acc); background:var(--s2); }
.prof-avatar {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:13px; font-weight:800;
  color:#000; flex-shrink:0;
}
.prof-name { font-size:15px; font-weight:600; flex:1; color:var(--text); }
.prof-del  {
  background:none; border:none; color:var(--t3); font-size:15px;
  cursor:pointer; padding:4px; flex-shrink:0; line-height:1;
}
.prof-del:active { color:var(--red); }
.prof-new-btn {
  width:100%; padding:14px; border-radius:12px;
  background:none; border:1px dashed var(--border);
  color:var(--t2); font-family:'DM Sans',sans-serif;
  font-size:14px; font-weight:600; cursor:pointer; transition:all .12s;
}
.prof-new-btn:active { border-color:var(--acc); color:var(--acc); }
.prof-inp-wrap { width:100%; margin-bottom:12px; }
.sb-prof { justify-content:flex-start; }

::-webkit-scrollbar { width:0; }

/* ── Sidebar add-split button ──────────────────────────────────────────────── */
.sb-add-split {
  float:right; background:none; border:none;
  color:var(--t2); font-size:14px; font-weight:700; cursor:pointer;
  padding:0 2px; line-height:1;
}
.sb-add-split:active { color:var(--acc); }

/* ── Split edit mode ───────────────────────────────────────────────────────── */
.sp-edit-btn {
  padding:7px 11px; border-radius:9px;
  background:var(--s2); border:1px solid var(--border);
  color:var(--t2); font-size:11px; font-weight:600; cursor:pointer;
  flex-shrink:0; transition:all .12s;
}
.sp-edit-btn:active { border-color:var(--acc); color:var(--acc); }
.sp-done-btn {
  padding:8px 14px; border-radius:9px;
  background:var(--acc); border:none; color:#000;
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
  flex-shrink:0;
}
.sp-done-btn:active { opacity:.75; }
.sp-name-inp {
  flex:1; background:var(--s2); border:1px solid var(--acc); border-radius:9px;
  color:var(--text); font-family:'Syne',sans-serif; font-size:18px; font-weight:800;
  padding:8px 12px; outline:none; min-width:0;
}
.sp-edit-colors {
  display:flex; gap:6px; align-items:center; flex-shrink:0;
}
.sp-color-dot {
  width:18px; height:18px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; flex-shrink:0; transition:border-color .12s;
}
.sp-color-dot.sel, .sp-color-dot:active { border-color:var(--text); }
.sec-remove {
  position:absolute; top:10px; right:14px; z-index:2;
  background:var(--s2); border:1px solid var(--border);
  color:var(--t3); font-size:13px; cursor:pointer; border-radius:6px;
  width:26px; height:26px; display:flex; align-items:center; justify-content:center;
}
.sec-remove:active { color:var(--red); border-color:var(--red); }
.sp-edit-tools {
  padding:14px 16px 20px; display:flex; flex-direction:column; gap:8px;
}
.sp-add-sec-btn {
  width:100%; padding:11px; border-radius:10px;
  background:none; border:1px dashed var(--border);
  color:var(--t2); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .12s;
}
.sp-add-sec-btn:active { border-color:var(--acc); color:var(--acc); }
.sp-del-split-btn {
  width:100%; padding:11px; border-radius:10px;
  background:#1a0808; border:1px solid #3a1515;
  color:#ff6b6b; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .12s; margin-top:4px;
}
.sp-del-split-btn:active { background:#2a1010; }

/* ── Add Section picker (inside sheet) ─────────────────────────────────────── */
.addsec-list { display:flex; flex-wrap:wrap; gap:8px; padding-bottom:4px; }
.addsec-item {
  display:flex; align-items:center; gap:7px;
  padding:9px 13px; border-radius:10px;
  background:none; border:1px solid; font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer; transition:opacity .12s;
}
.addsec-item.used { opacity:.4; cursor:default; }
.addsec-item:not(.used):active { opacity:.6; }
.addsec-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── Exercise Picker overlay ───────────────────────────────────────────────── */
.picker-ov {
  position:fixed; inset:0; background:var(--bg); z-index:350;
  display:none; flex-direction:column;
  padding-top:var(--safe-top);
}
.picker-ov.open { display:flex; }
.picker-wrap { display:flex; flex-direction:column; height:100%; }
.picker-hdr  {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 18px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.picker-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
.picker-list  { flex:1; overflow-y:auto; padding:0 16px 10px; }
.picker-group { margin-bottom:14px; }
.picker-group-lbl { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:10px 0 6px; }
.picker-row {
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; border-radius:10px; cursor:pointer;
  border:1px solid var(--border); margin-bottom:5px; background:var(--s1);
  transition:all .12s;
}
.picker-row.checked { background:var(--s2); border-color:var(--acc); }
.picker-check {
  width:22px; height:22px; border-radius:6px; flex-shrink:0;
  background:var(--s2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; transition:all .12s;
}
.picker-check.on { background:#c9ff4722; border-color:var(--acc); color:var(--acc); }
.picker-nm  { flex:1; font-size:13px; font-weight:500; }
.picker-cat { font-size:10px; font-weight:600; flex-shrink:0; }
.picker-foot {
  padding:12px 16px calc(var(--safe-bot) + 12px); border-top:1px solid var(--border);
  display:flex; gap:8px; flex-shrink:0; background:var(--bg);
}

/* ── Body Weight Goal ──────────────────────────────────────────────────────── */
.bw-goal-card {
  background:var(--s1); border:1px solid var(--border); border-radius:12px;
  padding:13px 16px; margin-bottom:10px;
}
.bw-goal-collapsed { text-align:center; padding:10px; }
.bw-goal-open-btn {
  background:none; border:none; color:var(--t2); font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer; padding:4px;
}
.bw-goal-open-btn:active { color:var(--acc); }
.bw-goal-hdr { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.bw-goal-lbl { flex:1; font-size:13px; font-weight:600; }
.bw-goal-edit {
  background:none; border:none; color:var(--t2); font-size:11px; font-weight:600; cursor:pointer;
}
.bw-goal-edit:active { color:var(--acc); }
.bw-goal-clear {
  background:none; border:none; color:var(--t3); font-size:14px; cursor:pointer; padding:2px 4px;
}
.bw-goal-clear:active { color:var(--red); }
.bw-goal-prog { margin-top:6px; }
.bw-goal-prog-bar { height:6px; background:var(--s3); border-radius:4px; overflow:hidden; margin-bottom:4px; }
.bw-goal-prog-lbl { font-size:10px; color:var(--t2); font-family:'DM Mono',monospace; }
.bw-goal-form { background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
.bw-goal-form-row { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; }
.bw-goal-dir-wrap { flex-shrink:0; }
.bw-goal-dir { display:flex; gap:0; margin-top:5px; border-radius:9px; overflow:hidden; border:1px solid var(--border); }
.bw-dir-btn {
  flex:1; padding:9px 14px;
  background:var(--s2); border:none;
  color:var(--t2); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  transition:all .12s;
}
.bw-dir-btn.sel { background:var(--acc); color:#000; }

/* ── Recap page ────────────────────────────────────────────────────────────── */
.recap-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--border);
  padding:0 14px; background:var(--bg); flex-shrink:0;
}
.recap-tab {
  padding:13px 18px; background:none; border:none;
  color:var(--t2); font-family:'Syne',sans-serif; font-size:12px; font-weight:800;
  letter-spacing:1px; cursor:pointer; border-bottom:2px solid transparent;
  transition:all .15s; margin-bottom:-1px;
}
.recap-tab.active { color:var(--acc); border-bottom-color:var(--acc); }
.recap-period {
  font-size:11px; color:var(--t3); text-align:center;
  padding:10px 16px 0; letter-spacing:.5px;
}
.recap-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px 14px;
}
.recap-stat {
  background:var(--s1); border:1px solid var(--border); border-radius:10px;
  padding:12px; text-align:center;
}
.recap-stat-val   { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--acc); }
.recap-stat-lbl   { font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.recap-stat-delta { font-size:11px; font-weight:700; margin-top:3px; }
.recap-section-lbl { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--t3); padding:8px 16px 4px; }
.recap-item {
  margin:0 14px 8px; padding:13px 14px; border-radius:12px;
  display:flex; align-items:flex-start; gap:13px;
  border:1px solid;
}
.recap-item.green  { background:#22c55e12; border-color:#22c55e33; }
.recap-item.orange { background:#ff9f3812; border-color:#ff9f3833; }
.recap-item-icon  { font-size:20px; flex-shrink:0; margin-top:1px; }
.recap-item-title { font-size:13px; font-weight:700; margin-bottom:3px; }
.recap-item-sub   { font-size:11px; color:var(--t2); line-height:1.4; }
.recap-bw {
  margin:6px 14px 14px; padding:13px 14px; border-radius:12px;
  background:var(--s1); border:1px solid var(--border);
}
.recap-bw-lbl  { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--t3); margin-bottom:5px; }
.recap-bw-vals { font-size:14px; font-weight:600; }
.recap-bw-goal { font-size:10px; color:var(--t3); margin-top:4px; }

</style>
</head>
<body>
<div class="app">

<nav class="sidebar" id="sidebar">
  <div class="sb-logo"><h1>IronLog</h1><p>Workout Journal</p></div>
  <div class="sb-sec" id="sbSplitsWrap">
    <div class="sb-sec-lbl">Workouts <button class="sb-add-split" onclick="addSplit()" title="New workout day">+</button></div>
    <div id="sbSplits"></div>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-lbl">Muscle Groups</div>
    <button class="sb-btn" data-pid="muscle-chest"     style="--cc:var(--chest)"     onclick="navTo('muscle-chest','Chest','--chest')"><span class="sb-dot" style="--cc:var(--chest)"></span>Chest</button>
    <button class="sb-btn" data-pid="muscle-triceps"   style="--cc:var(--triceps)"   onclick="navTo('muscle-triceps','Triceps','--triceps')"><span class="sb-dot" style="--cc:var(--triceps)"></span>Triceps</button>
    <button class="sb-btn" data-pid="muscle-back"      style="--cc:var(--back)"      onclick="navTo('muscle-back','Back','--back')"><span class="sb-dot" style="--cc:var(--back)"></span>Back</button>
    <button class="sb-btn" data-pid="muscle-biceps"    style="--cc:var(--biceps)"    onclick="navTo('muscle-biceps','Biceps','--biceps')"><span class="sb-dot" style="--cc:var(--biceps)"></span>Biceps</button>
    <button class="sb-btn" data-pid="muscle-legs"      style="--cc:var(--legs)"      onclick="navTo('muscle-legs','Legs','--legs')"><span class="sb-dot" style="--cc:var(--legs)"></span>Legs</button>
    <button class="sb-btn" data-pid="muscle-shoulders" style="--cc:var(--shoulders)" onclick="navTo('muscle-shoulders','Shoulders','--shoulders')"><span class="sb-dot" style="--cc:var(--shoulders)"></span>Shoulders</button>
    <button class="sb-btn" data-pid="muscle-abs"       style="--cc:var(--abs)"       onclick="navTo('muscle-abs','Abs','--abs')"><span class="sb-dot" style="--cc:var(--abs)"></span>Abs</button>
    <button class="sb-btn" data-pid="muscle-forearms"  style="--cc:var(--forearms)"  onclick="navTo('muscle-forearms','Forearms','--forearms')"><span class="sb-dot" style="--cc:var(--forearms)"></span>Forearms</button>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-lbl">Insights</div>
    <button class="sb-btn" data-pid="history"    onclick="navTo('history','History','--acc')"><span class="sb-icon">📋</span>History</button>
    <button class="sb-btn" data-pid="progress"   onclick="navTo('progress','Progress','--acc')"><span class="sb-icon">📈</span>Progress</button>
    <button class="sb-btn" data-pid="bodyweight" onclick="navTo('bodyweight','Body Weight','--acc')"><span class="sb-icon">⚖️</span>Body Weight</button>
    <button class="sb-btn" data-pid="recap"      onclick="navTo('recap','Recap','--acc')"><span class="sb-icon">🏅</span>Recap</button>
  </div>
  <div class="sb-footer">
    <button class="sb-ftn sb-prof" id="profBtn" onclick="showProfilePicker()">👤 Profile</button>
    <button class="sb-ftn" onclick="exportData()">&#8595; Export JSON</button>
    <button class="sb-ftn" onclick="document.getElementById('impF').click()">&#8593; Import JSON</button>
    <input type="file" id="impF" accept=".json" style="display:none" onchange="importData(event)">
    <div class="sb-streak" id="streakBadge">No streak yet</div>
  </div>
</nav>
<div class="sb-ov" id="sbOv" onclick="closeSB()"></div>

<div class="main">
  <div class="topbar">
    <button class="hmbgr" onclick="toggleSB()">&#9776;</button>
    <div class="tb-title" id="tbTitle">IronLog</div>
    <button class="tb-bw" onclick="navTo('bodyweight','Body Weight','--acc')" title="Log body weight">&#9878; BW</button>
  </div>
  <div class="pages" id="pages">
    <div class="page" id="page-history"><div id="histList"></div></div>
    <div class="page" id="page-recap"><div id="recapContent"></div></div>
    <div class="page" id="page-progress">
      <div class="psel-wrap">
        <select class="psel" id="pSel" onchange="renderProgress()">
          <option value="">&#8212; Pick a muscle group &#8212;</option>
        </select>
      </div>
      <div id="progContent"><div class="no-data">Select a muscle group above</div></div>
    </div>
    <div class="page" id="page-bodyweight">
      <div class="bw-card">
        <div class="bw-card-title">Log Body Weight</div>
        <div class="bw-row">
          <div class="bw-field">
            <div class="bw-lbl">Date</div>
            <input type="date" class="bw-inp" id="bwDate" style="font-size:13px;padding:10px 6px;">
          </div>
          <div class="bw-field">
            <div class="bw-lbl">Weight (kg)</div>
            <input type="text" inputmode="decimal" class="bw-inp" id="bwKg" placeholder="75.0">
          </div>
          <button class="bw-add" onclick="saveBW()">Add</button>
        </div>
      </div>
      <div class="bw-list" id="bwList"></div>
    </div>
  </div>
</div>
</div>

<!-- Profile Picker -->
<div class="prof-ov" id="profOv">
  <div class="prof-wrap">
    <div class="prof-logo">IronLog</div>
    <div class="prof-sub" id="profSub">Who's training?</div>
    <div class="prof-list" id="profList"></div>
    <button class="prof-new-btn" onclick="showNewProf()">+ New Profile</button>
  </div>
</div>

<!-- Rest Timer -->
<div class="rest-pill" id="restPill">
  REST <span id="restSec">90</span>s
  <button class="rest-pill-cancel" onclick="cancelRest()">&#10005;</button>
</div>

<!-- Exercise Picker -->
<div class="picker-ov" id="pickerOv">
  <div class="picker-wrap">
    <div class="picker-hdr">
      <div class="picker-title">Pick Exercises</div>
      <button class="sum-close" onclick="closePicker()">&#10005;</button>
    </div>
    <input class="sh-inp" id="pickerSearch" placeholder="Search..." oninput="filterPicker()" style="margin:0 16px 10px;width:calc(100% - 32px)">
    <div class="picker-list" id="pickerList"></div>
    <div class="picker-foot">
      <button class="sh-cancel" onclick="closePicker()">Cancel</button>
      <button class="sh-ok" onclick="confirmPicker()">Add Selected</button>
    </div>
  </div>
</div>

<!-- Sheet -->
<div class="ov-dark" id="shBg" onclick="closeSheet()"></div>
<div class="sheet" id="addSheet">
  <div class="sh-handle"></div>
  <div class="sh-title" id="shTitle">Add Exercise</div>
  <input class="sh-inp" id="shInp" placeholder="e.g. Incline DB Press" onkeydown="if(event.key==='Enter')doAdd()">
  <div class="sh-acts">
    <button class="sh-cancel" onclick="closeSheet()">Cancel</button>
    <button class="sh-ok" onclick="doAdd()">Add</button>
  </div>
</div>

<!-- Confirm -->
<div class="conf-ov" id="confOv">
  <div class="conf-box">
    <div class="conf-msg" id="confMsg"></div>
    <div class="conf-btns">
      <button class="c-no" onclick="resolveConf(false)">Cancel</button>
      <button class="c-yes" id="cYes" onclick="resolveConf(true)">Delete</button>
    </div>
  </div>
</div>

<!-- Summary -->
<div class="sum-ov" id="sumOv">
  <div class="sum-box" id="sumBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CAT_VAR = {
  chest:'--chest', triceps:'--triceps', back:'--back', biceps:'--biceps',
  legs:'--legs', shoulders:'--shoulders', abs:'--abs', forearms:'--forearms', cardio:'--cardio'
};
const CAT_LBL = {
  chest:'Chest', triceps:'Triceps', back:'Back', biceps:'Biceps',
  legs:'Legs', shoulders:'Shoulders', abs:'Abs', forearms:'Forearms', cardio:'Cardio'
};
const DEFAULT_SPLITS = [
  {id:'split-0', name:'Back & Bis',       color:'--back',    sections:[
    {type:'muscle',group:'back'},{type:'muscle',group:'biceps'},{type:'muscle',group:'forearms'},{type:'muscle',group:'abs'},{type:'cardio'}]},
  {id:'split-1', name:'Chest & Tris',     color:'--chest',   sections:[
    {type:'muscle',group:'chest'},{type:'muscle',group:'triceps'},{type:'muscle',group:'abs'},{type:'cardio'}]},
  {id:'split-2', name:'Legs',             color:'--legs',    sections:[
    {type:'muscle',group:'legs'},{type:'muscle',group:'abs'},{type:'cardio'}]},
  {id:'split-3', name:'Arms & Shoulders', color:'--biceps',  sections:[
    {type:'muscle',group:'biceps'},{type:'muscle',group:'triceps'},{type:'muscle',group:'forearms'},{type:'muscle',group:'shoulders'},{type:'muscle',group:'abs'},{type:'cardio'}]},
];
const SPLIT_COLORS = ['--back','--chest','--legs','--biceps','--shoulders','--triceps','--abs','--cardio'];
const MUSCLES = ['chest','triceps','back','biceps','legs','shoulders','abs','forearms'];
const DEF = {
  chest:     ['Barbell Bench Press','Incline Dumbbell Press','Cable Fly'],
  triceps:   ['Tricep Pushdown','Skull Crusher','Overhead Tricep Extension'],
  back:      ['Deadlift','Barbell Row','Lat Pulldown'],
  biceps:    ['Barbell Bicep Curl','Hammer Curl','Preacher Curl'],
  legs:      ['Barbell Squat','Romanian Deadlift','Leg Press'],
  shoulders: ['Overhead Press','Lateral Raise','Arnold Press'],
  abs:       ['Cable Crunch','Hanging Leg Raise','Ab Wheel Rollout'],
  forearms:  ['Wrist Curl','Reverse Wrist Curl','Farmer Walk'],
};

// ── Profile Management ────────────────────────────────────────────────────────
const PROF_KEY    = 'il4_profiles';
const ACTIVE_KEY  = 'il4_active';
const PROF_COLORS = ['#c9ff47','#47b8ff','#ff5c38','#a855f7','#ffd147','#38ffd4','#ff7eb3','#ff38a0'];

function getProfiles()      { return JSON.parse(localStorage.getItem(PROF_KEY) || '[]'); }
function saveProfiles(arr)  { localStorage.setItem(PROF_KEY, JSON.stringify(arr)); }
function getActiveProfile() { return localStorage.getItem(ACTIVE_KEY) || null; }
function dbKey()            { return 'il4_' + (getActiveProfile() || '_default'); }

function profColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffff;
  return PROF_COLORS[Math.abs(h) % PROF_COLORS.length];
}
function profInitials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

// ── Database ──────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function loadDB() {
  let d = JSON.parse(localStorage.getItem(dbKey()) || 'null');
  if (!d) {
    const old = localStorage.getItem('il4');
    if (old) { d = JSON.parse(old); localStorage.setItem(dbKey(), old); }
  }
  if (d) {
    if (!d.exercises.forearms) d.exercises.forearms = DEF.forearms.map(n => ({id:uid(),name:n}));
    if (!d.bodyWeights) d.bodyWeights = [];
    if (!d.splits) d.splits = DEFAULT_SPLITS.map(s => JSON.parse(JSON.stringify(s)));
    if (!d.bwGoal) d.bwGoal = null;
    return d;
  }
  const ex = {};
  MUSCLES.forEach(m => { ex[m] = DEF[m].map(n => ({id:uid(),name:n})); });
  return {exercises:ex, workouts:[], bodyWeights:[], splits:DEFAULT_SPLITS.map(s => JSON.parse(JSON.stringify(s))), bwGoal:null};
}
function saveDB() { localStorage.setItem(dbKey(), JSON.stringify(DB)); }

let DB;
let openCards = {}, setCounts = {}, addSheetCat = null, curSplit = null, cardioOpen = false, chartInst = {};

// ── Helpers ───────────────────────────────────────────────────────────────────
function cv(name)    { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function cc(cat)     { return cv(CAT_VAR[cat] || '--acc'); }
function today()     { return new Date().toISOString().slice(0,10); }
function fd(d)       { if (!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function parseNum(v) { return parseFloat(String(v||'').replace(',','.').trim()) || 0; }
function vol(sets)   { return sets.reduce((a,s) => a + parseNum(s.reps) * parseNum(s.weight), 0); }
function maxWt(sets) { return Math.max(0, ...sets.map(s => parseNum(s.weight))); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

let _cr = null;
function confirm2(msg, yl='Delete') {
  return new Promise(r => {
    _cr = r;
    document.getElementById('confMsg').textContent = msg;
    document.getElementById('cYes').textContent = yl;
    document.getElementById('confOv').classList.add('open');
  });
}
function resolveConf(v) {
  document.getElementById('confOv').classList.remove('open');
  if (_cr) { _cr(v); _cr = null; }
}

// ── Rest Timer ────────────────────────────────────────────────────────────────
let restInt = null;
const REST_SEC = 90;

function startRest() {
  cancelRest();
  let s = REST_SEC;
  const pill  = document.getElementById('restPill');
  const secEl = document.getElementById('restSec');
  if (!pill) return;
  secEl.textContent = s;
  pill.classList.add('show');
  restInt = setInterval(() => {
    s--;
    secEl.textContent = s;
    if (s <= 0) { cancelRest(); toast('Rest over — go! 💪'); }
  }, 1000);
}

function cancelRest() {
  if (restInt) { clearInterval(restInt); restInt = null; }
  document.getElementById('restPill')?.classList.remove('show');
}

// ── Streak ────────────────────────────────────────────────────────────────────
function calcStreak() {
  const dates = [...new Set(DB.workouts.map(w => w.date))].sort().reverse();
  if (!dates.length) return 0;
  const todayStr = today();
  let streak = 0, prev = null;
  for (const d of dates) {
    if (prev === null) {
      const gap = Math.round((new Date(todayStr) - new Date(d)) / 86400000);
      if (gap > 1) break;
      streak = 1; prev = d;
    } else {
      const gap = Math.round((new Date(prev) - new Date(d)) / 86400000);
      if (gap !== 1) break;
      streak++; prev = d;
    }
  }
  return streak;
}

function updateStreak() {
  const s  = calcStreak();
  const el = document.getElementById('streakBadge');
  if (el) el.textContent = s > 0 ? `🔥 ${s} day streak` : 'No streak yet';
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSheet();
    closeSummary();
    cancelRest();
    if (_cr) resolveConf(false);
  }
});

// Comma → period in decimal inputs (fixes locale decimal separator)
document.addEventListener('input', e => {
  const el = e.target;
  if (el.classList.contains('sf') || el.classList.contains('cff') || el.id === 'bwKg') {
    const pos = el.selectionStart;
    const replaced = el.value.replace(/,/g, '.');
    if (replaced !== el.value) {
      el.value = replaced;
      try { el.setSelectionRange(pos, pos); } catch(_) {}
    }
  }
});

// ── Sidebar ───────────────────────────────────────────────────────────────────
function toggleSB() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sbOv').classList.toggle('open');
}
function closeSB() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOv').classList.remove('open');
}

function renderSidebar() {
  const el = document.getElementById('sbSplits');
  if (!el) return;
  el.innerHTML = DB.splits.map(sp => {
    const col = `var(${sp.color})`;
    const safeName = sp.name.replace(/&/g,'&amp;').replace(/'/g,'&#39;');
    return `<button class="sb-btn" data-pid="${sp.id}" style="--cc:${col}" onclick="navTo('${sp.id}','${safeName}','${sp.color}')"><span class="sb-dot" style="--cc:${col}"></span>${safeName}</button>`;
  }).join('');
}

function navTo(pid, title, colVar) {
  closeSB();
  document.querySelectorAll('.sb-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.pid === pid);
  });
  const col = colVar ? cv(colVar) : '';
  document.getElementById('tbTitle').innerHTML = `<span style="color:${col}">${title}</span>`;
  if (!document.getElementById('page-'+pid)) {
    const d = document.createElement('div');
    d.className = 'page';
    d.id = 'page-' + pid;
    document.getElementById('pages').appendChild(d);
  }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+pid).classList.add('active');
  if      (pid === 'history')    renderHistory();
  else if (pid === 'progress')   renderProgressSel();
  else if (pid === 'bodyweight') renderBW();
  else if (pid === 'recap')      renderRecap();
  else if (pid.startsWith('split-'))  { curSplit = pid; renderSplit(pid, col); }
  else if (pid.startsWith('muscle-')) { curSplit = null; renderMuscle(pid.replace('muscle-',''), col); }
}

// ── Muscle Page ───────────────────────────────────────────────────────────────
function renderMuscle(cat, col) {
  const pg  = document.getElementById('page-muscle-'+cat);
  const exs = DB.exercises[cat] || [];
  pg.innerHTML = `<div class="pg-hdr" style="--pc:${col}">
    <div class="pg-title" style="color:${col}">${CAT_LBL[cat]}</div>
    <button class="add-btn" onclick="openSheet('${cat}')">+ Add</button>
  </div>
  <div class="ex-list">${exs.map(ex => exCard(ex, cat, col, false)).join('')}</div>`;
}

function exCard(ex, cat, col, inSplit) {
  const logs = DB.workouts.filter(w => w.exId===ex.id).sort((a,b) => b.date.localeCompare(a.date));
  const last = logs[0];
  let sub = 'No sessions yet';
  if (last && last.sets.length) {
    const ls = last.sets[last.sets.length-1];
    sub = `Last: ${ls.reps||'?'}×${ls.weight||'0'}kg (final set) · ${fd(last.date)}`;
  }
  const isOpen = !!openCards[ex.id];
  return `<div class="ex-card" id="xc-${ex.id}" style="--pc:${col}">
    <div class="ex-head" onclick="toggleCard('${ex.id}','${cat}','${col}',${inSplit})">
      <div class="ex-bar" style="background:${col}"></div>
      <div class="ex-inf">
        <div class="ex-nm">${ex.name}</div>
        <div class="ex-sb">${sub}</div>
      </div>
      <button class="ex-del" onclick="event.stopPropagation();delEx('${ex.id}','${cat}')">&#10005;</button>
      <div class="ex-arr ${isOpen?'open':''}" id="xa-${ex.id}">&#8250;</div>
    </div>
    ${isOpen ? logForm(ex.id, cat, col, last) : ''}
  </div>`;
}

function logForm(exId, cat, col, last) {
  const n = setCounts[exId] || 2;
  let lb = '';
  if (last && last.sets.length) {
    const ls  = last.sets[last.sets.length-1];
    const top = maxWt(last.sets);
    lb = `<div class="last-ref">
      <div class="lr-left">
        <div class="lr-ttl">Last session · ${fd(last.date)}</div>
        <div class="lr-val">${ls.reps||'?'} reps × ${ls.weight||'0'} kg</div>
        <div class="lr-sub">Top: ${top}kg · ${last.sets.length} sets total</div>
      </div>
    </div>`;
  }
  let rows = '';
  for (let i = 0; i < n; i++) {
    const p = last && last.sets[i];
    rows += `<tr>
      <td><div class="sn">${i+1}</div></td>
      <td><input class="sf" type="text" inputmode="decimal" placeholder="${p?p.reps:'10'}" value="${p?p.reps:''}" id="r-${exId}-${i}"></td>
      <td><input class="sf" type="text" inputmode="decimal" placeholder="${p?p.weight:'0'}"  value="${p?p.weight:''}" id="w-${exId}-${i}"></td>
      <td><div class="dk" id="dk-${exId}-${i}" onclick="tDone('${exId}',${i})">&#10003;</div></td>
    </tr>`;
  }
  return `<div class="lf open" id="lf-${exId}">
    ${lb}
    <div class="lf-in">
      <input type="date" class="lf-date" id="ld-${exId}" value="${today()}">
      <div class="sets-hdr">
        <div class="sets-lbl">SETS</div>
        <div class="sets-ctl">
          <div class="sc-b" onclick="chgSets('${exId}','${cat}','${col}',-1)">&#8722;</div>
          <div class="sc-n" id="scn-${exId}">${n}</div>
          <div class="sc-b" onclick="chgSets('${exId}','${cat}','${col}',1)">+</div>
        </div>
      </div>
      <table class="st">
        <thead><tr><th>#</th><th>Reps</th><th>kg</th><th>&#10003;</th></tr></thead>
        <tbody id="stb-${exId}">${rows}</tbody>
      </table>
      <div class="add-set-row">
        <button class="add-set-btn" onclick="chgSets('${exId}','${cat}','${col}',1)">+ Add Set</button>
      </div>
      <textarea class="lf-nt" id="ln-${exId}" placeholder="Notes..." rows="2"></textarea>
      <button class="sav-btn" style="background:${col}" onclick="saveEx('${exId}','${cat}')">Save</button>
    </div>
  </div>`;
}

function toggleCard(exId, cat, col, inSplit) {
  openCards[exId] = !openCards[exId];
  if (openCards[exId]) Object.keys(openCards).forEach(k => { if (k !== exId) openCards[k] = false; });
  if (inSplit) renderSplit(curSplit, col); else renderMuscle(cat, col);
  setTimeout(() => document.getElementById('xc-'+exId)?.scrollIntoView({behavior:'smooth',block:'nearest'}), 60);
}

function chgSets(exId, cat, col, d) {
  const old = setCounts[exId] || 2;
  const n   = Math.max(1, Math.min(10, old + d));
  setCounts[exId] = n;
  document.getElementById('scn-'+exId).textContent = n;
  // preserve entered values and done-states before rebuild
  const saved = {};
  for (let i = 0; i <= old; i++) {
    saved[i] = {
      r:    document.getElementById(`r-${exId}-${i}`)?.value  || '',
      w:    document.getElementById(`w-${exId}-${i}`)?.value  || '',
      done: !!document.getElementById(`dk-${exId}-${i}`)?.classList.contains('on'),
    };
  }
  const last = DB.workouts.filter(w => w.exId===exId).sort((a,b) => b.date.localeCompare(a.date))[0];
  let rows = '';
  for (let i = 0; i < n; i++) {
    const p      = last && last.sets[i];
    const rv     = saved[i] !== undefined ? saved[i].r : (p ? p.reps   : '');
    const wv     = saved[i] !== undefined ? saved[i].w : (p ? p.weight : '');
    const isDone = saved[i]?.done || false;
    rows += `<tr>
      <td><div class="sn">${i+1}</div></td>
      <td><input class="sf" type="text" inputmode="decimal" placeholder="${p?p.reps:'10'}" value="${rv}" id="r-${exId}-${i}"></td>
      <td><input class="sf" type="text" inputmode="decimal" placeholder="${p?p.weight:'0'}"  value="${wv}" id="w-${exId}-${i}"></td>
      <td><div class="dk${isDone?' on':''}" id="dk-${exId}-${i}" onclick="tDone('${exId}',${i})">&#10003;</div></td>
    </tr>`;
  }
  document.getElementById('stb-'+exId).innerHTML = rows;
}

function tDone(exId, i) {
  const el = document.getElementById(`dk-${exId}-${i}`);
  if (!el) return;
  el.classList.toggle('on');
  if (el.classList.contains('on')) startRest();
  else cancelRest();
}

function saveEx(exId, cat) {
  const date = document.getElementById('ld-'+exId)?.value;
  if (!date) { toast('Pick a date'); return; }
  const n    = setCounts[exId] || 2;
  const sets = [];
  for (let i = 0; i < n; i++) {
    sets.push({
      reps:   document.getElementById(`r-${exId}-${i}`)?.value || '',
      weight: document.getElementById(`w-${exId}-${i}`)?.value || '',
      done:   !!document.getElementById(`dk-${exId}-${i}`)?.classList.contains('on'),
    });
  }
  const notes    = document.getElementById('ln-'+exId)?.value || '';
  const ex       = Object.values(DB.exercises).flat().find(e => e.id===exId);
  const prevBest = Math.max(0, ...DB.workouts.filter(w => w.exId===exId).map(w => maxWt(w.sets)));
  const newBest  = maxWt(sets);
  DB.workouts.push({id:uid(), exId, cat, name:ex?.name||'?', date, sets, notes, splitId:curSplit||null});
  saveDB();
  openCards[exId] = false;
  delete setCounts[exId];
  cancelRest();
  if (curSplit) renderSplit(curSplit, cc(cat)); else renderMuscle(cat, cc(cat));
  updateStreak();
  toast(newBest > prevBest && newBest > 0 ? `🏆 New PR! ${newBest}kg` : 'Saved!');
}

async function delEx(exId, cat) {
  const ok = await confirm2('Remove this exercise? History is kept.');
  if (!ok) return;
  DB.exercises[cat] = (DB.exercises[cat]||[]).filter(e => e.id!==exId);
  saveDB();
  openCards[exId] = false;
  if (curSplit) renderSplit(curSplit, cc(cat)); else renderMuscle(cat, cc(cat));
  toast('Removed');
}

// ── Split Page ────────────────────────────────────────────────────────────────
let splitEditing = null; // id of split currently in edit mode

function renderSplit(spId, col) {
  const sp = DB.splits.find(s => s.id===spId);
  const pg = document.getElementById('page-'+spId);
  if (!pg || !sp) return;
  const editing = splitEditing === spId;
  const spCol = cv(sp.color) || col;

  let hdr;
  if (editing) {
    hdr = `<div class="sp-hdr">
      <input class="sp-name-inp" id="spNameInp-${spId}" value="${sp.name.replace(/"/g,'&quot;')}" onblur="renameSplit('${spId}',this.value)">
      <div class="sp-edit-colors">${SPLIT_COLORS.map(c=>`<div class="sp-color-dot${sp.color===c?' sel':''}" style="background:${cv(c)}" onclick="recolorSplit('${spId}','${c}')"></div>`).join('')}</div>
      <button class="sp-done-btn" onclick="exitEditMode('${spId}')">Done</button>
    </div>`;
  } else {
    hdr = `<div class="sp-hdr">
      <div class="sp-title">${sp.name}</div>
      <button class="sp-edit-btn" onclick="enterEditMode('${spId}')">✏️ Edit</button>
      <button class="fin-btn" onclick="openSummary('${spId}')">Finish 🏁</button>
    </div>`;
  }

  let sectionsHtml = '';
  sp.sections.forEach((sec, idx) => {
    const removeBtn = editing ? `<button class="sec-remove" onclick="removeSection('${spId}',${idx})">&#10005;</button>` : '';
    if (sec.type === 'cardio') {
      sectionsHtml += `<div class="sp-cat" style="position:relative">${removeBtn}${cardioHTML()}</div>`;
      return;
    }
    const group = sec.group;
    const c = cc(group);
    let exs;
    if (sec.type === 'muscle') {
      exs = DB.exercises[group] || [];
    } else {
      // type:'exercises' — only listed names
      const all = DB.exercises[group] || [];
      exs = all.filter(e => sec.list.includes(e.name));
      // also include any that were in list but don't exist yet (add them)
      sec.list.forEach(nm => {
        if (!exs.find(e => e.name === nm)) {
          if (!DB.exercises[group]) DB.exercises[group] = [];
          const newEx = {id:uid(), name:nm};
          DB.exercises[group].push(newEx);
          saveDB();
          exs.push(newEx);
        }
      });
    }
    const lbl = sec.type === 'exercises'
      ? `${CAT_LBL[group] || group} <span style="font-size:8px;color:var(--t3)">(selected)</span>`
      : CAT_LBL[group] || group;
    sectionsHtml += `<div class="sp-cat" style="position:relative">
      ${removeBtn}
      <div class="sp-cat-lbl" style="color:${c}">${lbl}</div>
      <div class="sp-ex-list">
        ${exs.map(ex => exCard(ex, group, c, true)).join('')}
        ${!editing ? `<button class="add-cat-btn" style="border-color:${c}44;color:${c}" onclick="openSheet('${group}')">+ Add ${CAT_LBL[group]} exercise</button>` : ''}
      </div>
    </div>`;
  });

  let editTools = '';
  if (editing) {
    editTools = `<div class="sp-edit-tools">
      <button class="sp-add-sec-btn" onclick="openAddSection('${spId}')">＋ Add Section</button>
      <button class="sp-add-sec-btn" onclick="openExercisePicker('${spId}')">＋ Pick Exercises</button>
      <button class="sp-del-split-btn" onclick="deleteSplit('${spId}')">Delete this day</button>
    </div>`;
  }

  pg.innerHTML = hdr + sectionsHtml + editTools;
  if (editing) setTimeout(() => document.getElementById(`spNameInp-${spId}`)?.focus(), 50);
}

function enterEditMode(spId) { splitEditing = spId; renderSplit(spId, ''); }
function exitEditMode(spId)  { splitEditing = null; const sp = DB.splits.find(s=>s.id===spId); renderSplit(spId, sp ? cv(sp.color) : ''); }

function renameSplit(spId, val) {
  const sp = DB.splits.find(s => s.id===spId);
  if (!sp || !val.trim()) return;
  sp.name = val.trim();
  saveDB();
  renderSidebar();
  document.getElementById('tbTitle').innerHTML = `<span style="color:${cv(sp.color)}">${sp.name}</span>`;
}

function recolorSplit(spId, colorVar) {
  const sp = DB.splits.find(s => s.id===spId);
  if (!sp) return;
  sp.color = colorVar;
  saveDB();
  renderSidebar();
  renderSplit(spId, cv(colorVar));
}

function removeSection(spId, idx) {

  sp.sections.splice(idx, 1);

  renderSplit(spId, cv(sp.color));

async function deleteSplit(spId) {
  const ok = await confirm2('Delete this workout day? Exercise history is kept.', 'Delete');

  DB.splits = DB.splits.filter(s => s.id !== spId);

  splitEditing = null;

// ── Exercise Picker ───────────────────────────────────────────────────────────
let pickerTargetSplit = null;
let pickerSelected = new Set();

function openExercisePicker(spId) {
  pickerTargetSplit = spId;
  pickerSelected = new Set();
  renderPickerList('');
  document.getElementById('pickerSearch').value = '';
  document.getElementById('pickerOv').classList.add('open');
}

function closePicker() {
  document.getElementById('pickerOv').classList.remove('open');
  pickerTargetSplit = null;
  pickerSelected = new Set();
}

function filterPicker() {
  renderPickerList(document.getElementById('pickerSearch').value.trim().toLowerCase());
}

function renderPickerList(query) {
  const sp = pickerTargetSplit ? DB.splits.find(s => s.id===pickerTargetSplit) : null;
  const alreadyFull = sp ? sp.sections.filter(s => s.type==='muscle').map(s => s.group) : [];
  let html = '';
  MUSCLES.forEach(group => {
    const exs = (DB.exercises[group] || []).filter(e => !query || e.name.toLowerCase().includes(query));
    if (!exs.length) return;
    const c = cc(group);
    html += `<div class="picker-group">
      <div class="picker-group-lbl" style="color:${c}">${CAT_LBL[group]}</div>`;
    exs.forEach(ex => {
      const checked = pickerSelected.has(ex.id);
      html += `<label class="picker-row${checked?' checked':''}">
        <input type="checkbox" style="display:none" ${checked?'checked':''} onchange="togglePick('${ex.id}','${group}',this)">
        <div class="picker-check${checked?' on':''}">${checked?'✓':''}</div>
        <div class="picker-nm">${ex.name}</div>
        <div class="picker-cat" style="color:${c}">${CAT_LBL[group]}</div>
      </label>`;
    });
    html += `</div>`;
  });
  if (!html) html = `<div class="no-data">No exercises found</div>`;
  document.getElementById('pickerList').innerHTML = html;
}

function togglePick(exId, group, checkbox) {
  if (checkbox.checked) pickerSelected.add(exId + '|' + group);
  else pickerSelected.delete(exId + '|' + group);
  // re-render to update checked styles without losing scroll position
  const list = document.getElementById('pickerList');
  list.querySelectorAll('.picker-row').forEach(row => {
    const cb = row.querySelector('input[type=checkbox]');
    const check = row.querySelector('.picker-check');
    if (!cb) return;
    const key = cb.closest('label')?.querySelector('.picker-nm')?.textContent;
    const isChecked = cb.checked;
    row.classList.toggle('checked', isChecked);
    check.classList.toggle('on', isChecked);
    check.textContent = isChecked ? '✓' : '';
  });
}

function confirmPicker() {
  if (!pickerSelected.size) { toast('Select at least one exercise'); return; }
  const sp = DB.splits.find(s => s.id===pickerTargetSplit);
  if (!sp) return;
  // group selected by muscle group
  const byGroup = {};
  pickerSelected.forEach(key => {
    const [exId, group] = key.split('|');
    if (!byGroup[group]) byGroup[group] = [];
    const ex = (DB.exercises[group]||[]).find(e => e.id===exId);
    if (ex) byGroup[group].push(ex.name);
  });
  Object.entries(byGroup).forEach(([group, names]) => {
    // If a full muscle section already exists for this group, skip (exercises already shown)
    if (sp.sections.find(s => s.type==='muscle' && s.group===group)) {
      toast(`${CAT_LBL[group]} already added as full section`);
      return;
    }
    // Check if there's already an 'exercises' section for this group — merge into it
    const existing = sp.sections.find(s => s.type==='exercises' && s.group===group);
    if (existing) {
      names.forEach(n => { if (!existing.list.includes(n)) existing.list.push(n); });
    } else {
      sp.sections.push({type:'exercises', group, list:names});
    }
  });
  saveDB();
  closePicker();
  renderSplit(pickerTargetSplit, cv(sp.color));
  toast(`${pickerSelected.size} exercise${pickerSelected.size!==1?'s':''} added`);
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const c = document.getElementById('histList');
  if (!DB.workouts.length) {
    c.innerHTML = `<div class="hist-empty">📋<br><br>No workouts yet</div>`;
    return;
  }
  const sessMap = new Map();
  [...DB.workouts].sort((a,b) => b.date.localeCompare(a.date)).forEach(w => {
    const key = w.splitId ? `${w.date}|${w.splitId}` : `${w.date}|solo|${w.cat}|${w.exId}`;
    if (!sessMap.has(key)) sessMap.set(key, {date:w.date, splitId:w.splitId, entries:[]});
    sessMap.get(key).entries.push(w);
  });
  c.innerHTML = [...sessMap.values()].map((sess, i) => {
    let sessName;
    if (sess.splitId) sessName = DB.splits.find(s => s.id===sess.splitId)?.name || 'Workout';
    else {
      const cats = [...new Set(sess.entries.map(e => e.cat))];
      sessName = cats.map(ct => CAT_LBL[ct]||ct).join(' & ');
    }
    const firstCat = sess.entries.find(e => e.cat!=='cardio')?.cat || 'cardio';
    const count    = sess.entries.length;
    return `<div class="hsess">
      <button class="hsess-hd" onclick="tSess('hb${i}','ha${i}')">
        <div class="hsess-dot" style="background:${cc(firstCat)}"></div>
        <div class="hsess-info">
          <div class="hsess-name">${sessName}</div>
          <div class="hsess-meta">${fd(sess.date)} · ${count} exercise${count!==1?'s':''}</div>
        </div>
        <span class="hsess-arr" id="ha${i}">&#8250;</span>
      </button>
      <div class="hsess-body" id="hb${i}">${sess.entries.map(w => histEntry(w)).join('')}</div>
    </div>`;
  }).join('');
}

function histEntry(w) {
  const c = cc(w.cat);
  if (w.cat === 'cardio') {
    return `<div class="hentry"><div class="hel"><div class="henm">🏃 Cardio</div><div class="hechips"><div class="chip">${w.duration||'?'} min</div><div class="chip">${w.calories||'?'} kcal</div></div></div><button class="hedel" onclick="delW('${w.id}')">&#10005;</button></div>`;
  }
  return `<div class="hentry"><div class="hel"><div class="henm">${w.name}</div><div class="hecat" style="color:${c}">${CAT_LBL[w.cat]||w.cat}</div><div class="hechips">${w.sets.map((s,i)=>`<div class="chip">S${i+1} ${s.reps||'?'}×${s.weight||'0'}kg</div>`).join('')}</div>${w.notes?`<div class="henotes">${w.notes}</div>`:''}</div><button class="hedel" onclick="delW('${w.id}')">&#10005;</button></div>`;

function tSess(bodyId, arrId) {
  document.getElementById(bodyId)?.classList.toggle('open');
  document.getElementById(arrId)?.classList.toggle('open');
}
async function delW(id) {

  DB.workouts = DB.workouts.filter(w => w.id!==id);
  saveDB();

// ── Progress ──────────────────────────────────────────────────────────────────
function renderProgressSel() {
  const sel = document.getElementById('pSel'), prev = sel.value;
  sel.innerHTML = '<option value="">— Pick a muscle group —</option>';
  MUSCLES.forEach(m => {
    if (!DB.workouts.find(w => w.cat===m)) return;
    const o = document.createElement('option');
    o.value = m; o.textContent = CAT_LBL[m];
    if (o.value === prev) o.selected = true;
    sel.appendChild(o);
  });
  if (DB.workouts.find(w => w.cat==='cardio')) {
    const o = document.createElement('option');
    o.value = 'cardio'; o.textContent = 'Cardio';
    if (o.value === prev) o.selected = true;
    sel.appendChild(o);
  }
  renderProgress();
}

function renderProgress() {
  const val = document.getElementById('pSel').value;
  const pc  = document.getElementById('progContent');
  if (!val) { pc.innerHTML = `<div class="no-data">Select a muscle group above</div>`; return; }
  const col = cc(val);
  if (val === 'cardio') {
    const logs = DB.workouts.filter(w => w.cat==='cardio').sort((a,b) => a.date.localeCompare(b.date));
    const bd   = Math.max(...logs.map(l => parseNum(l.duration)));
    const bc   = Math.max(...logs.map(l => parseNum(l.calories)));
    pc.innerHTML = `<div class="pr-cards">
      <div class="pr-card"><div class="pr-val" style="color:${col}">${bd}<span class="pr-unit"> min</span></div><div class="pr-lbl">Best Duration</div></div>
      <div class="pr-card"><div class="pr-val" style="color:${col}">${bc}<span class="pr-unit"> kcal</span></div><div class="pr-lbl">Best Calories</div></div>
      <div class="pr-card"><div class="pr-val" style="color:${col}">${logs.length}</div><div class="pr-lbl">Sessions</div></div>
    </div>
    <div class="chart-box"><div class="cbt">Duration (min)</div><div class="cw"><canvas id="chA"></canvas></div></div>`;
    mkChart('chA', logs.map(l => fd(l.date)), logs.map(l => parseNum(l.duration)), col);
    return;
  }
  const logs = DB.workouts.filter(w => w.cat===val && w.exId).sort((a,b) => a.date.localeCompare(b.date));
  if (!logs.length) { pc.innerHTML = `<div class="no-data">No data yet for ${CAT_LBL[val]}</div>`; return; }
  const byDate    = {};
  logs.forEach(w => { (byDate[w.date] = byDate[w.date]||[]).push(w); });
  const dates     = Object.keys(byDate).sort();
  const volByDate = dates.map(d => byDate[d].reduce((a,w) => a+vol(w.sets), 0));
  const bestWt    = Math.max(...logs.map(w => maxWt(w.sets)));
  const totalVol  = logs.reduce((a,w) => a+vol(w.sets), 0);
  const exBests   = (DB.exercises[val]||[]).map(ex => {
    const el = logs.filter(w => w.exId===ex.id);
    if (!el.length) return null;
    return {name:ex.name, best:Math.max(...el.map(w => maxWt(w.sets))), sessions:el.length, lastDate:el[el.length-1].date};
  }).filter(Boolean).sort((a,b) => b.best-a.best);
  pc.innerHTML = `<div class="pr-cards">
    <div class="pr-card"><div class="pr-val" style="color:${col}">${bestWt}<span class="pr-unit">kg</span></div><div class="pr-lbl">Best Weight</div></div>
    <div class="pr-card"><div class="pr-val" style="color:${col}">${Math.round(totalVol)}<span class="pr-unit">kg</span></div><div class="pr-lbl">Total Volume</div></div>
    <div class="pr-card"><div class="pr-val" style="color:${col}">${dates.length}</div><div class="pr-lbl">Sessions</div></div>
    <div class="pr-card"><div class="pr-val" style="color:${col}">${logs.length}</div><div class="pr-lbl">Sets Logged</div></div>
  </div>
  <div class="chart-box"><div class="cbt">Volume per Session (kg)</div><div class="cw"><canvas id="chA"></canvas></div></div>
  <div class="pr-ex-list">${exBests.map(e => `<div class="pr-ex-row"><div class="pre-nm">${e.name}</div><div class="pre-val">${e.best}kg · ${e.sessions} sess<br>${fd(e.lastDate)}</div></div>`).join('')}</div>`;
  mkChart('chA', dates.map(d => fd(d)), volByDate, col);
}

function mkChart(id, labels, data, color) {
  if (chartInst[id]) { try { chartInst[id].destroy(); } catch(_) {} }
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  chartInst[id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data, borderColor:color, backgroundColor:color+'22',
        borderWidth:2, pointRadius:3, pointBackgroundColor:color,
        tension:.35, fill:true
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {legend:{display:false}},
      scales: {
        x: {ticks:{color:'#555',font:{family:'DM Mono',size:9}}, grid:{color:'#1d1d1d'}},
        y: {ticks:{color:'#555',font:{family:'DM Mono',size:9}}, grid:{color:'#1d1d1d'}}
      }
    }
  });
}

// ── Body Weight ───────────────────────────────────────────────────────────────
function renderBW() {
  document.getElementById('bwDate').value = today();
  renderBWGoalCard();
  const entries = [...(DB.bodyWeights||[])].sort((a,b) => b.date.localeCompare(a.date));
  const listEl  = document.getElementById('bwList');
  if (!entries.length) {
    listEl.innerHTML = `<div class="bw-list-hdr">HISTORY</div><div class="no-data" style="padding:20px 0">No entries yet</div>`;
    return;
  }
  const sorted  = [...entries].sort((a,b) => a.date.localeCompare(b.date));
  const diffMap = {};
  for (let i = 1; i < sorted.length; i++) {
    diffMap[sorted[i].id] = (parseNum(sorted[i].weight) - parseNum(sorted[i-1].weight)).toFixed(1);
  }
  let chartHTML = '';
  if (entries.length >= 2) {
    chartHTML = `<div class="chart-box" style="margin:0 0 14px"><div class="cbt">Weight Over Time (kg)</div><div class="cw"><canvas id="bwChart"></canvas></div></div>`;
  }
  listEl.innerHTML = `<div class="bw-list-hdr">HISTORY</div>${chartHTML}${entries.map(e => {
    const d    = diffMap[e.id];
    const sign = d > 0 ? '+' : '';
    const col  = d > 0 ? '#ef4444' : d < 0 ? '#22c55e' : 'var(--t2)';
    const badge = d !== undefined ? `<div class="bw-diff" style="color:${col}">${sign}${d}</div>` : '';
    return `<div class="bw-entry"><div class="bw-date">${fd(e.date)}</div><div class="bw-kg">${e.weight} kg</div>${badge}<button class="bw-del" onclick="delBW('${e.id}')">&#10005;</button></div>`;
  }).join('')}`;
  if (entries.length >= 2) {
    setTimeout(() => mkChart('bwChart', sorted.map(e => fd(e.date)), sorted.map(e => parseNum(e.weight)), cv('--acc')), 0);
  }
}

function renderBWGoalCard() {
  const g = DB.bwGoal;
  const entries = [...(DB.bodyWeights||[])].sort((a,b) => a.date.localeCompare(b.date));
  const current = entries.length ? parseNum(entries[entries.length-1].weight) : null;
  let goalHTML = '';
  if (g) {
    const target = parseNum(g.target);
    const dir    = g.direction === 'gain' ? 'Gain to' : 'Lose to';
    let progBar  = '';
    if (current !== null && entries.length > 1) {
      const start   = parseNum(entries[0].weight);
      const total   = Math.abs(target - start);
      const done    = Math.abs(current - start);
      const pct     = total > 0 ? Math.min(100, Math.round(done / total * 100)) : 100;
      const onTrack = g.direction === 'lose' ? current <= start : current >= start;
      const barCol  = onTrack ? '#22c55e' : '#ef4444';
      progBar = `<div class="bw-goal-prog">
        <div class="bw-goal-prog-bar"><div style="width:${pct}%;background:${barCol};height:100%;border-radius:4px;transition:width .4s"></div></div>
        <div class="bw-goal-prog-lbl">${pct}% · ${current}kg → ${target}kg</div>
      </div>`;
    }
    goalHTML = `<div class="bw-goal-card">
      <div class="bw-goal-hdr">
        <div class="bw-goal-lbl">Goal: ${dir} ${target}kg${g.deadline ? ` by ${fd(g.deadline)}` : ''}</div>
        <button class="bw-goal-edit" onclick="toggleBWGoalForm(true)">Edit</button>
        <button class="bw-goal-clear" onclick="clearBWGoal()">&#10005;</button>
      </div>
      ${progBar}
    </div>`;
  } else {
    goalHTML = `<div class="bw-goal-card bw-goal-collapsed" id="bwGoalCard">

  }
  goalHTML += `<div class="bw-goal-form" id="bwGoalForm" style="display:none">
    <div class="bw-goal-form-row">
      <div class="bw-field"><div class="bw-lbl">Target (kg)</div><input type="text" inputmode="decimal" class="bw-inp" id="bwGTarget" placeholder="70.0" value="${g?g.target:''}"></div>
      <div class="bw-goal-dir-wrap">
